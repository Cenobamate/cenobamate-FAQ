zh": "引言：中国局灶性发作的治疗格局与其他地区不同，奥卡西平和丙戊酸钠比新型抗癫痫发作药物（ASM）更常用。西诺氨酯作为一种新型ASM，已证实能显著减少发作频率。然而，其在中国人群中的疗效和安全性尚未评估。方法：本研究分析了一项随机、双盲、安慰剂对照临床试验（NCT04557085）中中国参与者24周双盲期的数据。通过确定西诺氨酯各剂量组（100、200和400 mg）和合并ASM组的发作频率降低和应答率来评估疗效。通过双盲治疗期间的治疗中出现的不良事件（TEAEs）和治疗相关不良事件（TRAEs）评估安全性。结果：本事后分析纳入了来自中国24个中心的227例参与者，局灶性发作患者中位年龄32岁（四分位距24-40岁）。与安慰剂组（24.6%）相比，西诺氨酯组发作频率中位数百分比降低更大（100 mg组39.5%，200 mg组88.0%，400 mg组100.0%）。西诺氨酯组（100 mg组35.4%，200 mg组76.0%，400 mg组89.4%）的≥50%应答率高于安慰剂组（22.0%）。当西诺氨酯与钠通道阻滞剂（SCB）和非SCB联合使用时，观察到更大的发作减少和应答率，疗效优于安慰剂。根据基线ASM数量，与安慰剂相比，西诺氨酯在所有ASM组中均表现出发作减少和更高的应答率。西诺氨酯在所有剂量组中表现出可接受的安全性特征，大多数AEs为轻中度。报告的常见TEAEs包括头晕和嗜睡。结论：西诺氨酯在中国局灶性发作参与者中表现出非常良好的疗效和安全性特征。西诺氨酯与SCB和非SCB治疗的联合在减少发作频率和改善应答率方面均有效，优于安慰剂。", "title_full": "Efficacy and Safety of Adjunctive Cenobamate in Chinese Participants with Focal Seizure.", "pmid": "41428177"}]}, {"section": "产品使用问题", "question": "既往使用钠通道机制药物控制不佳的患者添加使用翼弗瑞®时，如何调整合并用药？", "answer": "1. 主动调整，预防不良反应<br>联用≥2种钠离子通道阻滞剂 (SCBs)时，主动减少或停用至少1种SCB1<br>翼弗瑞®滴定至150mg/d及以上剂量时，如果联用的SCBs剂量较高（如卡马西平≥800mg/d，奥卡西平＞900mg/d，艾司利卡西平＞1200mg/d、拉考沙胺＞300mg/d、拉莫三嗪＞300mg/d​），则主动减少联用药物的剂量1<br>根据不良反应情况被动降低联用药物剂量，减少不良反应对患者的影响：<br>出现不良反应后，建议根据不良反应类型、联用ASMs种类和剂量进行相应调整1 ​<br>综合考虑钠通道阻滞剂药物之间PK/PD作用：<br>翼弗瑞®与卡马西平和拉莫三嗪存在PK作用，使这两种药物血药浓度降低。但也需要考虑钠通道阻滞剂之间可能存在PD相互作用，与上述PK作用相互抵消。因此一份2022年发表的美国专家共识提出，在翼弗瑞®滴定初期无需主动调整卡马西平和拉莫三嗪剂量2。 SCB，钠离子通道阻滞剂；ASMs，抗癫痫发作药物；PK，药代动力学；PD，药效动力学", "refs": [{"text": "1. Carreño M, et al. Epilepsia Open. 2024;9(3):1051-1058", "title": "Spanish consensus on the management of concomitant antiseizure medications when using cenobamate in adults with drug-resistant focal seizures.", "abstract": "Cenobamate is an antiseizure medication (ASM) associated with high rates of seizure freedom and acceptable tolerability in patients with focal seizures. To achieve the optimal cenobamate dose for maximal potential effectiveness while avoiding or minimizing drug-related adverse events (AEs), the admi", "url": "https://pubmed.ncbi.nlm.nih.gov/38573131/", "type": "literature", "doi": "10.1002/epi4.12936", "abstract_full": "OBJECTIVE: Cenobamate is an antiseizure medication (ASM) associated with high rates of seizure freedom and acceptable tolerability in patients with focal seizures. To achieve the optimal cenobamate dose for maximal potential effectiveness while avoiding or minimizing drug-related adverse events (AEs), the administration of cenobamate with other ASMs must be managed through concomitant ASM load reduction. A panel of Spanish epilepsy experts aimed to provide a Spanish consensus on how to adjust the dose of concomitant ASMs in patients with drug-resistant epilepsy (DRE) in order to improve the effectiveness and tolerability of adjunctive cenobamate. METHODS: A three-stage modified Delphi consensus process was undertaken, including six Spanish epileptologists with extensive experience using cenobamate. Based on current literature and their own expert opinion, the expert panel reached a consensus on when and how to adjust the dosage of concomitant ASMs during cenobamate titration. RESULTS: The expert panel agreed that tailored titration and close follow-up are required to achieve the best efficacy and tolerability when initiating cenobamate in patients receiving concomitant ASMs. When concomitant clobazam, phenytoin, phenobarbital, and sodium channel blockers are taken at high dosages, or when the patient is receiving two or more sodium channel blockers, dosages should be proactively lowered during the cenobamate titration period. Other concomitant ASMs should be reduced only if the patient reports a moderate/severe AE at any stage of the titration period. SIGNIFICANCE: Cenobamate is an effective ASM with a dose-dependent effect. To maximize effectiveness while maintaining the best tolerability profile, co-medication management is needed. The recommendations included herein provide practical guidance for proactive and reactive management of co-medication in cenobamate-treated patients with DRE and a high drug load. PLAIN LANGUAGE SUMMARY: Patients with epilepsy may continue to have seizures even after treatment with several different antiseizure medications (ASMs). Cenobamate is an ASM that can reduce seizures in these patients. In this study, six Spanish experts in epilepsy discussed the best way to use cenobamate in drug-resistant epilepsy. They provide practical guidance on when and how the dose of other ASMs might be adjusted to reduce side effects and optimize the use of cenobamate.", "abstract_zh": "目的：西诺氨酯是一种与高无发作率和可接受耐受性相关的抗癫痫发作药物（ASM），用于局灶性发作患者。为实现西诺氨酯最佳剂量以获得最大潜在疗效，同时避免或最小化药物相关不良事件（AEs），必须通过减少合并ASM负荷来管理西诺氨酯与其他ASM的联合用药。一组西班牙癫痫专家旨在提供西班牙共识，就如何调整药物难治性癫痫（DRE）患者合并ASM的剂量提出建议，以改善辅助西诺氨酯的疗效和耐受性。方法：采用三阶段改良德尔菲共识过程，纳入六位具有丰富西诺氨酯使用经验的西班牙癫痫专家。基于现有文献和专家意见，专家组就西诺氨酯滴定期间何时及如何调整合并ASM剂量达成共识。结果：专家组一致认为，在合并ASM的患者中启动西诺氨酯时，需要个体化滴定和密切随访以实现最佳疗效和耐受性。当合并使用氯巴占、苯妥英、苯巴比妥和钠通道阻滞剂处于高剂量时，或患者正在接受两种或以上钠通道阻滞剂时，应在西诺氨酯滴定期间主动降低剂量。其他合并ASM仅在患者于滴定期间任何阶段报告中度/重度AE时才应减量。意义：西诺氨酯是一种具有剂量依赖性效应的有效ASM。为在保持最佳耐受性的同时最大化疗效，需要进行合并用药管理。本文所含推荐意见为药物难治性癫痫和高药物负荷患者中合并用药的主动和反应性管理提供了实用指导。通俗语言摘要：即使经过几种不同抗癫痫发作药物（ASM）治疗后，癫痫患者仍可能继续发作。西诺氨酯是一种可减少这些患者发作的ASM。在本研究中，六位西班牙癫痫专家讨论了在药物难治性癫痫中最佳使用西诺氨酯的方法。他们就何时及如何调整其他ASM剂量提供了实用指导，以减少副作用并优化西诺氨酯的使用。", "title_full": "Spanish consensus on the management of concomitant antiseizure medications when using cenobamate in adults with drug-resistant focal seizures.", "pmid": "38573131"}, {"text": "2. Smith MC, et al. Neurol Ther. 2022;11(4):1705-1720.", "title": "Dose Adjustment of Concomitant Antiseizure Medications During Cenobamate Treatment: Expert Opinion Consensus Recommendations.", "abstract": "Our objective was to provide expert consensus recommendations to improve treatment tolerability through dose adjustments of concomitant antiseizure medications (ASMs) during addition of cenobamate to existing ASM therapy in adult patients with uncontrolled focal seizures. A panel of seven epileptolo", "url": "https://pubmed.ncbi.nlm.nih.gov/36057761/", "type": "literature", "doi": "10.1007/s40120-022-00400-5", "abstract_full": "INTRODUCTION: Our objective was to provide expert consensus recommendations to improve treatment tolerability through dose adjustments of concomitant antiseizure medications (ASMs) during addition of cenobamate to existing ASM therapy in adult patients with uncontrolled focal seizures. METHODS: A panel of seven epileptologists experienced in the use of ASMs, including cenobamate, used a modified Delphi process to reach consensus. The panelists discussed tolerability issues with concomitant ASMs during cenobamate titration and practical strategies for dose adjustments that may prevent or mitigate adverse effects. The resulting recommendations consider concomitant ASM dose level and specify proactive (prior to report of an adverse effect) and reactive (in response to report of an adverse effect) dose adjustment suggestions based on concomitant ASM pharmacokinetic and pharmacodynamic interactions with cenobamate. Specific dose adjustment recommendations are provided. RESULTS: We recommend proactively lowering the dose of clobazam, phenytoin, and phenobarbital due to their known drug-drug interactions with cenobamate, and lacosamide due to a pharmacodynamic interaction with cenobamate, to prevent adverse effects during cenobamate titration. Reactive lowering of a concomitant ASM dose is sufficient for other ASMs at standard dosing owing to quick resolution of adverse effects. For carbamazepine and lamotrigine doses exceeding the upper end of standard dosing (e.g., carbamazepine, greater than 1200 mg/day; lamotrigine, greater than 500 mg/day), we encourage consideration of proactive dose reduction at cenobamate 200 mg/day to prevent potential adverse effects. All dose reductions for adverse effects can be repeated every 2 weeks as dictated by the adverse effects. At cenobamate 200 mg/day, we recommend that patients be evaluated for marked improvement of seizures and further dose reductions be considered to reduce potentially unnecessary polypharmacy. CONCLUSION: The primary goal of the recommended dose reductions of concomitant ASMs is to prevent or resolve adverse effects, thereby allowing cenobamate to reach the optimal dose to achieve the maximal potential of improving seizure control.", "abstract_zh": "引言：我们的目标是通过在现有ASM治疗中加入西诺氨酯时调整合并抗癫痫发作药物（ASM）的剂量，提供专家共识推荐以改善治疗耐受性，适用于局灶性发作未控制的成人患者。方法：由七位在ASM（包括西诺氨酯）使用方面经验丰富的癫痫专家采用改良德尔菲法达成共识。专家组讨论了西诺氨酯滴定期间合并ASM的耐受性问题以及可能预防或减轻不良反应的剂量调整实用策略。由此产生的推荐意见考虑了合并ASM的剂量水平，并基于合并ASM与西诺氨酯的药代动力学和药效学相互作用，提出了主动（在报告不良事件前）和反应性（在报告不良事件后）的剂量调整建议。提供了具体的剂量调整推荐。结果：我们建议主动降低氯巴占、苯妥英和苯巴比妥的剂量（因其与西诺氨酯有已知的药物-药物相互作用），以及拉考沙胺的剂量（因其与西诺氨酯有药效学相互作用），以预防西诺氨酯滴定期间的不良事件。对于标准剂量下的其他ASM，反应性降低合并ASM剂量即可，因为不良事件可快速缓解。对于超过标准剂量上限的卡马西平和拉莫三嗪剂量（如卡马西平大于1200 mg/天；拉莫三嗪大于500 mg/天），我们建议在西诺氨酯200 mg/天时考虑主动减量以预防潜在不良事件。所有因不良事件进行的减量可根据不良事件情况每2周重复一次。在西诺氨酯200 mg/天时，建议评估患者发作是否明显改善，并考虑进一步减量以减少潜在不必要的多药联合。结论：合并ASM减量的主要目标是预防或解决不良事件，从而使西诺氨酯能够达到最佳剂量以实现改善发作控制的最大潜力。", "title_full": "Dose Adjustment of Concomitant Antiseizure Medications During Cenobamate Treatment: Expert Opinion Consensus Recommendations.", "pmid": "36057761"}]}, {"section": "产品使用问题", "question": "如何从翼弗瑞®转换至其他药物？", "answer": "终止使用翼弗瑞®时，应该在至少2周内逐渐降低剂量。如果因为严重不良事件而需要停药，可以考虑快速停药。 西诺氨酯片说明书.", "refs": []}, {"section": "产品使用问题", "question": "患者漏服药物如何处理？", "answer": "目前尚无与患者漏服药物相关的研究。<br>根据翼弗瑞®被欧洲药品管理局批准的产品说明书，如果漏服单次剂量且漏服时间在12个小时内应当立刻补服漏服剂量；如果漏服时间超过12个小时，应当跳过漏服剂量并在通常用药时间服用下一剂。不可使用双倍剂量来弥补漏服剂量。<br>目前尚无针对翼弗瑞®漏服多次剂量的研究和处理建议。 Ontozry (Cenobamate) SmPC.", "refs": []}, {"section": "产品使用问题", "question": "患者过量服用药物如何处理？", "answer": "尚无西诺氨酯用药过量的特效解毒剂。如果发生用药过量，应采用处理用药过量的标准临床治疗方法。应确保气道通畅、氧合和通气功能充分；并推荐监测心率和心律以及生命体征。<br>没有关于使用透析去除西诺氨酯的数据。 西诺氨酯片说明书.", "refs": []}, {"section": "产品使用问题", "question": "什么情况下需要立即停药？", "answer": "如果因为严重不良事件而需要停药，可以考虑快速停药。 西诺氨酯片说明书.", "refs": []}, {"section": "疗效/安全性相关问题", "question": "翼弗瑞®开始用药后多久起效？", "answer": "翼弗瑞®滴定期5-6周时即可起效：<br>C035研究是翼弗瑞®在中日韩三国开展的多中心随机对照研究，纳入经1-3种ASMs治疗仍控制不佳的局灶性癫痫患者，探索翼弗瑞®添加治疗的疗效和安全性。对滴定期每2周的疗效进行分析，在5-6周时，翼弗瑞®组50%应答率相比安慰剂组显著提高 (45.3% vs 34.2%, p=0.04)。 ASMs，抗癫痫发作药物", "refs": [{"text": "Kawai K, et al. Epilepsia. Published online November 13, 2025.", "title": "Early response rates with adjunctive cenobamate in uncontrolled focal seizures: Prospective analysis of a randomized, double-blind, placebo-controlled study in a multinational Asian population.", "abstract": "To examine early responses to cenobamate therapy using prospective data from a dose-response study in Asian patients with focal seizures (YKP3089C035, C035) that employed a titration regimen starting at 12.5 mg/day. In Study C035, adults 18-70 years of age with uncontrolled focal seizu", "url": "https://pubmed.ncbi.nlm.nih.gov/41230998/", "type": "literature", "doi": "10.1111/epi.70012", "abstract_full": "OBJECTIVE: To examine early responses to cenobamate therapy using prospective data from a dose-response study in Asian patients with focal seizures (YKP3089C035, C035) that employed a titration regimen starting at 12.5 mg/day. METHODS: In Study C035, adults 18-70 years of age with uncontrolled focal seizures despite treatment with 1-3 antiseizure medications were randomized 1:1:1:1 to receive placebo or adjunctive cenobamate 100, 200, or 400 mg/day. The 24-week double-blind study included an 18-week titration and 6-week maintenance phase. During the first 8 weeks of titration (\"early titration phase\"), all cenobamate patients received the same dosing regimen: 12.5 mg/day for 2 weeks, 25 mg/day for 2 weeks, 50 mg/day for 2 weeks, and 100 mg/day for 2 weeks. Change in seizure frequency from baseline and responder rates were assessed at these 2-week intervals for combined cenobamate dose groups vs placebo. Analyses were performed on the modified intent-to-treat maintenance (MITT-M) population (≥1 study drug dose and seizure data in the maintenance phase); all patients completed early titration. RESULTS: Of 519 patients randomized, 446 were included in the MITT-M population (placebo n = 117, cenobamate n = 329). During Weeks 1-2, 3-4, 5-6, and 7-8 of titration, cenobamate patients experienced a median reduction in 28-day seizure frequency of 16.0% (vs 20.0% placebo, p = .81), 27.3% (vs 22.2% placebo, p = .42), 42.9% (vs 15.4% placebo, p = .002), and 55.6% (vs 20.0% placebo, p < .001), respectively. During Weeks 5-6 and 7-8, the 100% responder rates for cenobamate 50 and 100 mg/day were 17.0% (vs 12.8% placebo, p = .29) and 26.7% (vs 8.5% placebo, p < .001), respectively. SIGNIFICANCE: Statistically significant responses to cenobamate treatment occurred within the first 8 weeks of titration, including a 42.9% median reduction in 28-day seizure frequency (Weeks 5-6) and a seizure-free rate of 26.7% (Weeks 7-8). These data show that substantial seizure reductions occurred in many patients early during cenobamate titration.", "abstract_zh": "目的：利用一项在亚洲局灶性发作患者中进行的剂量-反应研究（YKP3089C035，C035）的前瞻性数据，检验西诺氨酯治疗的早期反应，该研究采用了从12.5 mg/天起始的滴定方案。方法：在C035研究中，18-70岁、尽管使用1-3种抗癫痫发作药物仍存在未控制局灶性发作的成人，以1:1:1:1随机分配接受安慰剂或辅助西诺氨酯100、200或400 mg/天。24周双盲研究包括18周滴定期和6周维持期。在滴定的前8周（\"早期滴定期\"），所有西诺氨酯患者接受相同给药方案：12.5 mg/天2周，25 mg/天2周，50 mg/天2周，100 mg/天2周。在这些2周间隔评估合并西诺氨酯剂量组与安慰剂组的发作频率变化和应答率。分析在改良意向性治疗维持（MITT-M）人群（≥1次研究药物剂量且维持期有发作数据）中进行；所有患者均完成早期滴定。结果：519例随机化患者中，446例纳入MITT-M人群（安慰剂n = 117，西诺氨酯n = 329）。在滴定第1-2周、3-4周、5-6周和7-8周，西诺氨酯患者28天发作频率中位数降低分别为16.0%（安慰剂20.0%，p = .81）、27.3%（安慰剂22.2%，p = .42）、42.9%（安慰剂15.4%，p = .002）和55.6%（安慰剂20.0%，p < .001）。在第5-6周和7-8周，西诺氨酯50和100 mg/天的100%应答率（无发作率）分别为17.0%（安慰剂12.8%，p = .29）和26.7%（安慰剂8.5%，p < .001）。意义：西诺氨酯治疗的统计学显著反应发生在滴定的前8周内，包括28天发作频率中位数降低42.9%（第5-6周）和无发作率26.7%（第7-8周）。这些数据表明，许多患者在西诺氨酯滴定早期即出现大幅发作减少。", "title_full": "Early response rates with adjunctive cenobamate in uncontrolled focal seizures: Prospective analysis of a randomized, double-blind, placebo-controlled study in a multinational Asian population.", "pmid": "41230998"}]}, {"section": "疗效/安全性相关问题", "question": "翼弗瑞®滴定至多少剂量时起效？", "answer": "翼弗瑞®滴定至50mg/d时即可起效：<br>C035研究是翼弗瑞®在中日韩三国开展的多中心随机对照研究，纳入经1-3种ASMs治疗仍控制不佳的局灶性癫痫患者，探索翼弗瑞®添加治疗的疗效。对滴定期每2周的疗效进行分析，在5-6周时，翼弗瑞®剂量为50mg/d，翼弗瑞®组50%应答率相比安慰剂组显著提高 (45.3% vs 34.2%, p=0.04)。随滴定继续，疗效差距进一步扩大，7-8周时翼弗瑞®100mg/d和安慰剂组的50%应答率分别为 54.4%和29.1% (p<0.001) ASMs，抗癫痫发作药物", "refs": [{"text": "Kawai K, et al. Epilepsia. Published online November 13, 2025.", "title": "Early response rates with adjunctive cenobamate in uncontrolled focal seizures: Prospective analysis of a randomized, double-blind, placebo-controlled study in a multinational Asian population.", "abstract": "To examine early responses to cenobamate therapy using prospective data from a dose-response study in Asian patients with focal seizures (YKP3089C035, C035) that employed a titration regimen starting at 12.5 mg/day. In Study C035, adults 18-70 years of age with uncontrolled focal seizu", "url": "https://pubmed.ncbi.nlm.nih.gov/41230998/", "type": "literature", "doi": "10.1111/epi.70012", "abstract_full": "OBJECTIVE: To examine early responses to cenobamate therapy using prospective data from a dose-response study in Asian patients with focal seizures (YKP3089C035, C035) that employed a titration regimen starting at 12.5 mg/day. METHODS: In Study C035, adults 18-70 years of age with uncontrolled focal seizures despite treatment with 1-3 antiseizure medications were randomized 1:1:1:1 to receive placebo or adjunctive cenobamate 100, 200, or 400 mg/day. The 24-week double-blind study included an 18-week titration and 6-week maintenance phase. During the first 8 weeks of titration (\"early titration phase\"), all cenobamate patients received the same dosing regimen: 12.5 mg/day for 2 weeks, 25 mg/day for 2 weeks, 50 mg/day for 2 weeks, and 100 mg/day for 2 weeks. Change in seizure frequency from baseline and responder rates were assessed at these 2-week intervals for combined cenobamate dose groups vs placebo. Analyses were performed on the modified intent-to-treat maintenance (MITT-M) population (≥1 study drug dose and seizure data in the maintenance phase); all patients completed early titration. RESULTS: Of 519 patients randomized, 446 were included in the MITT-M population  嗜睡、γ-谷氨酰转移酶（GGT）升高、复视、 白细胞计数降低、食欲减退、呕吐、恶心1。大多数不良反应 (96.9%)属于轻中度2。", "refs": [{"text": "1. 西诺氨酯片说明书", "title": "西诺氨酯片说明书", "abstract": "", "url": null, "type": "package_insert"}, {"text": "2. Lee SK, et al. Epilepsia. Published online October 27, 2025.", "title": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "abstract": "This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. Adults 18-70 years of age with ≥8 seizures (focal aware", "url": "https://pubmed.ncbi.nlm.nih.gov/41144696/", "type": "literature", "doi": "10.1111/epi.18698", "abstract_full": "OBJECTIVES: This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. METHODS: Adults 18-70 years of age with ≥8 seizures (focal aware motor, focal impaired awareness, or focal to bilateral tonic-clonic) during an 8-week baseline, despite treatment with 1-3 antiseizure medications (ASMs), were randomized 1:1:1:1 to placebo or cenobamate 100, 200, or 400 mg/day. The study included an 18-week titration phase and a 6-week maintenance phase. The primary efficacy analysis was a hierarchical step-down comparison of the percent change from baseline in 28-day seizure frequency vs placebo during the maintenance phase for cenobamate 200, then 400, and then 100 mg/day. RESULTS: Among 519 patients randomized, 446 received ≥1 dose of study drug and had ≥1 efficacy measure during the maintenance phase (placebo, n = 117; 100 mg/day, n = 113; 200 mg/day, n = 113; and 400 mg/day, n = 103). Median percent change in seizure frequency during the maintenance phase was -25.9% for placebo vs -42.6%, -78.3%, and -100% for cenobamate 100, 200, and 400 mg/day, respectively (all p's < .001). During the 12-week period encompassing the last 6 weeks of titration and the 6-week maintenance phase (secondary outcome), the median percent change in seizure frequency was -20.1% for placebo vs -42.6%, -77.1%, and -89.2% for cenobamate 100, 200, and 400 mg/day, respectively. Seizure-free rates during the maintenance phase were 2.6% of patients for placebo vs 12.4%, 30.1%, and 52.4% for cenobamate 100, 200, and 400 mg/day, respectively, and during the 12-week period were 0.8% for placebo vs 8.5%, 19.7%, and 30.6% for the cenobamate groups. The most common treatment-emergent adverse events in cenobamate patients (≥20%) were dose-related dizziness and somnolence. SIGNIFICANCE: Cenobamate 100, 200, and 400 mg/day reduced focal seizures in Asian patients in a dose-related fashion and was generally well tolerated.", "abstract_zh": "目的：本随机、双盲、安慰剂对照研究（NCT04557085）在中国、日本和韩国进行，评估辅助西诺氨酯在未控制局灶性发作患者中的疗效和安全性。方法：18-70岁、在8周基线期内尽管使用1-3种抗癫痫发作药物（ASM）仍有≥8次发作（局灶性意识运动性发作、局灶性意识受损性发作或局灶性进展为双侧强直-阵挛发作）的成人，以1:1:1:1随机分配接受安慰剂或西诺氨酯100、200或400 mg/天。研究包括18周滴定期和6周维持期。主要疗效分析为维持期西诺氨酯200 mg、然后400 mg、然后100 mg/天与安慰剂相比28天发作频率较基线百分比变化的分层降序比较。结果：519例随机化患者中，446例接受≥1次研究药物剂量且维持期有≥1次疗效评估（安慰剂n = 117；100 mg/天n = 113；200 mg/天n = 113；400 mg/天n = 103）。维持期发作频率中位数百分比变化：安慰剂为-25.9%，西诺氨酯100、200和400 mg/天分别为-42.6%、-78.3%和-100%（均p < .001）。在涵盖滴定最后6周和6周维持期的12周期间（次要终点），发作频率中位数百分比变化：安慰剂为-20.1%，西诺氨酯100、200和400 mg/天分别为-42.6%、-77.1%和-89.2%。维持期无发作率：安慰剂为2.6%，西诺氨酯100、200和400 mg/天分别为12.4%、30.1%和52.4%；12周期间分别为安慰剂0.8%，西诺氨酯组8.5%、19.7%和30.6%。西诺氨酯患者中最常见（≥20%）的治疗中出现的不良事件为剂量相关的头晕和嗜睡。意义：西诺氨酯100、200和400 mg/天以剂量相关方式减少亚洲患者的局灶性发作，且总体耐受性良好。", "title_full": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "pmid": "41144696"}]}, {"section": "疗效/安全性相关问题", "question": "翼弗瑞®有哪些严重不良反应？", "answer": "亚洲随机双盲安慰剂对照添加治疗试验 (C035) 中，翼弗瑞®100mg/d、200mg/d、400mg/d剂量组，严重不良事件的发生率分别为3.1%、3.8%、8.6%。肺炎是唯一超过1例患者发生的严重不良事件，2例 (1.6%)均发生于400mg/d组1。其他报告的严重不良事件包括冠状动脉粥样硬化、视力模糊、糜烂性胃炎、腹股沟疝、虚弱、冠状病毒感染、胃肠炎、诺如病毒感染、关节脱位、脱水、进食减少、心脏黏液瘤、胃癌、脑膜瘤、癫痫持续状态、头晕、嗜睡、蛛网膜下腔出血、急性肺水肿、吸入性肺炎、气胸、肺栓塞、深静脉血栓 (均为1例)。<br>在全球多中心安全性研究 (C021)中，翼弗瑞®严重不良事件发生率 8.1%，最常见的严重不良事件包括 癫痫发作 (1.0%)，癫痫 (n=2, 0.4%)，跌倒、肺炎、头晕 (n=1, 0.3%)，呕吐，阑尾炎，精神状态改变，自杀未遂，丘疹 (n=1, 0.2%)2。", "refs": [{"text": "1. Lee SK, et al. Epilepsia. Published online October 27, 2025", "title": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "abstract": "This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. Adults 18-70 years of age with ≥8 seizures (focal aware", "url": "https://pubmed.ncbi.nlm.nih.gov/41144696/", "type": "literature", "doi": "10.1111/epi.18698", "abstract_full": "OBJECTIVES: This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. METHODS: Adults 18-70 years of age with ≥8 seizures (focal aware motor, focal impaired awareness, or focal to bilateral tonic-clonic) during an 8-week baseline, despite treatment with 1-3 antiseizure medications (ASMs), were randomized 1:1:1:1 to placebo or cenobamate 100, 200, or 400 mg/day. The study included an 18-week titration phase and a 6-week maintenance phase. The primary efficacy analysis was a hierarchical step-down comparison of the percent change from baseline in 28-day seizure frequency vs placebo during the maintenance phase for cenobamate 200, then 400, and then 100 mg/day. RESULTS: Among 519 patients randomized, 446 received ≥1 dose of study drug and had ≥1 efficacy measure during the maintenance phase (placebo, n = 117; 100 mg/day, n = 113; 200 mg/day, n = 113; and 400 mg/day, n = 103). Median percent change in seizure frequency during the maintenance phase was -25.9% for placebo vs -42.6%, -78.3%, and -100% for cenobamate 100, 200, and 400 mg/day, respectively (all p's < .001). During the 12-week period encompassing the last 6 weeks of titration and the 6-week maintenance phase (secondary outcome), the median percent change in seizure frequency was -20.1% for placebo vs -42.6%, -77.1%, and -89.2% for cenobamate 100, 200, and 400 mg/day, respectively. Seizure-free rates during the maintenance phase were 2.6% of patients for placebo vs 12.4%, 30.1%, and 52.4% for cenobamate 100, 200, and 400 mg/day, respectively, and during the 12-week period were 0.8% for placebo vs 8.5%, 19.7%, and 30.6% for the cenobamate groups. The most common treatment-emergent adverse events in cenobamate patients (≥20%) were dose-related dizziness and somnolence. SIGNIFICANCE: Cenobamate 100, 200, and 400 mg/day reduced focal seizures in Asian patients in a dose-related fashion and was generally well tolerated.", "abstract_zh": "目的：本随机、双盲、安慰剂对照研究（NCT04557085）在中国、日本和韩国进行，评估辅助西诺氨酯在未控制局灶性发作患者中的疗效和安全性。方法：18-70岁、在8周基线期内尽管使用1-3种抗癫痫发作药物（ASM）仍有≥8次发作（局灶性意识运动性发作、局灶性意识受损性发作或局灶性进展为双侧强直-阵挛发作）的成人，以1:1:1:1随机分配接受安慰剂或西诺氨酯100、200或400 mg/天。研究包括18周滴定期和6周维持期。主要疗效分析为维持期西诺氨酯200 mg、然后400 mg、然后100 mg/天与安慰剂相比28天发作频率较基线百分比变化的分层降序比较。结果：519例随机化患者中，446例接受≥1次研究药物剂量且维持期有≥1次疗效评估（安慰剂n = 117；100 mg/天n = 113；200 mg/天n = 113；400 mg/天n = 103）。维持期发作频率中位数百分比变化：安慰剂为-25.9%，西诺氨酯100、200和400 mg/天分别为-42.6%、-78.3%和-100%（均p < .001）。在涵盖滴定最后6周和6周维持期的12周期间（次要终点），发作频率中位数百分比变化：安慰剂为-20.1%，西诺氨酯100、200和400 mg/天分别为-42.6%、-77.1%和-89.2%。维持期无发作率：安慰剂为2.6%，西诺氨酯100、200和400 mg/天分别为12.4%、30.1%和52.4%；12周期间分别为安慰剂0.8%，西诺氨酯组8.5%、19.7%和30.6%。西诺氨酯患者中最常见（≥20%）的治疗中出现的不良事件为剂量相关的头晕和嗜睡。意义：西诺氨酯100、200和400 mg/天以剂量相关方式减少亚洲患者的局灶性发作，且总体耐受性良好。", "title_full": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "pmid": "41144696"}, {"text": "2. Sperling MR, et al. Epilepsia. 2020;61(6):1099-1108.", "title": "Cenobamate (YKP3089) as adjunctive treatment for uncontrolled focal seizures in a large, phase 3, multicenter, open-label safety study.", "abstract": "During the development of cenobamate, an antiseizure medication (ASM) for focal seizures, three cases of drug reaction with eosinophilia and systemic symptoms (DRESS) occurred. To mitigate the rate of DRESS, a start-low, go-slow approach was studied in an ongoing, open-label, multicenter study. Also", "url": "https://pubmed.ncbi.nlm.nih.gov/32396252/", "type": "literature", "doi": "10.1111/epi.16525", "abstract_full": "OBJECTIVE: During the development of cenobamate, an antiseizure medication (ASM) for focal seizures, three cases of drug reaction with eosinophilia and systemic symptoms (DRESS) occurred. To mitigate the rate of DRESS, a start-low, go-slow approach was studied in an ongoing, open-label, multicenter study. Also examined were long-term safety of cenobamate and a method for managing the pharmacokinetic interaction between cenobamate, a 2C19 inhibitor, and concomitant phenytoin or phenobarbital. METHODS: Patients 18-70 years old with uncontrolled focal seizures taking stable doses of one to three ASMs were enrolled. Cenobamate 12.5 mg/d was initiated and increased at 2-week intervals to 25, 50, 100, 150, and 200 mg/d. Additional biweekly 50 mg/d increases to 400 mg/d were allowed. During titration, patients taking phenytoin or phenobarbital could not have their cenobamate titration rate or other concomitant ASMs adjusted; phenytoin/phenobarbital doses could be decreased by 25%-33%. RESULTS: At data cutoff (median treatment duration = 9 months), 1347 patients were enrolled, of whom 269 (20.0%) discontinued, most commonly due to adverse events (n = 137) and consent withdrawn for reason other than adverse event (n = 74); 1339 patients received ≥1 treatment dose (median modal dose = 200 mg). The most common treatment-emergent adverse events (TEAEs) were somnolence (28.1%), dizziness (23.6%), and fatigue (16.6%). Serious TEAEs occurred in 108 patients (8.1%), most commonly seizure (n = 14), epilepsy (n = 5), and pneumonia, fall, and dizziness (n = 4 each). No cases of DRESS were identified. In the phenytoin/phenobarbital groups, 43.4% (36/114) and 29.7% (11/51) of patients, respectively, had their doses decreased. At the end of titration, mean plasma phenytoin/phenobarbital levels were generally comparable to baseline. SIGNIFICANCE: No cases of DRESS were identified in 1339 patients exposed to cenobamate using a start-low (12.5 mg/d), go-slow titration approach. Cenobamate was generally well tolerated in the long term, with no new safety issues found. Phenytoin/phenobarbital dose reductions (25%-33%), when needed during cenobamate titration, maintained stable plasma levels.", "abstract_zh": "目的：在西诺氨酯——一种用于局灶性发作的抗癫痫发作药物（ASM）——的开发过程中，发生了3例伴嗜酸性粒细胞增多和系统症状的药物反应（DRESS）。为降低DRESS发生率，在一项正在进行的多中心开放标签研究中研究了低起始、缓慢加量的方案。同时考察了西诺氨酯的长期安全性以及管理西诺氨酯（一种2C19抑制剂）与合并苯妥英或苯巴比妥之间药代动力学相互作用的方法。方法：纳入18-70岁、在稳定剂量1-3种ASM下仍有未控制局灶性发作的患者。西诺氨酯从12.5 mg/天起始，以2周间隔递增至25、50、100、150和200 mg/天。允许以每两周50 mg/天的增量进一步增加至400 mg/天。滴定期间，服用苯妥英或苯巴比妥的患者不能调整西诺氨酯滴定速度或其他合并ASM；苯妥英/苯巴比妥剂量可减少25%-33%。结果：在数据截止时（中位治疗持续时间=9个月），共入组1347例患者，其中269例（20.0%）停药，最常见原因为不良事件（n = 137）和因非不良事件原因撤回知情同意（n = 74）；1339例患者接受≥1次治疗剂量（中位模式剂量=200 mg）。最常见治疗中出现的不良事件（TEAEs）为嗜睡（28.1%）、头晕（23.6%）和疲乏（16.6%）。108例患者（8.1%）发生严重TEAEs，最常见为癫痫发作（n = 14）、癫痫（n = 5）以及肺炎、跌倒和头晕（各n = 4）。未发现DRESS病例。在苯妥英/苯巴比妥组中，分别有43.4%（36/114）和29.7%（11/51）的患者减量。滴定结束时，平均苯妥英/苯巴比妥血浆水平总体与基线相当。意义：在1339例采用低起始（12.5 mg/天）、缓慢加量滴定方案暴露于西诺氨酯的患者中，未发现DRESS病例。西诺氨酯长期耐受性总体良好，未发现新的安全性问题。苯妥英/苯巴比妥在需要时于西诺氨酯滴定期间减量（25%-33%），可维持稳定的血浆水平。", "title_full": "Cenobamate (YKP3089) as adjunctive treatment for uncontrolled focal seizures in a large, phase 3, multicenter, open-label safety study.", "pmid": "32396252"}]}, {"section": "疗效/安全性相关问题", "question": "导致翼弗瑞®停药的不良反应有哪些，发生率如何？", "answer": "亚洲随机双盲安慰剂对照添加治疗试验 (C035) 中，翼弗瑞®100mg/d、200mg/d、400mg/d剂量组，导致停药的不良事件发生率分别为4.7%、9.2%、21.9%。最常见的导致停药的不良事件为头晕 (100mg/d、200mg/d、400mg/d组发生率分别为1.6%、4.6%和14.1%) 和嗜睡 (100mg/d、200mg/d、400mg/d组发生率分别为0%、1.5%和4.7%) 。", "refs": [{"text": "Lee SK, et al. Epilepsia. Published online October 27, 2025.", "title": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "abstract": "This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. Adults 18-70 years of age with ≥8 seizures (focal aware", "url": "https://pubmed.ncbi.nlm.nih.gov/41144696/", "type": "literature", "doi": "10.1111/epi.18698", "abstract_full": "OBJECTIVES: This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. METHODS: Adults 18-70 years of age with ≥8 seizures (focal aware motor, focal impaired awareness, or focal to bilateral tonic-clonic) during an 8-week baseline, despite treatment with 1-3 antiseizure medications (ASMs), were randomized 1:1:1:1 to placebo or cenobamate 100, 200, or 400 mg/day. The study included an 18-week titration phase and a 6-week maintenance phase. The primary efficacy analysis was a hierarchical step-down comparison of the percent change from baseline in 28-day seizure frequency vs placebo during the maintenance phase for cenobamate 200, then 400, and then 100 mg/day. RESULTS: Among 519 patients randomized, 446 received ≥1 dose of study drug and had ≥1 efficacy measure during the maintenance phase (placebo, n = 117; 100 mg/day, n = 113; 200 mg/day, n = 113; and 400 mg/day, n = 103). Median percent change in seizure frequency during the maintenance phase was -25.9% for placebo vs -42.6%, -78.3%, and -100% for cenobamate 100, 200, and 400 mg/day, respectively (all p's < .001). During the 12-week period encompassing the last 6 weeks of titration and the 6-week maintenance phase (secondary outcome), the median percent change in seizure frequency was -20.1% for placebo vs -42.6%, -77.1%, and -89.2% for cenobamate 100, 200, and 400 mg/day, respectively. Seizure-free rates during the maintenance phase were 2.6% of patients for placebo vs 12.4%, 30.1%, and 52.4% for cenobamate 100, 200, and 400 mg/day, respectively, and during the 12-week period were 0.8% for placebo vs 8.5%, 19.7%, and 30.6% for the cenobamate groups. The most common treatment-emergent adverse events in cenobamate patients (≥20%) were dose-related dizziness and somnolence. SIGNIFICANCE: Cenobamate 100, 200, and 400 mg/day reduced focal seizures in Asian patients in a dose-related fashion and was generally well tolerated.", "abstract_zh": "目的：本随机、双盲、安慰剂对照研究（NCT04557085）在中国、日本和韩国进行，评估辅助西诺氨酯在未控制局灶性发作患者中的疗效和安全性。方法：18-70岁、在8周基线期内尽管使用1-3种抗癫痫发作药物（ASM）仍有≥8次发作（局灶性意识运动性发作、局灶性意识受损性发作或局灶性进展为双侧强直-阵挛发作）的成人，以1:1:1:1随机分配接受安慰剂或西诺氨酯100、200或400 mg/天。研究包括18周滴定期和6周维持期。主要疗效分析为维持期西诺氨酯200 mg、然后400 mg、然后100 mg/天与安慰剂相比28天发作频率较基线百分比变化的分层降序比较。结果：519例随机化患者中，446例接受≥1次研究药物剂量且维持期有≥1次疗效评估（安慰剂n = 117；100 mg/天n = 113；200 mg/天n = 113；400 mg/天n = 103）。维持期发作频率中位数百分比变化：安慰剂为-25.9%，西诺氨酯100、200和400 mg/天分别为-42.6%、-78.3%和-100%（均p < .001）。在涵盖滴定最后6周和6周维持期的12周期间（次要终点），发作频率中位数百分比变化：安慰剂为-20.1%，西诺氨酯100、200和400 mg/天分别为-42.6%、-77.1%和-89.2%。维持期无发作率：安慰剂为2.6%，西诺氨酯100、200和400 mg/天分别为12.4%、30.1%和52.4%；12周期间分别为安慰剂0.8%，西诺氨酯组8.5%、19.7%和30.6%。西诺氨酯患者中最常见（≥20%）的治疗中出现的不良事件为剂量相关的头晕和嗜睡。意义：西诺氨酯100、200和400 mg/天以剂量相关方式减少亚洲患者的局灶性发作，且总体耐受性良好。", "title_full": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "pmid": "41144696"}]}, {"section": "疗效/安全性相关问题", "question": "翼弗瑞®皮疹发生比例多少？如何处理？", "answer": "中日韩三国开展的III期临床研究中皮疹的发生率为1.6% (8/516)。 所有皮疹均为轻度，没有严重或重度皮肤不良事件报告，研究中仅100mg/d组有1例患者因皮疹停药1。<br>2024年发表的一份欧洲专家共识推荐，严格遵守说明书推荐剂量滴定有助于最小化皮疹的发生风险。当患者新出现皮疹时，应建议患者暂停用药，拍摄皮疹照片并立即就医2。", "refs": [{"text": "1. Lee SK, et al. Epilepsia. Published online October 27, 2025", "title": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "abstract": "This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. Adults 18-70 years of age with ≥8 seizures (focal aware", "url": "https://pubmed.ncbi.nlm.nih.gov/41144696/", "type": "literature", "doi": "10.1111/epi.18698", "abstract_full": "OBJECTIVES: This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. METHODS: Adults 18-70 years of age with ≥8 seizures (focal aware motor, focal impaired awareness, or focal to bilateral tonic-clonic) during an 8-week baseline, despite treatment with 1-3 antiseizure medications (ASMs), were randomized 1:1:1:1 to placebo or cenobamate 100, 200, or 400 mg/day. The study included an 18-week titration phase and a 6-week maintenance phase. The primary efficacy analysis was a hierarchical step-down comparison of the percent change from baseline in 28-day seizure frequency vs placebo during the maintenance phase for cenobamate 200, then 400, and then 100 mg/day. RESULTS: Among 519 patients randomized, 446 received ≥1 dose of study drug and had ≥1 efficacy measure during the maintenance phase (placebo, n = 117; 100 mg/day, n = 113; 200 mg/day, n = 113; and 400 mg/day, n = 103). Median percent change in seizure frequency during the maintenance phase was -25.9% for placebo vs -42.6%, -78.3%, and -100% for cenobamate 100, 200, and 400 mg/day, respectively (all p's < .001). During the 12-week period encompassing the last 6 weeks of titration and the 6-week maintenance phase (secondary outcome), the median percent change in seizure frequency was -20.1% for placebo vs -42.6%, -77.1%, and -89.2% for cenobamate 100, 200, and 400 mg/day, respectively. Seizure-free rates during the maintenance phase were 2.6% of patients for placebo vs 12.4%, 30.1%, and 52.4% for cenobamate 100, 200, and 400 mg/day, respectively, and during the 12-week period were 0.8% for placebo vs 8.5%, 19.7%, and 30.6% for the cenobamate groups. The most common treatment-emergent adverse events in cenobamate patients (≥20%) were dose-related dizziness and somnolence. SIGNIFICANCE: Cenobamate 100, 200, and 400 mg/day reduced focal seizures in Asian patients in a dose-related fashion and was generally well tolerated.", "abstract_zh": "目的：本随机、双盲、安慰剂对照研究（NCT04557085）在中国、日本和韩国进行，评估辅助西诺氨酯在未控制局灶性发作患者中的疗效和安全性。方法：18-70岁、在8周基线期内尽管使用1-3种抗癫痫发作药物（ASM）仍有≥8次发作（局灶性意识运动性发作、局灶性意识受损性发作或局灶性进展为双侧强直-阵挛发作）的成人，以1:1:1:1随机分配接受安慰剂或西诺氨酯100、200或400 mg/天。研究包括18周滴定期和6周维持期。主要疗效分析为维持期西诺氨酯200 mg、然后400 mg、然后100 mg/天与安慰剂相比28天发作频率较基线百分比变化的分层降序比较。结果：519例随机化患者中，446例接受≥1次研究药物剂量且维持期有≥1次疗效评估（安慰剂n = 117；100 mg/天n = 113；200 mg/天n = 113；400 mg/天n = 103）。维持期发作频率中位数百分比变化：安慰剂为-25.9%，西诺氨酯100、200和400 mg/天分别为-42.6%、-78.3%和-100%（均p < .001）。在涵盖滴定最后6周和6周维持期的12周期间（次要终点），发作频率中位数百分比变化：安慰剂为-20.1%，西诺氨酯100、200和400 mg/天分别为-42.6%、-77.1%和-89.2%。维持期无发作率：安慰剂为2.6%，西诺氨酯100、200和400 mg/天分别为12.4%、30.1%和52.4%；12周期间分别为安慰剂0.8%，西诺氨酯组8.5%、19.7%和30.6%。西诺氨酯患者中最常见（≥20%）的治疗中出现的不良事件为剂量相关的头晕和嗜睡。意义：西诺氨酯100、200和400 mg/天以剂量相关方式减少亚洲患者的局灶性发作，且总体耐受性良好。", "title_full": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "pmid": "41144696"}, {"text": "2. Steinhoff BJ, et al. Ther Adv Neurol Disord. 2024;17:17562864241256733.", "title": "Therapeutic strategies during cenobamate treatment initiation: Delphi panel recommendations.", "abstract": "The goal of epilepsy treatment is seizure freedom, typically with antiseizure medication (ASM). If patients fail to attain seizure control despite two trials of appropriately chosen ASMs at adequate doses, they are classified as having drug-resistant epilepsy (DRE). Adverse events (AEs) commonly occ", "url": "https://pubmed.ncbi.nlm.nih.gov/38883228/", "type": "literature", "doi": "10.1177/17562864241256733", "abstract_full": "The goal of epilepsy treatment is seizure freedom, typically with antiseizure medication (ASM). If patients fail to attain seizure control despite two trials of appropriately chosen ASMs at adequate doses, they are classified as having drug-resistant epilepsy (DRE). Adverse events (AEs) commonly occur in people with DRE because they are typically on ⩾2 ASMs, increasing the potential for drug-drug interactions. Early emerging AEs may impact adherence, decrease quality of life, and delay achieving optimal treatment dosages. Cenobamate is an oral ASM with a long half-life which has proven to be highly effective in clinical trials. An international Delphi panel of expert epileptologists experienced in the clinical use of cenobamate and other ASMs was convened to develop consensus best practices for managing patients during and after cenobamate titration, with consideration for its known pharmacokinetic and pharmacodynamic interactions, to allow patients to reach the most appropriate cenobamate dose while limiting tolerability issues. The modified Delphi process included one open-ended questionnaire and one virtual face-to-face meeting. Participants agreed that cenobamate can be prescribed for most patients experiencing focal-onset seizures. Patients initiating cenobamate therapy should have access to healthcare professionals as needed and their treatment response should be evaluated at the 100-mg dose. Patients with intellectual disabilities may need additional support to navigate the titration period. Proactive down-titration or withdrawal of sodium channel blockers (SCBs) is recommended when concomitant ASM regimens include ⩾2 SCBs. When applicable, maintaining a concomitant clobazam dose at ~5-10 mg may be beneficial. Patients taking oral contraceptives, newer oral anticoagulants, or HIV antiretroviral medications should be monitored for potential interactions. Because clinical evidence informing treatment decisions is limited, guidance regarding dose adjustments of non-ASM drugs was not developed beyond specific recommendations presented in the Summary of Product Characteristics.", "abstract_zh": "癫痫治疗的目标是无发作，通常通过抗癫痫发作药物（ASM）实现。如果患者尽管在适当剂量下尝试了两种ASM仍未能实现发作控制，则被归类为药物难治性癫痫（DRE）。DRE患者常发生不良事件（AEs），因为他们通常使用≥2种ASM，增加了药物-药物相互作用的可能。早期出现的AEs可能影响依从性、降低生活质量并延迟达到最佳治疗剂量。西诺氨酯是一种半衰期较长的口服ASM，在临床试验中已证实高度有效。召集了一个由在临床使用西诺氨酯和其他ASM方面经验丰富的癫痫专家组成的国际德尔菲专家组，以制定在管理西诺氨酯滴定期间和滴定后患者的最佳实践共识，考虑其已知的药代动力学和药效学相互作用，使患者能够达到最合适的西诺氨酯剂量同时限制耐受性问题。改良德尔菲法包括一次开放式问卷调查和一次虚拟面对面会议。参与者一致认为，西诺氨酯可用于大多数局灶性发作患者。启动西诺氨酯治疗的患者应能按需联系医疗专业人员，并应在100 mg剂量时评估治疗反应。智力障碍患者可能需要额外支持以度过滴定期。当合并ASM方案包含≥2种SCB时，建议主动下调或停用钠通道阻滞剂（SCB）。如适用，将合并氯巴占剂量维持在约5-10 mg可能有益。服用口服避孕药、新型口服抗凝药或HIV抗逆转录病毒药物的患者应监测潜在相互作用。由于指导治疗决策的临床证据有限，除产品特征摘要中提出的具体推荐外，未制定关于非ASM药物剂量调整的指导。", "title_full": "Therapeutic strategies during cenobamate treatment initiation: Delphi panel recommendations.", "pmid": "38883228"}]}, {"section": "疗效/安全性相关问题", "question": "既往研究中是否出现过DRESS综合征？", "answer": "翼弗瑞®早期临床研究中采用了较快的滴定方式（C013研究1在6周内滴定至200mg/d；C017研究2起始50mg/d，每周加量50mg/d，第5、6周每周加量100mg/d），所有953例接受翼弗瑞®的受试者中发生了3例DRESS事件，包括1例死亡3。<br>虽然FDA认可翼弗瑞®在C017研究中表现出的有效性，为评估长期安全性表现，之后开展的一项安全性III期开放标签研究 (C021研究) 采用12.5mg/d起始剂量，每2周加量1次。研究结果显示在1,339例受试者中没有发生DRESS。在FDA和EMA批准的说明书中也采纳了该滴定方式作为说明书推荐用法3。<br>在中日韩人群中开展的C035研究采用了与C021研究相同的滴定方案，也是首个验证该滴定方案疗效和安全性的III期随机对照研究，结果显示519例受试者均未发生DRESS4。<br>翼弗瑞®在中国获批说明书推荐与C035和C021研究相同的滴定方案，采用说明书推荐的滴定方式有助于降低DRESS发生风险4。 DRESS，药物反应伴嗜酸粒细胞增多和全身性症状", "refs": [{"text": "1. Chung SS, et al. Neurology. 2020;94(22):e2311-e2322", "title": "Randomized phase 2 study of adjunctive cenobamate in patients with uncontrolled focal seizures.", "abstract": "To evaluate the efficacy and safety of adjunctive cenobamate 200 mg/d in patients with uncontrolled focal (partial-onset) seizures despite treatment with 1 to 3 antiepileptic drugs. In this multicenter, double-blind, placebo-controlled study, adults 18 to 65 years of age with focal seizures were ran", "url": "https://pubmed.ncbi.nlm.nih.gov/32409485/", "type": "literature", "doi": "10.1212/WNL.0000000000009530", "abstract_full": "OBJECTIVE: To evaluate the efficacy and safety of adjunctive cenobamate 200 mg/d in patients with uncontrolled focal (partial-onset) seizures despite treatment with 1 to 3 antiepileptic drugs. METHODS: In this multicenter, double-blind, placebo-controlled study, adults 18 to 65 years of age with focal seizures were randomized 1:1 (cenobamate:placebo) after an 8-week baseline period. The 12-week double-blind treatment period consisted of a 6-week titration phase and a 6-week maintenance phase. The primary outcome was percent change in seizure frequency (from baseline) per 28 days during double-blind treatment. RESULTS: Two hundred twenty-two patients were randomized; 113 received cenobamate and 109 received placebo; and 90.3% and 90.8% of patients, respectively, completed double-blind treatment. Median baseline seizure frequency was 6.5 in 28 days (range 0-237). Compared to placebo, cenobamate conferred a greater median percent seizure reduction (55.6% vs 21.5%; p < 0.0001) The responder rate (≥50% reduction in seizure frequency) was 50.4% for cenobamate and 22.2% for placebo (p < 0.0001). Focal seizures with motor component, impaired awareness, and focal to bilateral tonic-clonic seizures were significantly reduced with cenobamate vs placebo. During maintenance, 28.3% of cenobamate-treated and 8.8% of placebo-treated patients were seizure-free. Treatment-emergent adverse events reported in >10% in either group (cenobamate vs placebo) were somnolence (22.1% vs 11.9%), dizziness (22.1% vs 16.5%), headache (12.4% vs 12.8%), nausea (11.5% vs 4.6%), and fatigue (10.6% vs 6.4%). CONCLUSION: Adjunctive treatment with cenobamate 200 mg/d significantly improved seizure control in adults with uncontrolled focal seizures and was well tolerated. CLINICALTRIALSGOV IDENTIFIER: NCT01397968. CLASSIFICATION OF EVIDENCE: This study provides Class I evidence that, for patients with uncontrolled focal seizures, adjunctive cenobamate reduces seizures.", "abstract_zh": "目的：评估辅助西诺氨酯200 mg/天在尽管使用1-3种抗癫痫药物仍存在未控制局灶性（部分性发作）发作患者中的疗效和安全性。方法：在这项多中心、双盲、安慰剂对照研究中，18-65岁局灶性发作成人在8周基线期后以1:1随机分配（西诺氨酯:安慰剂）。12周双盲治疗期包括6周滴定期和6周维持期。主要终点为双盲治疗期间每28天发作频率（较基线）的百分比变化。结果：222例患者随机化；113例接受西诺氨酯，109例接受安慰剂；分别有90.3%和90.8%完成双盲治疗。基线中位发作频率为28天6.5次（范围0-237）。与安慰剂相比，西诺氨酯带来更大的中位发作减少百分比（55.6% vs 21.5%；p < 0.0001）。应答率（发作频率≥50%降低）西诺氨酯为50.4%，安慰剂为22.2%（p < 0.0001）。伴运动成分的局灶性发作、意识受损性发作和局灶性进展为双侧强直-阵挛发作在西诺氨酯组均显著减少。维持期，28.3%的西诺氨酯治疗患者和8.8%的安慰剂治疗患者无发作。任一组中>10%报告的治疗中出现的不良事件（西诺氨酯 vs 安慰剂）为嗜睡（22.1% vs 11.9%）、头晕（22.1% vs 16.5%）、头痛（12.4% vs 12.8%）、恶心（11.5% vs 4.6%）和疲乏（10.6% vs 6.4%）。结论：辅助西诺氨酯200 mg/天显著改善了未控制局灶性发作成人的发作控制，且耐受性良好。临床试验注册号：NCT01397968。证据分级：本研究提供I类证据，证明对于未控制局灶性发作患者，辅助西诺氨酯可减少发作。", "title_full": "Randomized phase 2 study of adjunctive cenobamate in patients with uncontrolled focal seizures.", "pmid": "32409485"}, {"text": "2. Krauss GL, et al. Lancet Neurol. 2020;19(1):38-48", "title": "Safety and efficacy of adjunctive cenobamate (YKP3089) in patients with uncontrolled focal seizures: a multicentre, double-blind, randomised, placebo-controlled, dose-response trial.", "abstract": "More than a third of patients with epilepsy are treatment resistant, and thus new, more effective therapies to achieve seizure freedom are needed. Cenobamate (YKP3089), an investigational antiepileptic drug, has shown broad-spectrum anticonvulsant activity in preclinical studies and seizure models.", "url": "https://pubmed.ncbi.nlm.nih.gov/31734103/", "type": "literature", "doi": "10.1016/S1474-4422(19)30399-0", "abstract_full": "BACKGROUND: More than a third of patients with epilepsy are treatment resistant, and thus new, more effective therapies to achieve seizure freedom are needed. Cenobamate (YKP3089), an investigational antiepileptic drug, has shown broad-spectrum anticonvulsant activity in preclinical studies and seizure models. We aimed to evaluate the safety, efficacy, and tolerability of adjunctive cenobamate in patients with uncontrolled focal (partial)-onset epilepsy. METHODS: We did a multicentre, double-blind, randomised, placebo-controlled, dose-response study at 107 epilepsy and neurology centres in 16 countries. Adult patients (aged 18-70 years) with focal seizures despite treatment with 1-3 antiepileptic drugs were randomly assigned (1:1:1:1) via an interactive web response system, by block sizes of 4 within each country, to adjuvant once daily oral cenobamate at dose groups of 100 mg, 200 mg, or 400 mg, or placebo following an 8-week baseline assessment. Patients, investigators, and study personnel were masked to treatment assignment. The study included a 6-week titration phase and 12-week maintenance phase. The primary efficacy outcomes were percentage change in 28-day focal seizure frequency (focal aware motor, focal impaired awareness, or focal to bilateral tonic-clonic seizures) from baseline analysed in the modified intention-to-treat population (≥1 dose and any post-baseline seizure data) and responder rates (≥50% reduction) analysed in the maintenance phase population (≥1 dose in the maintenance phase and any maintenance phase seizure data). The primary efficacy outcomes were analysed using a hierarchal step-down procedure comparing 200 mg versus placebo, 400 mg versus placebo, then 100 mg versus placebo. Safety and tolerability were compared descriptively across treatment groups for all randomised patients. This study is registered with ClinicalTrials.gov, number NCT01866111. FINDINGS: Between July 31, 2013, and June 22, 2015, 437 patients were randomly assigned to either placebo (n=108) or cenobamate 100 mg (n=108), 200 mg (n=110), or 400 mg (n=111). Of these patients, 434 (106 [98%] in placebo group, 108 [100%] in 100 mg group, 109 [99%] in 200 mg group, and 111 [100%] in 400 mg group) were included in the modified intention-to-treat population, and 397 (102 [94%] in placebo group, 102 [94%] in 100 mg group, 98 [89%] in 200 mg group, and 95 [86%] in 400 mg group) were included in the modified intention-to-treat maintenance phase population. Median percentage changes in seizure frequency were -24·0% (IQR -45·0 to -7·0%) for the placebo group compared with -35·5% (-62·5 to -15·0%; p=0·0071) for the 100 mg dose group, -55·0% (-73·0 to -23·0%; p<0·0001) for the 200 mg dose group, and -55·0% (-85·0 to -28·0%; p<0·0001) for the 400 mg dose group. Responder rates during the maintenance phase were 25% (26 of 102 patients) for the placebo group compared with 40% (41 of 102; odds ratio 1·97, 95% CI 1·08-3·56; p=0·0365) for the 100 mg dose group, 56% (55 of 98; 3·74, 2·06-6·80; p<0·0001) for the 200 mg dose group, and 64% (61 of 95; 5·24, 2·84-9·67; p<0·0001) for the 400 mg dose group. Treatment-emergent adverse events occurred in 76 (70%) of 108 patients in the placebo group, 70 (65%) of 108 in the 100 mg group, 84 (76%) of 110 in the 200 mg group, and 100 (90%) of 111 in the 400 mg group. Treatment-emergent adverse events led to discontinuation in five (5%) patients in the placebo group, 11 (10%) in the 100 mg dose group, 15 (14%) in the 200 mg dose group, and 22 (20%) in the 400 mg dose group. One serious case of drug reaction with eosinophilia and systemic symptoms occurred in the 200 mg cenobamate group. No deaths were reported. INTERPRETATION: Adjunctive cenobamate reduced focal (partial)-onset seizure frequency, in a dose-related fashion. Treatment-emergent adverse events were most frequent in the highest dose group. Cenobamate appears to be an effective treatment option in patients with uncontrolled focal seizures. FUNDING: SK Life Science.", "abstract_zh": "背景：超过三分之一的癫痫患者治疗耐药，因此需要新的、更有效的疗法来实现无发作。西诺氨酯（YKP3089）是一种研究性抗癫痫药物，在临床前研究和发作模型中显示出广谱抗惊厥活性。我们旨在评估辅助西诺氨酯在未控制局灶性（部分性发作）癫痫患者中的安全性、疗效和耐受性。方法：我们在16个国家的107个癫痫和神经病学中心进行了一项多中心、双盲、随机、安慰剂对照、剂量-反应研究。在8周基线评估后，尽管使用1-3种抗癫痫药物仍有局灶性发作的成人患者（18-70岁）通过交互式网络应答系统以1:1:1:1随机分配（按每个国家内4的区组大小），接受辅助每日一次口服西诺氨酯100 mg、200 mg或400 mg，或安慰剂。患者、研究者及研究人员对治疗分配设盲。研究包括6周滴定期和12周维持期。主要疗效终点为改良意向性治疗人群（≥1次剂量且有基线后发作数据）中28天局灶性发作频率（局灶性意识运动性发作、局灶性意识受损性发作或局灶性进展为双侧强直-阵挛发作）较基线的百分比变化，以及维持期人群（≥1次维持期剂量且有维持期发作数据）中的应答率（≥50%降低）。主要疗效终点采用分层降序程序分析，依次比较200 mg vs 安慰剂、400 mg vs 安慰剂、然后100 mg vs 安慰剂。安全性和耐受性在所有随机化患者中按治疗组进行描述性比较。本研究在ClinicalTrials.gov注册，编号NCT01866111。结果：2013年7月31日至2015年6月22日，437例患者随机分配至安慰剂（n=108）或西诺氨酯100 mg（n=108）、200 mg（n=110）或400 mg（n=111）。其中434例（安慰剂组106例[98%]、100 mg组108例[100%]、200 mg组109例[99%]、400 mg组111例[100%]）纳入改良意向性治疗人群，397例（安慰剂组102例[94%]、100 mg组102例[94%]、200 mg组98例[89%]、400 mg组95例[86%]）纳入改良意向性治疗维持期人群。发作频率中位数百分比变化：安慰剂组为-24.0%（IQR -45.0至-7.0%），100 mg组为-35.5%（-62.5至-15.0%；p=0.0071），200 mg组为-55.0%（-73.0至-23.0%；p<0.0001），400 mg组为-55.0%（-85.0至-28.0%；p<0.0001）。维持期应答率：安慰剂组25%（102例中26例），100 mg组40%（102例中41例；OR 1.97，95% CI 1.08-3.56；p=0.0365），200 mg组56%（98例中55例；3.74，2.06-6.80；p<0.0001），400 mg组64%（95例中61例；5.24，2.84-9.67；p<0.0001）。治疗中出现的不良事件发生率：安慰剂组108例中76例（70%），100 mg组108例中70例（65%），200 mg组110例中84例（76%），400 mg组111例中100例（90%）。因治疗中出现的不良事件导致停药：安慰剂组5例（5%），100 mg组11例（10%），200 mg组15例（14%），400 mg组22例（20%）。200 mg西诺氨酯组发生1例严重的伴嗜酸性粒细胞增多和系统症状的药物反应。无死亡报告。解释：辅助西诺氨酯以剂量相关方式减少局灶性（部分性发作）发作频率。治疗中出现的不良事件在最高剂量组最常见。西诺氨酯似乎是未控制局灶性发作患者的有效治疗选择。资助：SK Life Science。", "title_full": "Safety and efficacy of adjunctive cenobamate (YKP3089) in patients with uncontrolled focal seizures: a multicentre, double-blind, randomised, placebo-controlled, dose-response trial.", "pmid": "31734103"}, {"text": "3. Sperling MR, et al. Epilepsia. 2020;61(6):1099-1108", "title": "Cenobamate (YKP3089) as adjunctive treatment for uncontrolled focal seizures in a large, phase 3, multicenter, open-label safety study.", "abstract": "During the development of cenobamate, an antiseizure medication (ASM) for focal seizures, three cases of drug reaction with eosinophilia and systemic symptoms (DRESS) occurred. To mitigate the rate of DRESS, a start-low, go-slow approach was studied in an ongoing, open-label, multicenter study. Also", "url": "https://pubmed.ncbi.nlm.nih.gov/32396252/", "type": "literature", "doi": "10.1111/epi.16525", "abstract_full": "OBJECTIVE: During the development of cenobamate, an antiseizure medication (ASM) for focal seizures, three cases of drug reaction with eosinophilia and systemic symptoms (DRESS) occurred. To mitigate the rate of DRESS, a start-low, go-slow approach was studied in an ongoing, open-label, multicenter study. Also examined were long-term safety of cenobamate and a method for managing the pharmacokinetic interaction between cenobamate, a 2C19 inhibitor, and concomitant phenytoin or phenobarbital. METHODS: Patients 18-70 years old with uncontrolled focal seizures taking stable doses of one to three ASMs were enrolled. Cenobamate 12.5 mg/d was initiated and increased at 2-week intervals to 25, 50, 100, 150, and 200 mg/d. Additional biweekly 50 mg/d increases to 400 mg/d were allowed. During titration, patients taking phenytoin or phenobarbital could not have their cenobamate titration rate or other concomitant ASMs adjusted; phenytoin/phenobarbital doses could be decreased by 25%-33%. RESULTS: At data cutoff (median treatment duration = 9 months), 1347 patients were enrolled, of whom 269 (20.0%) discontinued, most commonly due to adverse events (n = 137) and consent withdrawn for reason other than adverse event (n = 74); 1339 patients received ≥1 treatment dose (median modal dose = 200 mg). The most common treatment-emergent adverse events (TEAEs) were somnolence (28.1%), dizziness (23.6%), and fatigue (16.6%). Serious TEAEs occurred in 108 patients (8.1%), most commonly seizure (n = 14), epilepsy (n = 5), and pneumonia, fall, and dizziness (n = 4 each). No cases of DRESS were identified. In the phenytoin/phenobarbital groups, 43.4% (36/114) and 29.7% (11/51) of patients, respectively, had their doses decreased. At the end of titration, mean plasma phenytoin/phenobarbital levels were generally comparable to baseline. SIGNIFICANCE: No cases of DRESS were identified in 1339 patients exposed to cenobamate using a start-low (12.5 mg/d), go-slow titration approach. Cenobamate was generally well tolerated in the long term, with no new safety issues found. Phenytoin/phenobarbital dose reductions (25%-33%), when needed during cenobamate titration, maintained stable plasma levels.", "abstract_zh": "目的：在西诺氨酯——一种用于局灶性发作的抗癫痫发作药物（ASM）——的开发过程中，发生了3例伴嗜酸性粒细胞增多和系统症状的药物反应（DRESS）。为降低DRESS发生率，在一项正在进行的多中心开放标签研究中研究了低起始、缓慢加量的方案。同时考察了西诺氨酯的长期安全性以及管理西诺氨酯（一种2C19抑制剂）与合并苯妥英或苯巴比妥之间药代动力学相互作用的方法。方法：纳入18-70岁、在稳定剂量1-3种ASM下仍有未控制局灶性发作的患者。西诺氨酯从12.5 mg/天起始，以2周间隔递增至25、50、100、150和200 mg/天。允许以每两周50 mg/天的增量进一步增加至400 mg/天。滴定期间，服用苯妥英或苯巴比妥的患者不能调整西诺氨酯滴定速度或其他合并ASM；苯妥英/苯巴比妥剂量可减少25%-33%。结果：在数据截止时（中位治疗持续时间=9个月），共入组1347例患者，其中269例（20.0%）停药，最常见原因为不良事件（n = 137）和因非不良事件原因撤回知情同意（n = 74）；1339例患者接受≥1次治疗剂量（中位模式剂量=200 mg）。最常见治疗中出现的不良事件（TEAEs）为嗜睡（28.1%）、头晕（23.6%）和疲乏（16.6%）。108例患者（8.1%）发生严重TEAEs，最常见为癫痫发作（n = 14）、癫痫（n = 5）以及肺炎、跌倒和头晕（各n = 4）。未发现DRESS病例。在苯妥英/苯巴比妥组中，分别有43.4%（36/114）和29.7%（11/51）的患者减量。滴定结束时，平均苯妥英/苯巴比妥血浆水平总体与基线相当。意义：在1339例采用低起始（12.5 mg/天）、缓慢加量滴定方案暴露于西诺氨酯的患者中，未发现DRESS病例。西诺氨酯长期耐受性总体良好，未发现新的安全性问题。苯妥英/苯巴比妥在需要时于西诺氨酯滴定期间减量（25%-33%），可维持稳定的血浆水平。", "title_full": "Cenobamate (YKP3089) as adjunctive treatment for uncontrolled focal seizures in a large, phase 3, multicenter, open-label safety study.", "pmid": "32396252"}, {"text": "4. Lee SK, et al. Epilepsia. Published online October 27, 2025", "title": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "abstract": "This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. Adults 18-70 years of age with ≥8 seizures (focal aware", "url": "https://pubmed.ncbi.nlm.nih.gov/41144696/", "type": "literature", "doi": "10.1111/epi.18698", "abstract_full": "OBJECTIVES: This randomized, double-blind, placebo-controlled study (NCT04557085), conducted in China, Japan, and the Republic of Korea, evaluated the efficacy and safety of adjunctive cenobamate in patients with uncontrolled focal seizures. METHODS: Adults 18-70 years of age with ≥8 seizures (focal aware motor, focal impaired awareness, or focal to bilateral tonic-clonic) during an 8-week baseline, despite treatment with 1-3 antiseizure medications (ASMs), were randomized 1:1:1:1 to placebo or cenobamate 100, 200, or 400 mg/day. The study included an 18-week titration phase and a 6-week maintenance phase. The primary efficacy analysis was a hierarchical step-down comparison of the percent change from baseline in 28-day seizure frequency vs placebo during the maintenance phase for cenobamate 200, then 400, and then 100 mg/day. RESULTS: Among 519 patients randomized, 446 received ≥1 dose of study drug and had ≥1 efficacy measure during the maintenance phase (placebo, n = 117; 100 mg/day, n = 113; 200 mg/day, n = 113; and 400 mg/day, n = 103). Median percent change in seizure frequency during the maintenance phase was -25.9% for placebo vs -42.6%, -78.3%, and -100% for cenobamate 100, 200, and 400 mg/day, respectively (all p's < .001). During the 12-week period encompassing the last 6 weeks of titration and the 6-week maintenance phase (secondary outcome), the median percent change in seizure frequency was -20.1% for placebo vs -42.6%, -77.1%, and -89.2% for cenobamate 100, 200, and 400 mg/day, respectively. Seizure-free rates during the maintenance phase were 2.6% of patients for placebo vs 12.4%, 30.1%, and 52.4% for cenobamate 100, 200, and 400 mg/day, respectively, and during the 12-week period were 0.8% for placebo vs 8.5%, 19.7%, and 30.6% for the cenobamate groups. The most common treatment-emergent adverse events in cenobamate patients (≥20%) were dose-related dizziness and somnolence. SIGNIFICANCE: Cenobamate 100, 200, and 400 mg/day reduced focal seizures in Asian patients in a dose-related fashion and was generally well tolerated.", "abstract_zh": "目的：本随机、双盲、安慰剂对照研究（NCT04557085）在中国、日本和韩国进行，评估辅助西诺氨酯在未控制局灶性发作患者中的疗效和安全性。方法：18-70岁、在8周基线期内尽管使用1-3种抗癫痫发作药物（ASM）仍有≥8次发作（局灶性意识运动性发作、局灶性意识受损性发作或局灶性进展为双侧强直-阵挛发作）的成人，以1:1:1:1随机分配接受安慰剂或西诺氨酯100、200或400 mg/天。研究包括18周滴定期和6周维持期。主要疗效分析为维持期西诺氨酯200 mg、然后400 mg、然后100 mg/天与安慰剂相比28天发作频率较基线百分比变化的分层降序比较。结果：519例随机化患者中，446例接受≥1次研究药物剂量且维持期有≥1次疗效评估（安慰剂n = 117；100 mg/天n = 113；200 mg/天n = 113；400 mg/天n = 103）。维持期发作频率中位数百分比变化：安慰剂为-25.9%，西诺氨酯100、200和400 mg/天分别为-42.6%、-78.3%和-100%（均p < .001）。在涵盖滴定最后6周和6周维持期的12周期间（次要终点），发作频率中位数百分比变化：安慰剂为-20.1%，西诺氨酯100、200和400 mg/天分别为-42.6%、-77.1%和-89.2%。维持期无发作率：安慰剂为2.6%，西诺氨酯100、200和400 mg/天分别为12.4%、30.1%和52.4%；12周期间分别为安慰剂0.8%，西诺氨酯组8.5%、19.7%和30.6%。西诺氨酯患者中最常见（≥20%）的治疗中出现的不良事件为剂量相关的头晕和嗜睡。意义：西诺氨酯100、200和400 mg/天以剂量相关方式减少亚洲患者的局灶性发作，且总体耐受性良好。", "title_full": "A randomized, double-blind, placebo-controlled, multicenter study to evaluate the efficacy and safety of adjunctive cenobamate in Asian patients with focal seizures.", "pmid": "41144696"}, {"text": "4. Krauss GL, et al. Epilepsia. 2025.", "title": "Improving the tolerability of antiseizure medications: When and how to use cenobamate and other new antiseizure medications.", "abstract": "Despite the introduction of newer antiseizure medications (ASMs) with improved safety profiles over the past several years, rates of treatment-related intolerable adverse events (AEs) for people with epilepsy have not changed substantially. Tolerability issues can potentially jeopardize optimal dosi", "url": "https://pubmed.ncbi.nlm.nih.gov/40105709/", "type": "literature", "doi": "10.1111/epi.18304", "abstract_full": "Despite the introduction of newer antiseizure medications (ASMs) with improved safety profiles over the past several years, rates of treatment-related intolerable adverse events (AEs) for people with epilepsy have not changed substantially. Tolerability issues can potentially jeopardize optimal dosing and effectiveness, regimen adherence, and treatment retention with these newer medications. Long-term clinical studies, open-label extension studies, and postmarketing studies allow flexible dosing and adjustment of concomitant ASMs, which can help clinicians reduce treatment-related AEs and thus improve the retention and tolerability of these treatments. With newer effective treatments (e.g., lacosamide, eslicarbazepine, perampanel, brivaracetam, and most recently, cenobamate), the risk of AEs may be minimized by proactively adjusting concomitant ASMs that have known pharmacokinetic and/or pharmacodynamic drug interactions. Additional tolerability considerations should be made for specific populations, for example, more determined reductions in concomitant ASMs may be required to improve treatment tolerability in older people, and individuals with more refractory seizures may require higher doses. Strategies to improve the tolerability of effective ASMs further, including earlier add-on therapy and transition to, or initial, monotherapy should be investigated. Ongoing clinical studies in children and people with generalized tonic-clonic seizures of the most recent ASM addition, cenobamate, will further inform the safety profile of cenobamate and its potential utility as a broad-spectrum treatment option.", "abstract_zh": "尽管近年来引入了安全性特征改善的新型抗癫痫发作药物（ASM），但癫痫患者中治疗相关不可耐受不良事件（AEs）的发生率并无显著变化。耐受性问题可能危及最佳剂量和疗效、方案依从性以及这些新型药物的留存率。长期临床研究、开放标签扩展研究和上市后研究允许灵活给药和调整合并ASM，这可帮助临床医生减少治疗相关AEs，从而改善这些治疗的留存率和耐受性。对于新型有效治疗（如拉考沙胺、艾司利卡西平、吡仑帕奈、布瓦西坦以及最新的西诺氨酯），可通过主动调整具有已知药代动力学和/或药效学药物相互作用的合并ASM来最小化AEs风险。还应对特定人群进行额外的耐受性考量，例如，老年人可能需要更坚决地减少合并ASM以改善治疗耐受性，而发作更难治的患者可能需要更高剂量。应进一步研究改善有效ASM耐受性的策略，包括更早的添加治疗以及向单药治疗转换或初始单药治疗。最新加入的ASM——西诺氨酯——在儿童和全面性强直-阵挛发作患者中正在进行的临床研究将进一步阐明西诺氨酯的安全性特征及其作为广谱治疗选择的潜在效用。", "title_full": "Improving the tolerability of antiseizure medications: When and how to use cenobamate and other new antiseizure medications.", "pmid": "40105709"}]}, {"section": "疗效/安全性相关问题", "question": "出现DRESS综合征如何处理？", "answer": "采用说明书推荐的方案滴定有助于降低DRESS发生风险1<br>DRESS典型症状表现为发烧、皮疹、淋巴结病和/或面部肿胀，可伴有其他器官系统受累，例如肝炎、肾炎、血液学异常、心肌炎或肌炎（有时与急性病毒感染相似）。常伴嗜酸粒细胞增多。<br>当出现超敏反应的早期表现，包括发热或淋巴结病，即使皮疹不明显，也应警惕DRESS的可能性。如果出现此类体征或症状应立即对患者进行评估。如果不能确定这些体征或症状的其它病因，则应立即停用翼弗瑞®且不可再使用2。 DRESS，药物反应伴嗜酸粒细胞增多和全身性症状", "refs": [{"text": "1.西诺氨酯片说明书", "title": "西诺氨酯片说明书", "abstract": "", "url": null, "type": "package_insert"}, {"text": "2. Krauss GL, et al. Epilepsia. 2025", "title": "Improving the tolerability of antiseizure medications: When and how to use cenobamate and other new antiseizure medications.", "abstract": "Despite the introduction of newer antiseizure medications (ASMs) with improved safety profiles over the past several years, rates of treatment-related intolerable adverse events (AEs) for people with epilepsy have not changed substantially. Tolerability issues can potentially jeopardize optimal dosi", "url": "https://pubmed.ncbi.nlm.nih.gov/40105709/", "type": "literature", "doi": "10.1111/epi.18304", "abstract_full": "Despite the introduction of newer antiseizure medications (ASMs) with improved safety profiles over the past several years, rates of treatment-related intolerable adverse events (AEs) for people with epilepsy have not changed substantially. Tolerability issues can potentially jeopardize optimal dosing and effectiveness, regimen adherence, and treatment retention with these newer medications. Long-term clinical studies, open-label extension studies, and postmarketing studies allow flexible dosing and adjustment of concomitant ASMs, which can help clinicians reduce treatment-related AEs and thus improve the retention and tolerability of these treatments. With newer effective treatments (e.g., lacosamide, eslicarbazepine, perampanel, brivaracetam, and most recently, cenobamate), the risk of AEs may be minimized by proactively adjusting concomitant ASMs that have known pharmacokinetic and/or pharmacodynamic drug interactions. Additional tolerability considerations should be made for specific populations, for example, more determined reductions in concomitant ASMs may be required to improve treatment tolerability in older people, and individuals with more refractory seizures may require higher doses. Strategies to improve the tolerability of effective ASMs further, including earlier add-on therapy and transition to, or initial, monotherapy should be investigated. Ongoing clinical studies in children and people with generalized tonic-clonic seizures of the most recent ASM addition, cenobamate, will further inform the safety profile of cenobamate and its potential utility as a broad-spectrum treatment option.", "abstract_zh": "尽管近年来引入了安全性特征改善的新型抗癫痫发作药物（ASM），但癫痫患者中治疗相关不可耐受不良事件（AEs）的发生率并无显著变化。耐受性问题可能危及最佳剂量和疗效、方案依从性以及这些新型药物的留存率。长期临床研究、开放标签扩展研究和上市后研究允许灵活给药和调整合并ASM，这可帮助临床医生减少治疗相关AEs，从而改善这些治疗的留存率和耐受性。对于新型有效治疗（如拉考沙胺、艾司利卡西平、吡仑帕奈、布瓦西坦以及最新的西诺氨酯），可通过主动调整具有已知药代动力学和/或药效学药物相互作用的合并ASM来最小化AEs风险。还应对特定人群进行额外的耐受性考量，例如，老年人可能需要更坚决地减少合并ASM以改善治疗耐受性，而发作更难治的患者可能需要更高剂量。应进一步研究改善有效ASM耐受性的策略，包括更早的添加治疗以及向单药治疗转换或初始单药治疗。最新加入的ASM——西诺氨酯——在儿童和全面性强直-阵挛发作患者中正在进行的临床研究将进一步阐明西诺氨酯的安全性特征及其作为广谱治疗选择的潜在效用。", "title_full": "Improving the tolerability of antiseizure medications: When and how to use cenobamate and other new antiseizure medications.", "pmid": "40105709"}]}, {"section": "特殊人群使用", "question": "存在心脏问题的人群中如何使用翼弗瑞® ？", "answer": "家族性短QT间期综合征患者禁用翼弗瑞®1。<br>一项2025年发表的体外研究显示治疗浓度下翼弗瑞®不增加导致QRS间期延长或促进心率失常的风险，但目前尚无足够研究确定翼弗瑞®是否会影响缺血性或结构性心脏病患者的心脏钠通道功能2。", "refs": [{"text": "1. 西诺氨酯片说明书", "title": "西诺氨酯片说明书", "abstract": "", "url": null, "type": "package_insert"}, {"text": "2. Crumb WJ Jr et.,al Clin Transl Sci. 2025 Oct", "title": "The Cardiac Sodium Channel Safety Profile of Cenobamate at Therapeutic Concentrations: In Vitro Analyses.", "abstract": "The US Food and Drug Administration (FDA) issued a Drug Safety Communication for the antiseizure drug lamotrigine (Lamictal), warning of the risk of QRS prolongation and cardiac arrhythmias. The FDA also requested that other antiseizure medications with a similar mechanism of action (e.g., block of", "url": "https://pubmed.ncbi.nlm.nih.gov/41058528/", "type": "literature", "doi": "10.1111/cts.70378", "abstract_full": "The US Food and Drug Administration (FDA) issued a Drug Safety Communication for the antiseizure drug lamotrigine (Lamictal), warning of the risk of QRS prolongation and cardiac arrhythmias. The FDA also requested that other antiseizure medications with a similar mechanism of action (e.g., block of neuronal sodium channels), including cenobamate, be evaluated for their risk as a cardiac sodium channel blocker. The purpose of this in vitro study was to determine the cardiac sodium channel blocking effects of cenobamate and its sodium channel classification. Follow-up experiments were also performed with cenobamate at its highest free therapeutic concentration (66 μM). Experiments were performed using the manual patch clamp technique at physiologic temperatures. Despite its classification as a Class Ib and Id antiarrhythmic, cenobamate was found to have little effect on the cardiac sodium channel when tested in vitro at therapeutic levels. These findings provide further clarity and support for the clinical safety of cenobamate in patients without cardiovascular risk factors.", "abstract_zh": "美国食品药品监督管理局（FDA）就抗癫痫发作药物拉莫三嗪（利必通）发布了药物安全通报，警告QRS波延长和心律失常的风险。FDA还要求对具有类似作用机制（如阻断神经元钠通道）的其他抗癫痫发作药物（包括西诺氨酯）进行评估，以确定其作为心脏钠通道阻滞剂的风险。本体外研究旨在确定西诺氨酯的心脏钠通道阻滞效应及其钠通道分类。还在西诺氨酯最高游离治疗浓度（66 μM）下进行了后续实验。实验采用手动膜片钳技术在生理温度下进行。尽管西诺氨酯被归类为Ib类和Id类抗心律失常药，但在治疗水平的体外测试中发现其对心脏钠通道影响甚微。这些发现进一步澄清并支持了西诺氨酯在无心血管风险因素患者中的临床安全性。", "title_full": "The Cardiac Sodium Channel Safety Profile of Cenobamate at Therapeutic Concentrations: In Vitro Analyses.", "pmid": "41058528"}]}, {"section": "特殊人群使用", "question": "在老年人群中如何使用翼弗瑞®？", "answer": "一般情况下，老年患者因肝、肾、或心脏功能降低，并发疾病或与其他药物合用的可能性升高，老年患者应谨慎选择剂量，通常选择低剂量开始治疗。多篇真实世界研究调研了cenobamate在老年人群中的安全性和疗效：<br><br>1. Yoon等（Seizure 2026）：纳入75例≥60岁难治性癫痫患者，69.3%达到≥50%发作减少，64.0%完全无发作，81.3%在末次随访时仍在用药。≥70岁患者因不良反应停药风险更高，建议从低剂量开始。<br><br>2. O'Dwyer等（Drugs Aging 2024）：Phase III研究老年亚组事后分析，老年患者疗效与总体人群相似，常见不良反应为头晕、嗜睡、跌倒、疲劳。<br><br>上述研究建议老年患者从低剂量开始，缓慢滴定，密切监测不良反应及药物相互作用。", "refs": [{"text": "1. Yoon YJ, et al. Seizure. 2026.", "title": "Cenobamate in older adults with drug-resistant epilepsy: Real-world tolerability, efficacy, and predictors of discontinuation.", "abstract": "PURPOSE: Cenobamate (CNB) is highly efficacious for focal-onset seizures, but real-world data in older adults (>=60 years) remain scarce. This study evaluates the tolerability, efficacy, and dosing pa", "abstract_full": "PURPOSE: Cenobamate (CNB) is highly efficacious for focal-onset seizures, but real-world data in older adults (>=60 years) remain scarce. This study evaluates the tolerability, efficacy, and dosing patterns of CNB in this population to guide clinical decision-making. METHODS: We conducted a retrospective cohort study of patients aged >=60 years with drug-resistant epilepsy initiated on CNB. The primary outcome was tolerability, defined as treatment continuation versus discontinuation due to adverse effects (AEs). Secondary outcomes included >=50% seizure reduction and seizure freedom. Predictors of tolerability-related discontinuation were assessed using multivariable analysis. RESULTS: Among 75 included patients, 61 (81.3%) continued CNB at last follow-up. Discontinuation due to AEs occurred in 10 patients (13.3%). Among the total cohort, 69.3% achieved a >=50% seizure reduction and 64.0% reached seizure freedom. The mean peak dose achieved was 197.3 mg/day. In multivariable analysis, higher Charlson Comorbidity Index (CCI) score (adjusted OR = 1.26, 95% CI 0.89-1.78, p = 0.025) and greater number of concomitant CNS-active non-ASM medications (adjusted OR = 1.27, 95% CI 0.93-1.72, p = 0.013) were statistically significant predictors of tolerability discontinuation. Patients aged >=70 years were more likely to discontinue earlier due to adverse effects than those aged 60-69 (p = 0.007). Additionally, a significant inverse association was observed between age and peak CNB dose (rho = -0.285, p = 0.013). CONCLUSION: CNB is effective and generally well-tolerated in older adults, with most reaching therapeutically meaningful doses. However, an elevated comorbidity burden and advancing age (>=70 years) increase the risk of discontinuation due to adverse effects, underscoring the need for individualized, cautious titration in this vulnerable population.", "abstract_zh": "目的：Cenobamate（CNB）对局灶性发作具有高度疗效，但老年人群（>=60岁）的真实世界数据仍然稀缺。本研究评估CNB在该人群中的耐受性、疗效和给药模式，以指导临床决策。方法：我们对年龄>=60岁、开始使用CNB的药物难治性癫痫患者进行了回顾性队列研究。主要终点为耐受性，定义为继续治疗与因不良反应（AE）停药的对比。次要终点包括>=50%发作减少和无发作。使用多变量分析评估耐受性相关停药的预测因素。结果：在纳入的75例患者中，61例（81.3%）在末次随访时仍在使用CNB。10例患者（13.3%）因不良反应停药。在整个队列中，69.3%达到>=50%发作减少，64.0%达到无发作。平均峰值剂量为197.3 mg/天。在多变量分析中，较高的Charlson合并症指数（CCI）评分（校正OR = 1.26，95% CI 0.89-1.78，p = 0.025）和更多的合并中枢神经系统活性非ASM药物数量（校正OR = 1.27，95% CI 0.93-1.72，p = 0.013）是耐受性停药的统计学显著预测因素。>=70岁患者比60-69岁患者更可能因不良反应提前停药（p = 0.007）。此外，年龄与CNB峰值剂量之间存在显著的负相关（rho = -0.285，p = 0.013）。结论：CNB在老年人中有效且总体耐受性良好，大多数患者达到了有治疗意义的剂量。然而，合并症负担加重和年龄增长（>=70岁）会增加因不良反应停药的风险，强调了在这一脆弱人群中进行个体化、谨慎滴定的必要性。", "url": "https://pubmed.ncbi.nlm.nih.gov/42468323/", "type": "pubmed", "doi": "10.1016/j.seizure.2026.07.012"}, {"text": "2. O'Dwyer R, et al. Drugs Aging. 2024.", "title": "Safety and Efficacy of Cenobamate for the Treatment of Focal Seizures in Older Patients: Post Hoc Analysis of a Phase III, Multicenter, Open-Label Study.", "abstract": "BACKGROUND: Cenobamate is an antiseizure medication (ASM) approved in the US and Europe for the treatment of uncontrolled focal seizures. OBJECTIVE: This post hoc analysis of a phase III, open-label s", "abstract_full": "BACKGROUND: Cenobamate is an antiseizure medication (ASM) approved in the US and Europe for the treatment of uncontrolled focal seizures. OBJECTIVE: This post hoc analysis of a phase III, open-label safety study assessed the safety and efficacy of adjunctive cenobamate in older adults versus the overall study population. METHODS: Adults aged 18-70 years with uncontrolled focal seizures taking stable doses of one to three ASMs were enrolled in the phase III, open-label safety study; adults aged 65-70 years from that study were included in our safety analysis. Discontinuations due to adverse events and treatment-emergent adverse events (TEAEs) were assessed throughout the study in all patients who received one or more doses of cenobamate (safety study population). Efficacy was assessed post hoc in patients who had adequate seizure data available (post hoc efficacy population); we assessed patients aged 65-70 years from that population. Overall, 100% responder rates were assessed in the post hoc efficacy maintenance-phase population in 3-month intervals. Concomitant ASM drug load changes were also measured. For each ASM, drug load was defined as the ratio of actual drug dose/day to the World Health Organization defined daily dose (DDD). RESULTS: Of 1340 patients (mean age 39.7 years) in the safety study population, 42 were >=65 years of age (mean age 67.0 years, 52.4% female). Median duration of exposure was 36.1 and 36.9 months for overall patients and older patients, respectively, and mean epilepsy duration was 22.9 and 38.5 years, respectively. At 1, 2, and 3 years, 80%, 72%, and 68% of patients overall, and 76%, 71%, and 69% of older patients, respectively, remained on cenobamate. Common TEAEs (>=20%) were somnolence and dizziness in overall patients, and somnolence, dizziness, fall, fatigue, balance disorder, and upper respiratory tract infection in older patients. Falls in older patients occurred after a mean 452.1 days of adjunctive cenobamate treatment (mean dose 262.5 mg/day; mean concomitant ASM drug load 2.46). Of 240 patients in the post hoc efficacy population, 18 were >=65 years of age. Mean seizure frequency at baseline was 18.1 seizures/28 days for the efficacy population and 3.1 seizures/28 days for older patients. Rates of 100% seizure reduction within 3-month intervals during the maintenance phase increased over time for the overall population (n=214) and older adults (n=15), reaching 51.9% and 78.6%, respectively, by 24 months. Mean percentage change in concomitant ASM drug load, not including cenobamate, was reduced in the overall efficacy population (31.8%) and older patients (36.3%) after 24 months of treatment. CONCLUSIONS: Results from this post hoc analysis showed notable rates of efficacy in older patients taking adjunctive cenobamate. Rates of several individual TEAEs occurred more frequently in older patients. Further reductions in concomitant ASMs may be needed in older patients when starting cenobamate to avoid adverse effects such as somnolence, dizziness, and falls. CLINICAL TRIALS REGISTRATION: ClinicalTrials.gov NCT02535091.", "abstract_zh": "背景：Cenobamate是一种抗癫痫发作药物（ASM），已在美国和欧洲获批用于治疗未控制的局灶性发作。目的：这项III期开放标签安全性研究的事后分析评估了辅助cenobamate在老年人与总体研究人群中的安全性和疗效。方法：年龄18-70岁、服用稳定剂量1-3种ASM且未控制局灶性发作的成人被纳入III期开放标签安全性研究；该研究中65-70岁的成人被纳入我们的安全性分析。在整个研究期间，对所有接受一剂或多剂cenobamate的患者（安全性研究人群）评估因不良事件导致的停药和治疗中出现的不良事件（TEAE）。在有充足发作数据的患者中事后评估疗效（事后疗效人群）；我们评估了该人群中65-70岁的患者。在事后疗效维持期人群中以3个月间隔评估总体100%应答率。同时测量合并ASM药物负荷变化。每种ASM的药物负荷定义为实际药物剂量/天与世界卫生组织规定日剂量（DDD）的比值。结果：在安全性研究人群的1340例患者（平均年龄39.7岁）中，42例>=65岁（平均年龄67.0岁，52.4%女性）。总体患者和老年患者的中位暴露时间分别为36.1和36.9个月，平均癫痫病程分别为22.9和38.5年。在第1、2和3年，总体患者中分别有80%、72%和68%继续使用cenobamate，老年患者中分别为76%、71%和69%。总体患者中常见TEAE（>=20%）为嗜睡和头晕，老年患者中为嗜睡、头晕、跌倒、疲劳、平衡障碍和上呼吸道感染。老年患者的跌倒发生在辅助cenobamate治疗平均452.1天后（平均剂量262.5 mg/天；平均合并ASM药物负荷2.46）。在事后疗效人群的240例患者中，18例>=65岁。疗效人群的基线平均发作频率为18.1次/28天，老年患者为3.1次/28天。维持期内3个月间隔的100%发作减少率随时间增加，总体人群（n=214）和老年人（n=15）在24个月时分别达到51.9%和78.6%。治疗24个月后，不包括cenobamate在内的合并ASM药物负荷平均百分比变化在总体疗效人群（31.8%）和老年患者（36.3%）中均有降低。结论：这项事后分析结果显示，服用辅助cenobamate的老年患者具有显著的疗效。老年患者中几种个别TEAE的发生率更高。老年患者在开始使用cenobamate时可能需要进一步减少合并ASM，以避免嗜睡、头晕和跌倒等不良反应。临床试验注册：ClinicalTrials.gov NCT02535091。", "url": "https://pubmed.ncbi.nlm.nih.gov/38446341/", "type": "pubmed", "doi": "10.1007/s40266-024-01102-3"}]}, {"section": "特殊人群使用", "question": "翼弗瑞®能否用于儿童？", "answer": "尚无翼弗瑞®在儿童患者中的安全性和有效性数据。但海外多篇真实世界研究调研了cenobamate在儿童患者中的安全性和疗效：<br><br>1. 西班牙多中心回顾性研究（Soto-Insuga et al., Epilepsia 2025）：纳入169例0-18岁难治性癫痫患儿，包括发育性癫痫性脑病（DEE）。12个月时≥50%发作减少率达54%，无发作率达31%。不良反应总体可控，采用缓慢、基于体重的滴定方案可改善耐受性。12个月留存率高，疗效随时间持续。<br><br>2. 欧洲多中心回顾性研究（Makridis et al., Epilepsia Open 2025）：纳入108例儿童青少年难治性癫痫患者（中位年龄13.8岁，范围3.9-19.8岁），均为超说明书用药。52.8%发作减半，18.5%完全无发作，中位月发作频率从30次降至9次。12个月留存率86.8%，无DRESS病例。44%患者减少了联用ASM数量，51%停用了至少一种联用ASM。<br><br>3. 以色列双中心回顾性研究（Epilepsia Open 2026）：纳入94例0-21岁局灶性难治性癫痫患者（中位起病年龄4.3岁，72%伴发育迟缓），cenobamate在中位使用7种ASM失败后启用。6个月时≥50%发作减少率41%，12个月时升至54%。24%患者报告不良反应，55%患者减少了联用ASM剂量。<br><br>4. 综述（Samanta, Epilepsy Behav 2025）：系统综述27项研究，共624例儿童患者（16个月-18岁），应答率50-84%，无发作率3-31%，留存率81-100%。低龄儿童（≤6岁）需要更高的基于体重的剂量（约5 mg/kg/day vs 青少年约2.7 mg/kg/day）。<br><br>上述研究均为回顾性真实世界数据，尚需前瞻性随机对照研究进一步验证。", "refs": [{"text": "1. Soto-Insuga V, et al. Epilepsia. 2025;66(12):4712-4724.", "title": "Real-world use of cenobamate in pediatric focal epilepsies and developmental epileptic encephalopathies: A multicenter retrospective series", "abstract_full": "Objective: Cenobamate (CNB) is an anti-seizure medication approved for focal-onset seizures in adults, with growing evidence supporting its use in pediatric drug-resistant epilepsy (DRE). This study evaluates the efficacy, retention, and safety of CNB in children and adolescents, including those with developmental and epileptic encephalopathies (DEEs). Methods: We conducted a retrospective, multicenter study of 169 pediatric patients (0-18 years) with DRE treated with CNB across centers in Spain. Seizure response (≥50% reduction) and seizure freedom (no seizures in the previous month) were assessed at 3, 6, and 12 months. Significance: CNB appears effective and well-tolerated in pediatric DRE, including DEE, with high retention and sustained efficacy over time. Adverse events were generally manageable with dose adjustments, and slow, weight-based titration improved tolerability.", "abstract_zh": "目的：西诺氨酯（CNB）是一种已获批用于成人局灶性发作的抗癫痫药物，在儿童难治性癫痫中的应用证据日益增多。本研究评估CNB在儿童和青少年中的疗效、留存率和安全性，包括发育性癫痫性脑病（DEE）患者。方法：我们在西班牙多个中心开展了一项回顾性多中心研究，纳入169例接受CNB治疗的0-18岁难治性癫痫患儿。在3、6和12个月时评估发作应答（≥50%减少）和无发作（前一个月无发作）情况。结论：CNB在儿童难治性癫痫（包括DEE）中表现出良好的疗效和耐受性，留存率高，疗效随时间持续。不良事件通常可通过剂量调整控制，缓慢的基于体重的滴定方案可改善耐受性。", "url": "https://pubmed.ncbi.nlm.nih.gov/40736694/", "type": "literature"}, {"text": "2. Makridis KL, et al. Epilepsia Open. 2025. doi:10.1002/epi4.70301.", "title": "Adjunctive cenobamate in children and adolescents - real-world data from a retrospective multicenter study", "abstract_full": "Retrospective multicenter real-world study in pediatric epilepsy referral centers across Europe. 108 patients aged 0-21 years with drug-resistant epilepsy, median age 13.8 years (range 3.9-19.8 years), all off-label use. Primary outcome: ≥50% reduction in seizure frequency. Results: 52.8% achieved ≥50% seizure reduction, 18.5% achieved complete seizure freedom. Median monthly seizure frequency decreased from 30 to 9. 12-month retention rate 86.8%. No DRESS cases reported. 44% of patients reduced concomitant ASMs, 51% discontinued at least one concomitant ASM. Conclusion: Cenobamate is effective and well-tolerated in children and adolescents with drug-resistant epilepsy.", "abstract_zh": "欧洲儿科癫痫转诊中心回顾性多中心真实世界研究。纳入108例0-21岁难治性癫痫患者，中位年龄13.8岁（范围3.9-19.8岁），均为超说明书用药。主要终点：发作频率≥50%减少。结果：52.8%达到≥50%发作减少，18.5%完全无发作。中位月发作频率从30次降至9次。12个月留存率86.8%。无DRESS病例报告。44%患者减少了联用ASM数量，51%停用了至少一种联用ASM。结论：西诺氨酯在儿童和青少年难治性癫痫中疗效良好，耐受性可接受。", "url": "https://pubmed.ncbi.nlm.nih.gov/42119429/", "type": "literature"}, {"text": "3. Epilepsia Open. 2026. (Israeli two-center retrospective study)", "title": "Adjunctive cenobamate in children and adolescents - real-world data from a retrospective multicenter study (Israeli cohort)", "abstract_full": "Retrospective real-world study in two Israeli tertiary referral centers. 94 patients aged 0-21 years with focal drug-resistant epilepsy, median age of epilepsy onset 4.3 years, 72% with developmental delay. Cenobamate initiated after median 7 prior ASMs, median age at initiation 14 years (range 1.2-21.8 years). Mean final dose 3.22 mg/kg. ≥50% seizure reduction at 6 months: 41%, increasing to 54% at 12 months. Adverse effects reported in 24% at 6 months. Dose reduction of concomitant ASMs in 55%, discontinuation in 35%.", "abstract_zh": "以色列两家三级转诊中心回顾性真实世界研究。纳入94例0-21岁局灶性难治性癫痫患者，中位癫痫起病年龄4.3岁，72%伴发育迟缓。西诺氨酯在中位7种既往ASM失败后启用，启用时中位年龄14岁（范围1.2-21.8岁）。平均最终剂量3.22 mg/kg。6个月时≥50%发作减少率41%，12个月时升至54%。24%患者在6个月时报告不良反应。55%患者减少了联用ASM剂量，35%停用了联用ASM。", "url": "https://pubmed.ncbi.nlm.nih.gov/42119429/", "type": "literature"}, {"text": "4. Samanta D. Epilepsy Behav. 2025;173:110787.", "title": "Cenobamate in pediatric epilepsy and developmental and epileptic encephalopathies: Efficacy, safety, and syndrome-specific considerations", "abstract_full": "Cenobamate, a dual-mechanism antiseizure medication with sodium channel and GABA-A receptor activity, has demonstrated superior efficacy in adult focal epilepsy but remains understudied in pediatric populations and developmental and epileptic encephalopathies (DEEs). This comprehensive narrative review synthesized available evidence from 27 studies examining cenobamate use in pediatric epilepsy and DEEs. Eight studies encompassing 624 pediatric patients (aged 16 months-18 years) demonstrated responder rates of 50-84% and seizure freedom in 3-31% of patients, with high retention rates (81-100%). Weight-based dosing proved necessary in younger children (≤6 years: ~5 mg/kg/day vs. adolescents: ~2.7 mg/kg/day). Common adverse
