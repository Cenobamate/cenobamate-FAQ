<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>西诺氨酯常见问题手册 v9</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --purple: #5B2D8E;
    --purple-dark: #3D1A6B;
    --purple-light: #7B4DB8;
    --purple-bg: #F3EEF9;
    --purple-mid: #E8DFF5;
    --orange: #F5821F;
    --orange-light: #FFF0E0;
    --orange-mid: #FFCF99;
    --text: #1A1A2E;
    --text-secondary: #5A5A7A;
    --border: #DDD5EE;
    --white: #FFFFFF;
    --shadow: 0 2px 12px rgba(91,45,142,0.10);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: var(--purple-bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 60%, var(--purple-light) 100%);
    padding: 20px 20px 16px;
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(61,26,107,0.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .logo {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    border: 1.5px solid rgba(255,255,255,0.25);
  }
  .header-title h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .header-title p {
    font-size: 12px;
    opacity: 0.75;
    margin-top: 2px;
  }
  .badge {
    margin-left: auto;
    background: var(--orange);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.6;
  }
  #searchInput {
    width: 100%;
    padding: 11px 40px 11px 38px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.18);
    color: white;
    font-size: 15px;
    outline: none;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }
  #searchInput::placeholder { color: rgba(255,255,255,0.6); }
  #searchInput:focus { background: rgba(255,255,255,0.28); }
  .clear-btn {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.25);
    border: none;
    color: white;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 13px;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
  }
  .clear-btn.show { display: flex; }

  /* Tabs */
  .tabs-wrap {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 130px;
    z-index: 90;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    padding: 0 12px;
    gap: 4px;
    min-width: max-content;
  }
  .tab {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    user-select: none;
  }
  .tab.active {
    color: var(--purple);
    border-bottom-color: var(--purple);
    font-weight: 600;
  }
  .tab:hover:not(.active) { color: var(--purple-light); }

  /* Main content */
  .main {
    flex: 1;
    padding: 14px 14px 80px;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  /* Result count */
  .result-info {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    padding: 0 2px;
  }
  .result-info span { color: var(--purple); font-weight: 600; }

  /* FAQ Cards */
  .faq-card {
    background: var(--white);
    border-radius: 14px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
    transition: box-shadow 0.2s;
  }
  .faq-card:hover { box-shadow: 0 4px 20px rgba(91,45,142,0.15); }

  .faq-question {
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .q-icon {
    min-width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    color: white;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    margin-top: 1px;
  }
  .q-text {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.45;
    color: var(--text);
  }
  .q-arrow {
    min-width: 20px;
    color: var(--purple-light);
    font-size: 14px;
    margin-top: 4px;
    transition: transform 0.25s;
  }
  .faq-card.open .q-arrow { transform: rotate(180deg); }

  .faq-answer {
    display: none;
    padding: 0 16px 16px 52px;
    border-top: 1px solid var(--purple-mid);
    background: var(--purple-bg);
  }
  .faq-card.open .faq-answer { display: block; }
  .answer-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    padding-top: 12px;
  }
  .answer-refs {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--orange-light);
    border-left: 3px solid var(--orange);
    border-radius: 0 6px 6px 0;
    font-size: 11.5px;
    color: #7A5020;
    line-height: 1.6;
  }
  .refs-label {
    font-weight: 600;
    color: var(--orange);
    margin-bottom: 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Section tag */
  .section-tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--purple-mid);
    color: var(--purple);
    font-weight: 500;
    margin-bottom: 8px;
    margin-top: 4px;
  }

  /* Highlight */
  mark {
    background: var(--orange-mid);
    color: var(--text);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }
  .empty-state small { font-size: 13px; opacity: 0.7; }

  /* Section header */
  .section-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--purple);
    padding: 8px 4px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-header::before {
    content: '';
    width: 4px; height: 14px;
    background: var(--orange);
    border-radius: 2px;
    display: inline-block;
  }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    text-align: center;
    font-size: 11px;
    color: var(--text-secondary);
    z-index: 80;
  }
  .footer strong { color: var(--purple); }

  /* Reference items */
  .ref-item {
    padding: 8px 10px;
    margin-bottom: 6px;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--orange-mid);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .ref-item:last-child { margin-bottom: 0; }
  .ref-item:hover {
    border-color: var(--orange);
    box-shadow: 0 1px 6px rgba(245,130,31,0.15);
  }
  .ref-item.ref-expandable .ref-text::after {
    content: ' ▸';
    color: var(--orange);
    font-size: 12px;
    transition: transform 0.2s;
    display: inline-block;
  }
  .ref-item.ref-expandable.open .ref-text::after {
    transform: rotate(90deg);
  }
  .ref-item.ref-static {
    cursor: default;
    background: var(--purple-bg);
    border-color: var(--purple-mid);
  }
  .ref-item.ref-static:hover {
    box-shadow: none;
    border-color: var(--purple-mid);
  }
  .ref-text {
    font-size: 11.5px;
    color: #5A4A30;
    line-height: 1.5;
    word-break: break-word;
  }
  .ref-detail {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--orange-mid);
  }
  .ref-item.open .ref-detail {
    display: block;
  }
  .ref-title {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--purple);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .ref-abstract-zh {
    font-size: 12px;
    color: var(--text);
    line-height: 1.65;
    margin-bottom: 10px;
  }
  .ref-toggle-en {
    display: inline-block;
    font-size: 11px;
    color: var(--purple-light);
    cursor: pointer;
    padding: 3px 10px;
    border: 1px solid var(--purple-mid);
    border-radius: 14px;
    margin-bottom: 8px;
    user-select: none;
    transition: all 0.2s;
  }
  .ref-toggle-en:hover {
    background: var(--purple-bg);
    border-color: var(--purple-light);
  }
  .ref-abstract-en {
    display: none;
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 10px;
    padding: 8px 10px;
    background: #F8F6FA;
    border-radius: 6px;
    border-left: 2px solid var(--purple-mid);
  }
  .ref-abstract-en.show { display: block; }
  .ref-link-btn {
    display: inline-block;
    background: var(--orange);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 16px;
    text-decoration: none;
    transition: background 0.2s;
    cursor: pointer;
    border: none;
  }
  .ref-link-btn:hover {
    background: #E0741A;
  }

  /* DDI Query Tool */
  .ddi-tool {
    margin-top: 16px;
    padding: 16px;
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .ddi-select-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ddi-select-row label {
    font-size: 14px;
    font-weight: 600;
    color: var(--purple);
    white-space: nowrap;
  }
  .ddi-select-row select {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--purple-mid);
    background: var(--purple-bg);
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: auto;
    appearance: auto;
  }
  .ddi-select-row select:focus {
    border-color: var(--purple);
  }
  .ddi-card {
    margin-top: 14px;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .ddi-card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .ddi-field {
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.65;
  }
  .ddi-field:last-child { margin-bottom: 0; }
  .ddi-label {
    font-weight: 700;
    color: var(--purple);
  }
  .ddi-content {
    font-weight: 400;
    color: var(--text);
  }
  .ddi-strategy {
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    display: inline-block;
  }


  /* === 共识对比表格样式 === */
  .ddi-consensus {
    margin-top: 12px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e2e8f0;
    background: #f8fafc;
  }
  .ddi-consensus-title {
    font-size: 13px;
    font-weight: 700;
    padding: 8px 12px;
    background: #f1f5f9;
    border-bottom: 1px solid #e2e8f0;
    color: var(--text);
  }
  .ddi-consensus-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .ddi-consensus-table th {
    padding: 6px 10px;
    text-align: left;
    font-weight: 700;
    border-bottom: 1px solid #e2e8f0;
  }
  .ddi-consensus-table th.krauss-col {
    color: #2563eb;
    background: #eff6ff;
  }
  .ddi-consensus-table th.spanish-col {
    color: #16a34a;
    background: #f0fdf4;
  }
  .ddi-consensus-table td {
    padding: 6px 10px;
    border-bottom: 1px solid #e2e8f0;
    line-height: 1.5;
    vertical-align: top;
  }
  .ddi-consensus-table td.label-col {
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .ddi-consensus-table tr:last-child td {
    border-bottom: none;
  }
  .ddi-consensus-note {
    font-size: 11px;
    color: var(--text-secondary);
    padding: 6px 12px;
    line-height: 1.5;
  }
  .ddi-disclaimer {
    margin-top: 10px;
    padding: 6px 12px;
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.5;
    border-top: 1px solid #e5e7eb;
  }
  .ddi-consensus-agree {
    margin-top: 10px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    background: #f8fafc;
    border-radius: 6px;
    border: 1px solid #e2e8f0;
  }
  /* === 调整时机差异说明框 === */
  .ddi-timing-notice {
    margin-top: 12px;
    padding: 12px 14px;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.65;
  }
  .ddi-timing-notice-title {
    font-weight: 700;
    color: #92400e;
    margin-bottom: 6px;
  }
  .ddi-timing-notice-body {
    color: #78350f;
  }
  .ddi-timing-notice-body p {
    margin-bottom: 6px;
  }
  .ddi-timing-notice-body p:last-child {
    margin-bottom: 0;
  }
  .ddi-timing-notice-source {
    margin-top: 6px;
    font-size: 11px;
    color: #92400e;
  }

    .ddi-refs { margin-top: 8px; }
    .ref-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .ref-text { font-size: 13px; color: #374151; line-height: 1.5; margin-bottom: 6px; }
    .ref-toggle { background: none; border: 1px solid #6366f1; color: #6366f1; border-radius: 4px; padding: 3px 10px; font-size: 12px; cursor: pointer; margin-right: 8px; margin-bottom: 4px; }
    .ref-toggle:hover { background: #eef2ff; }
    .ref-abstract { font-size: 12px; color: #4b5563; line-height: 1.7; background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px; margin-top: 6px; margin-bottom: 6px; white-space: pre-line; }
    .ref-link { display: inline-block; font-size: 12px; color: #6366f1; text-decoration: none; padding: 3px 10px; border: 1px solid #6366f1; border-radius: 4px; }
    .ref-link:hover { background: #eef2ff; }
  </style>
</head>

<div class="header">
  <div class="header-top">
    <div class="logo">💊</div>
    <div class="header-title">
      <h1>西诺氨酯常见问题手册</h1>
      <p>西诺氨酯 · 内部使用 · v9</p>
    </div>
    <div class="badge">52 FAQ</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索临床问题，如：不良反应、剂量、相互作用…" autocomplete="off">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs" id="tabsContainer"></div>
</div>

<div class="main" id="mainContent"></div>

<div class="footer">

</div>

<script>
const FAQ_DATA = [{"section": "产品基本信息", "question": "翼弗瑞®产品机制是什么，有什么特点？", "answer": "翼弗瑞®是具有独特钠和GABA双通道机制的新型抗癫痫发作药物，通过抑制持续性钠离子电流降低神经兴奋性1，通过正变构调节GABAA受体增加神经抑制性2，双重机制减少大脑异常放电，控制癫痫发作。 GABA，γ氨基丁酸；GABAA，γ氨基丁酸A型受体", "refs": [{"text": "1. Sharma R, et al. Eur J Pharmacol. 2020;879:173117", "title": "Positive allosteric modulation of GABAA receptors by a novel antiepileptic drug cenobamate.", "abstract": "Cenobamate is a novel antiepileptic drug under investigation for use in patients with focal (partial-onset) seizures. To understand its potential molecular mechanism of action, the effects of cenobamate on GABAA-mediated currents and GABAA receptors in rodent hippocampal neurons were examined. Cenob", "url": "https://pubmed.ncbi.nlm.nih.gov/32325146/", "type": "literature", "doi": "10.1016/j.ejphar.2020.173117", "abstract_full": "Cenobamate is a novel antiepileptic drug under investigation for use in patients with focal (partial-onset) seizures. To understand its potential molecular mechanism of action, the effects of cenobamate on GABAA-mediated currents and GABAA receptors in rodent hippocampal neurons were examined. Cenobamate potentiated GABA-induced currents (IGABA) in acutely isolated CA3 pyramidal cells in a concentration-dependent manner (EC50, 164 μM), which was not affected by flumazenil, a benzodiazepine receptor antagonist. Cenobamate enhanced tonic GABAA currents (Itonic), which is defined as a holding current shift by the GABAA receptor antagonist bicuculline (EC50, 36.63 μM). At therapeutically relevant concentrations, cenobamate induced minimal changes in the frequency, amplitudes, and decay time of spontaneous inhibitory postsynaptic currents in the CA1 neurons. Flumazenil failed to affect cenobamate-potentiated Itonic and Iphasic in CA1 neurons. Cenobamate showed positive allosteric modulation of GABA-induced IGABA mediated by GABAA receptors. This effect was similar for all tested hGABAA receptors containing six different alpha subunits (α1β2γ2 or α2-6β3γ2), with EC50 values ranging from 42 to 194 μM. Cenobamate did not displace the binding of flunitrazepam, a benzodiazepine derivative, or flumazenil to GABAA receptors. The results showed that cenobamate, a novel antiepileptic drug, acts as a positive allosteric modulator of high-affinity GABAA receptors, activated by GABA at a site independent of the benzodiazepine binding site and efficiently enhances Itonic inhibition in hippocampal neurons, which could be an underlying molecular mechanism stabilizing neural circuits of the epileptic hippocampus.", "abstract_zh": "西诺氨酯是一种新型抗癫痫药物，目前正研究用于局灶性（部分性发作）癫痫患者。为阐明其潜在的分子作用机制，本研究检测了西诺氨酯对啮齿动物海马神经元中GABAA介导的电流及GABAA受体的影响。西诺氨酯以浓度依赖性方式增强急性分离的CA3锥体细胞中GABA诱导的电流（IGABA）（EC50为164 μM），该作用不受苯二氮䓬受体拮抗剂氟马西尼的影响。西诺氨酯增强紧张性GABAA电流（Itonic），即GABAA受体拮抗剂荷包牡丹碱引起的保持电流偏移（EC50为36.63 μM）。在治疗相关浓度下，西诺氨酯对CA1神经元自发性抑制性突触后电流的频率、振幅和衰减时间影响甚微。氟马西尼不能影响西诺氨酯增强的Itonic和Iphasic。西诺氨酯对GABAA受体介导的GABA诱导IGABA表现出正变构调节作用。该作用对含有六种不同α亚基的所有测试hGABAA受体（α1β2γ2或α2-6β3γ2）相似，EC50值范围为42至194 μM。西诺氨酯不能置换苯二氮䓬衍生物氟硝西泮或氟马西尼与GABAA受体的结合。结果表明，西诺氨酯作为一种新型抗癫痫药物，是高亲和力GABAA受体的正变构调节剂，由GABA激活，作用位点独立于苯二氮䓬结合位点，能有效增强海马神经元的Itonic抑制，这可能是其稳定癫痫海马神经回路的潜在分子机制。", "title_full": "Positive allosteric modulation of GABAA receptors by a novel antiepileptic drug cenobamate.", "pmid": "32325146"}, {"text": "2. Nakamura M, et al. Eur J Pharmacol. 2019;855:175-182.", "title": "Effects of cenobamate (YKP3089), a newly developed anti-epileptic drug, on voltage-gated sodium channels in rat hippocampal CA3 neurons.", "abstract": "New, more effective pharmacologic treatments for epilepsy are needed, as a substantial portion of patients (>30%) are refractory to currently available anti-epileptic drugs. Cenobamate (YKP3089) is an investigational anti-epileptic drug in clinical development. Two completed adequate and well-con", "url": "https://pubmed.ncbi.nlm.nih.gov/31063770/", "type": "literature", "doi": "10.1016/j.ejphar.2019.05.007", "abstract_full": "New, more effective pharmacologic treatments for epilepsy are needed, as a substantial portion of patients (>30%) are refractory to currently available anti-epileptic drugs. Cenobamate (YKP3089) is an investigational anti-epileptic drug in clinical development. Two completed adequate and well-controlled studies demonstrated a significant reduction in focal seizures with cenobamate in patients with epilepsy. In this study, we characterized the effects of cenobamate on voltage-gated Na+ channels in acutely isolated rat hippocampal CA3 neurons using a whole-cell patch-clamp technique. While cenobamate had little effect on the peak component of transient Na+ current (INaT) induced by brief depolarizing step pulses, it potently inhibited the non-inactivating persistent component of INa (INaP). In addition, cenobamate potently inhibited the current by slow voltage-ramp stimuli. Cenobamate significantly shifted the steady-state fast inactivation relationship toward a hyperpolarizing range, indicating that cenobamate binds to voltage-gated Na+ channels at the inactivated state with a higher affinity. Cenobamate also accelerated the development of inactivation and retarded recovery from inactivation of voltage-gated Na+ channels. In current clamp experiments, cenobamate hyperpolarized membrane potentials in a concentration-dependent manner, and these effects were mediated by inhibiting the INaP. Cenobamate also increased the threshold for generation of action potentials, and decreased the number of action potentials elicited by depolarizing current injection. Given that the INaP plays a pivotal role in the repetitive and/or burst generation of action potentials, the cenobamate-mediated preferential blockade of INaP might contribute to anti-epileptic activity.", "abstract_zh": "癫痫需要更有效的药物治疗，因为相当一部分患者（>30%）对现有抗癫痫药物耐药。西诺氨酯（YKP3089）是一种处于临床开发阶段的研究性抗癫痫药物。两项已完成的充分且对照良好的研究证实，西诺氨酯能显著减少癫痫患者的局灶性发作。本研究采用全细胞膜片钳技术，在急性分离的大鼠海马CA3神经元上表征了西诺氨酯对电压门控Na+通道的作用。西诺氨酯对短暂去极化阶跃脉冲诱发的瞬时Na+电流（INaT）峰值成分影响甚微，但强效抑制了INa的非失活性持续成分（INaP）。此外，西诺氨酯强效抑制了慢电压斜坡刺激引起的电流。西诺氨酯显著使稳态快失活曲线向超极化方向移动，表明西诺氨酯对失活态电压门控Na+通道具有更高的亲和力。西诺氨酯还加速了电压门控Na+通道失活的发展并延缓了失活后的恢复。在电流钳实验中，西诺氨酯以浓度依赖性方式使膜电位超极化，这些作用是通过抑制INaP介导的。西诺氨酯还提高了动作电位产生的阈值，并减少了去极化电流注射诱发的动作电位数量。鉴于INaP在动作电位重复和/或爆发性产生中起关键作用，西诺氨酯对INaP的优先阻断可能有助于其抗癫痫活性。", "title_full": "Effects of cenobamate (YKP3089), a newly developed anti-epileptic drug, on voltage-gated sodium channels in rat hippocampal CA3 neurons.", "pmid": "31063770"}]}, {"section": "产品基本信息", "question": "翼弗瑞®的钠通道机制和传统钠通道机制上有什么不同？", "answer": "翼弗瑞®和传统钠通道阻滞剂在钠通道机制亚型上存在差异。翼弗瑞®是首个主要通过抑制持续性钠离子电流来控制癫痫发作的钠离子通道阻滞剂，而传统的钠通道阻滞剂，比如卡马西平、奥卡西平、拉考沙胺等，主要通过将钠离子通道稳定在“快失活”或“慢失活”状态，减少钠离子电流，降低神经元兴奋性。", "refs": [{"text": "Yan R, et al. Seizure. 2025;127:105-114.", "title": "Sodium channel blockers for the treatment of focal epilepsy: A Chinese expert consensus.", "abstract": "To provide consensus-based recommendations for the use of sodium channel blockers (SCBs) in the management of focal epilepsy. A three-round modified Delphi procedure was conducted among a Delphi panel of 24 Chinese experts to build a consensus. A steering committee developed 9 statements related to", "url": "https://pubmed.ncbi.nlm.nih.gov/40121855/", "type": "literature", "doi": "10.1016/j.seizure.2025.02.016", "abstract_full": "PURPOSE: To provide consensus-based recommendations for the use of sodium channel blockers (SCBs) in the management of focal epilepsy. METHODS: A three-round modified Delphi procedure was conducted among a Delphi panel of 24 Chinese experts to build a consensus. A steering committee developed 9 statements related to SCBs for the treatment of focal epilepsy, and these statements were evaluated and voted upon by the expert panel. RESULTS: The expert panel achieved consensus on nine statements regarding the treatment recommendations for oxcarbazepine, lamotrigine, lacosamide, eslicarbazepine, topiramate, zonisamide and cenobamate in focal epilepsy patients and treatment adjustments for SCBs. CONCLUSION: This is a Chinese expert consensus on the use of SCBs in focal epilepsy developed using the modified Delphi method. These recommendations can help clinicians in their practice and guide future research.", "abstract_zh": "目的：为钠通道阻滞剂（SCB）在局灶性癫痫管理中的应用提供基于共识的推荐意见。方法：在由24位中国专家组成的德尔菲专家组中，采用三轮改良德尔菲法构建共识。指导委员会制定了9条与局灶性癫痫SCB治疗相关的声明，由专家组对这些声明进行评估和投票。结果：专家组就9条声明达成共识，涉及奥卡西平、拉莫三嗪、拉考沙胺、艾司利卡西平、托吡酯、唑尼沙胺和西诺氨酯在局灶性癫痫患者中的治疗推荐以及SCB的治疗调整。结论：这是采用改良德尔菲法制定的中国局灶性癫痫SCB使用专家共识。这些推荐意见可帮助临床医生的实践并指导未来的研究。", "title_full": "Sodium channel blockers for the treatment of focal epilepsy: A Chinese expert consensus.", "pmid": "40121855"}]}, {"section": "产品基本信息", "question": "电压门控钠离子通道机制有哪些分类？", "answer": "可以按照通道失活方式和离子电流类型分成两类：<br>从钠离子通道失活方式角度，可以分为快失活和慢失活，卡马西平、奥卡西平、拉莫三嗪主要作用于快失活，拉考沙胺、艾司利卡西平主要作用于慢失活。<br>从钠离子电流类型角度，可以分类瞬时性钠离子电流和持续性钠离子电流，卡马西平、奥卡西平、拉莫三嗪等可以抑制瞬时性钠离子电流，西诺氨酯则主要抑制持续性钠离子电流。", "refs": [{"text": "Yan R, et al. Seizure. 2025;127:105-114.", "title": "Sodium channel blockers for the treatment of focal epilepsy: A Chinese expert consensus.", "abstract": "To provide consensus-based recommendations for the use of sodium channel blockers (SCBs) in the management of focal epilepsy. A three-round modified Delphi procedure was conducted among a Delphi panel of 24 Chinese experts to build a consensus. A steering committee developed 9 statements related to", "url": "https://pubmed.ncbi.nlm.nih.gov/40121855/", "type": "literature", "doi": "10.1016/j.seizure.2025.02.016", "abstract_full": "PURPOSE: To provide consensus-based recommendations for the use of sodium channel blockers (SCBs) in the management of focal epilepsy. METHODS: A three-round modified Delphi procedure was conducted among a Delphi panel of 24 Chinese experts to build a consensus. A steering committee developed 9 statements related to SCBs for the treatment of focal epilepsy, and these statements were evaluated and voted upon by the expert panel. RESULTS: The expert panel achieved consensus on nine statements regarding the treatment recommendations for oxcarbazepine, lamotrigine, lacosamide, eslicarbazepine, topiramate, zonisamide and cenobamate in focal epilepsy patients and treatment adjustments for SCBs. CONCLUSION: This is a Chinese expert consensus on the use of SCBs in focal epilepsy developed using the modified Delphi method. These recommendations can help clinicians in their practice and guide future research.", "abstract_zh": "目的：为钠通道阻滞剂（SCB）在局灶性癫痫管理中的应用提供基于共识的推荐意见。方法：在由24位中国专家组成的德尔菲专家组中，采用三轮改良德尔菲法构建共识。指导委员会制定了9条与局灶性癫痫SCB治疗相关的声明，由专家组对这些声明进行评估和投票。结果：专家组就9条声明达成共识，涉及奥卡西平、拉莫三嗪、拉考沙胺、艾司利卡西平、托吡酯、唑尼沙胺和西诺氨酯在局灶性癫痫患者中的治疗推荐以及SCB的治疗调整。结论：这是采用改良德尔菲法制定的中国局灶性癫痫SCB使用专家共识。这些推荐意见可帮助临床医生的实践并指导未来的研究。", "title_full": "Sodium channel blockers for the treatment of focal epilepsy: A Chinese expert consensus.", "pmid": "40121855"}]}, {"section": "产品基本信息", "question": "什么是持续性钠离子电流？它具有哪些特点，在癫痫发作上起到什么作用？", "answer": "<div style=\"background:#f8f4ff;border-radius:8px;padding:16px;margin-bottom:16px;\"><div style=\"font-weight:bold;color:#5b2d8e;margin-bottom:12px;font-size:13px;\">钠离子通道三种功能状态示意图</div><div style=\"display:flex;gap:8px;margin-bottom:12px;justify-content:center;\"><div style=\"text-align:center;flex:1;\"><div style=\"font-size:11px;font-weight:bold;color:#5b2d8e;margin-bottom:4px;\">静息态</div><svg width=\"70\" height=\"90\" viewBox=\"0 0 70 90\" style=\"display:block;margin:0 auto;\"><rect x=\"20\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><rect x=\"38\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><rect x=\"16\" y=\"28\" width=\"38\" height=\"7\" rx=\"3\" fill=\"#5b2d8e\"/><circle cx=\"35\" cy=\"72\" r=\"6\" fill=\"#9b59b6\" opacity=\"0.4\"/><circle cx=\"12\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"35\" cy=\"7\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"58\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><text x=\"5\" y=\"85\" font-size=\"9\" fill=\"#5b2d8e\">激活门↑ 失活门○</text></svg><div style=\"font-size:10px;color:#666;margin-top:4px;\">激活门关闭<br/>失活门开放<br/>无电流</div></div><div style=\"text-align:center;flex:1;\"><div style=\"font-size:11px;font-weight:bold;color:#5b2d8e;margin-bottom:4px;\">激活态</div><svg width=\"70\" height=\"90\" viewBox=\"0 0 70 90\" style=\"display:block;margin:0 auto;\"><rect x=\"12\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><rect x=\"46\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><circle cx=\"35\" cy=\"72\" r=\"6\" fill=\"#9b59b6\" opacity=\"0.4\"/><circle cx=\"12\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"35\" cy=\"30\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"35\" cy=\"50\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"58\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><line x1=\"35\" y1=\"15\" x2=\"35\" y2=\"65\" stroke=\"#e8821a\" stroke-width=\"2\" stroke-dasharray=\"4,2\"/><polygon points=\"31,62 39,62 35,70\" fill=\"#e8821a\"/></svg><div style=\"font-size:10px;color:#666;margin-top:4px;\">激活门开放<br/>失活门开放<br/>I<sub>NaT</sub>瞬时电流</div></div><div style=\"text-align:center;flex:1;\"><div style=\"font-size:11px;font-weight:bold;color:#5b2d8e;margin-bottom:4px;\">失活态</div><svg width=\"70\" height=\"90\" viewBox=\"0 0 70 90\" style=\"display:block;margin:0 auto;\"><rect x=\"12\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><rect x=\"46\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><circle cx=\"35\" cy=\"55\" r=\"9\" fill=\"#5b2d8e\" opacity=\"0.85\"/><circle cx=\"12\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"58\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><text x=\"28\" y=\"58\" font-size=\"9\" fill=\"white\" font-weight=\"bold\">✕</text></svg><div style=\"font-size:10px;color:#666;margin-top:4px;\">激活门开放<br/>失活门关闭<br/>电流阻断</div></div></div><div style=\"display:flex;gap:8px;margin-top:4px;\"><div style=\"flex:1;background:white;border-radius:6px;padding:10px;font-size:11px;color:#333;line-height:1.6;\"><div style=\"font-weight:bold;color:#e8821a;margin-bottom:4px;\">快失活 → 持续性钠电流 I<sub>NaP</sub></div>快失活后失活门关闭不全，仍有少量钠离子持续缓慢内流（占总钠电流&lt;1%），形成持续性钠离子电流（I<sub>NaP</sub>）。翼弗瑞®通过抑制I<sub>NaP</sub>降低神经元异常兴奋性。</div><div style=\"flex:1;background:white;border-radius:6px;padding:10px;font-size:11px;color:#333;line-height:1.6;\"><div style=\"font-weight:bold;color:#9b59b6;margin-bottom:4px;\">慢失活 → 通道构象改变</div>钠离子通道也可通过构象改变进入慢失活态，阻止钠离子电流通过。研究指出慢失活过程中同样可产生持续性钠离子电流，与快失活的关系尚在研究中。</div></div></div>钠离子通道包含激活门和失活门两个门结构，控制着钠离子通道在静息、激活、失活三种功能状态之间转变<br>激活门开放后，钠离子快速内流，形成瞬时性钠离子电流，持续约1ms后失活门关闭，此时仍有少量钠离子持续内流，也就是持续性钠离子电流1,2<br>持续性钠离子电流有助于突触电流的放大，促进神经元重复放电，对正常的神经元兴奋性起到重要作用。生理状态下，持续性钠离子电流仅占所有钠离子电流的1%1,2<br>但在病理状态下，失活门关闭不全，过量钠离子持续流入，导致持续性钠离子电流异常增加。对难治性癫痫患者切除的海马下托组织的研究显示，持续性钠离子电流占比最高可达53%。过量持续性钠离子电流导致神经元过度兴奋，从而容易引发癫痫发作3。", "refs": [{"text": "Wengert ER, et al. Epilepsy Curr. 2021 Jan-Feb;21(1):40-47", "title": "The Role of the Persistent Sodium Current in Epilepsy.", "abstract": "Voltage-gated sodium channels (VGSCs) are foundational to excitable cell function: Their coordinated passage of sodium ions into the cell is critical for the generation and propagation of action potentials throughout the nervous system. The classical paradigm of action potential physiology states th", "url": "https://pubmed.ncbi.nlm.nih.gov/33236643/", "type": "literature", "doi": "10.1177/1535759720973978", "abstract_full": "Voltage-gated sodium channels (VGSCs) are foundational to excitable cell function: Their coordinated passage of sodium ions into the cell is critical for the generation and propagation of action potentials throughout the nervous system. The classical paradigm of action potential physiology states that sodium passes through the membrane only transiently (1-2 milliseconds), before the channels inactivate and cease to conduct sodium ions. However, in reality, a small fraction of the total sodium current (1%-2%) remains at steady state despite prolonged depolarization. While this persistent sodium current (INaP) contributes to normal physiological functioning of neurons, accumulating evidence indicates a particularly pathogenic role for an elevated INaP in epilepsy (reviewed previously1). Due to significant advances over the past decade of epilepsy research concerning the importance of INaP in sodium channelopathies, this review seeks to summarize recent evidence and highlight promising novel anti-seizure medication strategies through preferentially targeting INaP.", "abstract_zh": "电压门控钠通道（VGSCs）是可兴奋细胞功能的基础：其协调的钠离子内流对整个神经系统动作电位的产生和传导至关重要。动作电位生理学的经典范式认为，钠离子仅短暂通过细胞膜（1-2毫秒），随后通道失活并停止传导钠离子。然而实际上，尽管持续去极化，总钠电流的一小部分（1%-2%）仍维持在稳态。虽然持续性钠电流（INaP）参与神经元的正常生理功能，但越来越多的证据表明，升高的INaP在癫痫中具有特殊的致病作用（此前已有综述）。由于过去十年癫痫研究在INaP对钠通道病重要性方面取得显著进展，本综述旨在总结最新证据，并重点介绍通过优先靶向INaP的有前景的新型抗癫痫发作药物策略。", "title_full": "The Role of the Persistent Sodium Current in Epilepsy.", "pmid": "33236643"}, {"text": "2. Stafstrom CE. Epilepsy Curr. 2007 Jan-Feb;7(1):15-22", "title": "Persistent sodium current and its role in epilepsy.", "abstract": "Sodium currents are essential for the initiation and propagation of neuronal firing. Alterations of sodium currents can lead to abnormal neuronal activity, such as occurs in epilepsy. The transient voltage-gated sodium current mediates the upstroke of the action potential. A small fraction of sodium", "url": "https://pubmed.ncbi.nlm.nih.gov/17304346/", "type": "literature", "doi": "", "abstract_full": "Sodium currents are essential for the initiation and propagation of neuronal firing. Alterations of sodium currents can lead to abnormal neuronal activity, such as occurs in epilepsy. The transient voltage-gated sodium current mediates the upstroke of the action potential. A small fraction of sodium current, termed the persistent sodium current (I(NaP)), fails to inactivate significantly, even with prolonged depolarization. I(NaP) is activated in the subthreshold voltage range and is capable of amplifying a neuron's response to synaptic input and enhancing its repetitive firing capability. A burgeoning literature is documenting mutations in sodium channels that underlie human disease, including epilepsy. Some of these mutations lead to altered neuronal excitability by increasing I(NaP). This review focuses on the pathophysiological effects of I(NaP) in epilepsy.", "abstract_zh": "钠电流对神经元放电的起始和传导至关重要。钠电流的改变可导致神经元活动异常，如癫痫中发生的情况。瞬时电压门控钠电流介导动作电位的上升支。一小部分钠电流被称为持续性钠电流（I(NaP)），即使在持续去极化时也不能显著失活。I(NaP)在阈下电压范围内被激活，能够放大神经元对突触输入的反应并增强其重复放电能力。越来越多的文献记录了钠通道中导致人类疾病（包括癫痫）的突变。其中一些突变通过增加I(NaP)导致神经元兴奋性改变。本综述重点关注I(NaP)在癫痫中的病理生理作用。", "title_full": "Persistent sodium current and its role in epilepsy.", "pmid": "17304346"}, {"text": "3. Vreugdenhil M, et al. Eur J Neurosci. 2004;19(10):2769-2778", "title": "Persistent sodium current in subicular neurons isolated from patients with temporal lobe epilepsy.", "abstract": "The persistent sodium current is a common target of anti-epileptic drugs and contributes to burst firing. Intrinsically burst firing subicular neurons are involved in the generation and spread of epileptic activity. We measured whole-cell sodium currents in pyramidal neurons isolated from the subicu", "url": "https://pubmed.ncbi.nlm.nih.gov/15147310/", "type": "literature", "doi": "", "abstract_full": "The persistent sodium current is a common target of anti-epileptic drugs and contributes to burst firing. Intrinsically burst firing subicular neurons are involved in the generation and spread of epileptic activity. We measured whole-cell sodium currents in pyramidal neurons isolated from the subiculum resected in drug-resistant epileptic patients and in rats. In half of the cells from both patients and rats, the sodium current inactivated within 500 ms at -30 mV. Others displayed a tetrodotoxin-sensitive slowly or non-inactivating sodium current of up to 53% of the total sodium current amplitude. Compared with the transient sodium current in the same cells, this persistent sodium current activated with normal kinetics but its voltage-dependent activation occurred 7 mV more hyperpolarized. Depolarizing voltage steps that lasted 10 s completely inactivated the persistent sodium current. Its voltage dependence did not differ from that of the transient sodium current but its slope was less steep. The voltage dependence and kinetics of the persistent sodium current in cells from patients were not different from that in subicular cells from rats. The current density and the relative amplitude contribution were 3-4 times greater in neurons from drug-resistant epilepsy patients. The abundant presence of persistent sodium current in half of the subicular neurons could lead to a larger number of neurons with intrinsic burst firing. The extraordinarily large amplitude of the persistent sodium current in this subset of subicular neurons might explain why these patients are susceptible to seizures and hard to treat pharmacologically.", "abstract_zh": "持续性钠电流是抗癫痫药物的常见靶点，并参与爆发性放电。具有内在爆发性放电特征的下托神经元参与癫痫活动的产生和传播。我们在药物难治性癫痫患者和大鼠切除的下托中分离的锥体神经元上测量了全细胞钠电流。在来自患者和大鼠的半数细胞中，钠电流在-30 mV下500 ms内失活。其余细胞表现出河豚毒素敏感的缓慢或非失活性钠电流，最高可达总钠电流振幅的53%。与同一细胞中的瞬时钠电流相比，该持续性钠电流以正常动力学激活，但其电压依赖性激活发生在超极化方向7 mV处。持续10秒的去极化电压阶跃使持续性钠电流完全失活。其电压依赖性与瞬时钠电流无差异，但斜率较缓。患者细胞中持续性钠电流的电压依赖性和动力学与大鼠下托细胞无差异。药物难治性癫痫患者神经元的电流密度和相对振幅贡献大3-4倍。半数下托神经元中持续性钠电流的丰富存在可能导致更多具有内在爆发性放电的神经元。该亚群下托神经元中持续性钠电流的异常大幅振幅可能解释了这些患者为何易发癫痫发作且药物治疗困难。", "title_full": "Persistent sodium current in subicular neurons isolated from patients with temporal lobe epilepsy.", "pmid": "15147310"}]}, {"section": "产品基本信息", "question": "离子电流和钠通道快失活/慢失活有什么关系？", "answer": "<div style=\"background:#f8f4ff;border-radius:8px;padding:16px;margin-bottom:16px;\"><div style=\"font-weight:bold;color:#5b2d8e;margin-bottom:12px;font-size:13px;\">钠离子通道三种功能状态示意图</div><div style=\"display:flex;gap:8px;margin-bottom:12px;justify-content:center;\"><div style=\"text-align:center;flex:1;\"><div style=\"font-size:11px;font-weight:bold;color:#5b2d8e;margin-bottom:4px;\">静息态</div><svg width=\"70\" height=\"90\" viewBox=\"0 0 70 90\" style=\"display:block;margin:0 auto;\"><rect x=\"20\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><rect x=\"38\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><rect x=\"16\" y=\"28\" width=\"38\" height=\"7\" rx=\"3\" fill=\"#5b2d8e\"/><circle cx=\"35\" cy=\"72\" r=\"6\" fill=\"#9b59b6\" opacity=\"0.4\"/><circle cx=\"12\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"35\" cy=\"7\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"58\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><text x=\"5\" y=\"85\" font-size=\"9\" fill=\"#5b2d8e\">激活门↑ 失活门○</text></svg><div style=\"font-size:10px;color:#666;margin-top:4px;\">激活门关闭<br/>失活门开放<br/>无电流</div></div><div style=\"text-align:center;flex:1;\"><div style=\"font-size:11px;font-weight:bold;color:#5b2d8e;margin-bottom:4px;\">激活态</div><svg width=\"70\" height=\"90\" viewBox=\"0 0 70 90\" style=\"display:block;margin:0 auto;\"><rect x=\"12\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><rect x=\"46\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><circle cx=\"35\" cy=\"72\" r=\"6\" fill=\"#9b59b6\" opacity=\"0.4\"/><circle cx=\"12\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"35\" cy=\"30\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"35\" cy=\"50\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"58\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><line x1=\"35\" y1=\"15\" x2=\"35\" y2=\"65\" stroke=\"#e8821a\" stroke-width=\"2\" stroke-dasharray=\"4,2\"/><polygon points=\"31,62 39,62 35,70\" fill=\"#e8821a\"/></svg><div style=\"font-size:10px;color:#666;margin-top:4px;\">激活门开放<br/>失活门开放<br/>I<sub>NaT</sub>瞬时电流</div></div><div style=\"text-align:center;flex:1;\"><div style=\"font-size:11px;font-weight:bold;color:#5b2d8e;margin-bottom:4px;\">失活态</div><svg width=\"70\" height=\"90\" viewBox=\"0 0 70 90\" style=\"display:block;margin:0 auto;\"><rect x=\"12\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><rect x=\"46\" y=\"15\" width=\"12\" height=\"50\" rx=\"3\" fill=\"#e8821a\"/><circle cx=\"35\" cy=\"55\" r=\"9\" fill=\"#5b2d8e\" opacity=\"0.85\"/><circle cx=\"12\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><circle cx=\"58\" cy=\"10\" r=\"5\" fill=\"#7ec8a0\"/><text x=\"28\" y=\"58\" font-size=\"9\" fill=\"white\" font-weight=\"bold\">✕</text></svg><div style=\"font-size:10px;color:#666;margin-top:4px;\">激活门开放<br/>失活门关闭<br/>电流阻断</div></div></div><div style=\"display:flex;gap:8px;margin-top:4px;\"><div style=\"flex:1;background:white;border-radius:6px;padding:10px;font-size:11px;color:#333;line-height:1.6;\"><div style=\"font-weight:bold;color:#e8821a;margin-bottom:4px;\">快失活 → 持续性钠电流 I<sub>NaP</sub></div>快失活后失活门关闭不全，仍有少量钠离子持续缓慢内流（占总钠电流&lt;1%），形成持续性钠离子电流（I<sub>NaP</sub>）。翼弗瑞®通过抑制I<sub>NaP</sub>降低神经元异常兴奋性。</div><div style=\"flex:1;background:white;border-radius:6px;padding:10px;font-size:11px;color:#333;line-height:1.6;\"><div style=\"font-weight:bold;color:#9b59b6;margin-bottom:4px;\">慢失活 → 通道构象改变</div>钠离子通道也可通过构象改变进入慢失活态，阻止钠离子电流通过。研究指出慢失活过程中同样可产生持续性钠离子电流，与快失活的关系尚在研究中。</div></div></div>钠离子通道也可以通过构象改变以慢失活的方式进入失活态阻止钠离子电流通过。有研究指出，此时也有持续性钠离子电流产生。 钠离子通道由激活门和失活门两个门结构控制，在静息态、激活态、失活态三种功能状态之间快速转换。静息态时激活门关闭，失活门开放。受电压刺激后通道进入激活态，激活门和失活门均开放，形成瞬时性钠离子电流（INaT）。随后失活门迅速关闭通道进入失活态阻止电流通过且受刺激不会开放。 失活态 (快失活) 失活态（快失活） 理论上失活门关闭应当阻止所有钠离子电流流入，但实际上仍有小部分（正常状态下仅占不到全部钠离子电流的1%）钠离子电流持续流入形成持续性钠离子电流(INaP)。 失活态（慢失活） 由于INaT 在通道短暂开放期间形成，因此与快失活过程相关；而目前研究认为INaP主要由于快失活后失活门关闭不全导致钠离子持续缓慢内流形成，与通道构象改变引起的慢失活之间关系尚不明确。", "refs": [{"text": "1. Wu X, Hong L. Int J Mol Sci. 2021;22(18):9798", "title": "Calmodulin Interactions with Voltage-Gated Sodium Channels", "abstract": "Calmodulin (CaM) is a small protein that acts as a ubiquitous signal transducer and regulates neuronal plasticity, muscle contraction, and immune response. It interacts with ion channels and plays regulatory roles in cellular electrophysiology. CaM modulates the voltage-gated sodium channel gating p", "url": "https://pubmed.ncbi.nlm.nih.gov/34575961/", "type": "literature", "doi": "10.3390/ijms22189798", "abstract_full": "Calmodulin (CaM) is a small protein that acts as a ubiquitous signal transducer and regulates neuronal plasticity, muscle contraction, and immune response. It interacts with ion channels and plays regulatory roles in cellular electrophysiology. CaM modulates the voltage-gated sodium channel gating process, alters sodium current density, and regulates sodium channel protein trafficking and expression. Many mutations in the CaM-binding IQ domain give rise to diseases including epilepsy, autism, and arrhythmias by interfering with CaM interaction with the channel. In the present review, we discuss CaM interactions with the voltage-gated sodium channel and modulators involved in CaM regulation, as well as summarize CaM-binding IQ domain mutations associated with human diseases in the voltage-gated sodium channel family.", "abstract_zh": "钙调蛋白（CaM）是一种小分子蛋白，作为普遍存在的信号转导器，调节神经可塑性、肌肉收缩和免疫反应。它与离子通道相互作用，在细胞电生理学中发挥调节作用。CaM调节电压门控钠通道的门控过程，改变钠电流密度，并调节钠通道蛋白的转运和表达。CaM结合IQ结构域中的许多突变通过干扰CaM与通道的相互作用而导致包括癫痫、自闭症和心律失常在内的疾病。在本综述中，我们讨论了CaM与电压门控钠通道的相互作用及参与CaM调节的调节因子，并总结了电压门控钠通道家族中与人类疾病相关的CaM结合IQ结构域突变。", "title_full": "Calmodulin Interactions with Voltage-Gated Sodium Channels.", "pmid": "34575961"}, {"text": "2. Wengert ER, et al. Epilepsy Curr. 2021 Jan-Feb;21(1):40-47.", "title": "The Role of the Persistent Sodium Current in Epilepsy.", "abstract": "Voltage-gated sodium channels (VGSCs) are foundational to excitable cell function: Their coordinated passage of sodium ions into the cell is critical for the generation and propagation of action potentials throughout the nervous system. The classical paradigm of action potential physiology states th", "url": "https://pubmed.ncbi.nlm.nih.gov/33236643/", "type": "literature", "doi": "10.1177/1535759720973978", "abstract_full": "Voltage-gated sodium channels (VGSCs) are foundational to excitable cell function: Their coordinated passage of sodium ions into the cell is critical for the generation and propagation of action potentials throughout the nervous system. The classical paradigm of action potential physiology states that sodium passes through the membrane only transiently (1-2 milliseconds), before the channels inactivate and cease to conduct sodium ions. However, in reality, a small fraction of the total sodium current (1%-2%) remains at steady state despite prolonged depolarization. While this persistent sodium current (INaP) contributes to normal physiological functioning of neurons, accumulating evidence indicates a particularly pathogenic role for an elevated INaP in epilepsy (reviewed previously1). Due to significant advances over the past decade of epilepsy research concerning the importance of INaP in sodium channelopathies, this review seeks to summarize recent evidence and highlight promising novel anti-seizure medication strategies through preferentially targeting INaP.", "abstract_zh": "电压门控钠通道（VGSCs）是可兴奋细胞功能的基础：其协调的钠离子内流对整个神经系统动作电位的产生和传导至关重要。动作电位生理学的经典范式认为，钠离子仅短暂通过细胞膜（1-2毫秒），随后通道失活并停止传导钠离子。然而实际上，尽管持续去极化，总钠电流的一小部分（1%-2%）仍维持在稳态。虽然持续性钠电流（INaP）参与神经元的正常生理功能，但越来越多的证据表明，升高的INaP在癫痫中具有特殊的致病作用（此前已有综述）。由于过去十年癫痫研究在INaP对钠通道病重要性方面取得显著进展，本综述旨在总结最新证据，并重点介绍通过优先靶向INaP的有前景的新型抗癫痫发作药物策略。", "title_full": "The Role of the Persistent Sodium Current in Epilepsy.", "pmid": "33236643"}]}, {"section": "产品基本信息", "question": "翼弗瑞®对GABA能系统的调节作用具有哪些特点？", "answer": "翼弗瑞®通过正变构调节GABAA受体，增加氯离子流入，激活抑制性突触后电流，从而控制癫痫发作。<br>翼弗瑞®通过非苯二氮䓬位点发挥作用，与苯二氮䓬类药物不易交叉耐药同时避免苯二氮䓬类药物不良反应。 GABAA，γ氨基丁酸A型受体", "refs": [{"text": "Nakamura M, et al. Eur J Pharmacol. 2019;855:175-182.", "title": "Effects of cenobamate (YKP3089), a newly developed anti-epileptic drug, on voltage-gated sodium channels in rat hippocampal CA3 neurons.", "abstract": "New, more effective pharmacologic treatments for epilepsy are needed, as a substantial portion of patients (>30%) are refractory to currently available anti-epileptic drugs. Cenobamate (YKP3089) is an investigational anti-epileptic drug in clinical development. Two completed adequate and well-con", "url": "https://pubmed.ncbi.nlm.nih.gov/31063770/", "type": "literature", "doi": "10.1016/j.ejphar.2019.05.007", "abstract_full": "New, more effective pharmacologic treatments for epilepsy are needed, as a substantial portion of patients (>30%) are refractory to currently available anti-epileptic drugs. Cenobamate (YKP3089) is an investigational anti-epileptic drug in clinical development. Two completed adequate and well-controlled studies demonstrated a significant reduction in focal seizures with cenobamate in patients with epilepsy. In this study, we characterized the effects of cenobamate on voltage-gated Na+ channels in acutely isolated rat hippocampal CA3 neurons using a whole-cell patch-clamp technique. While cenobamate had little effect on the peak component of transient Na+ current (INaT) induced by brief depolarizing step pulses, it potently inhibited the non-inactivating persistent component of INa (INaP). In addition, cenobamate potently inhibited the current by slow voltage-ramp stimuli. Cenobamate significantly shifted the steady-state fast inactivation relationship toward a hyperpolarizing range, indicating that cenobamate binds to voltage-gated Na+ channels at the inactivated state with a higher affinity. Cenobamate also accelerated the development of inactivation and retarded recovery from inactivation of voltage-gated Na+ channels. In current clamp experiments, cenobamate hyperpolarized membrane potentials in a concentration-dependent manner, and these effects were mediated by inhibiting the INaP. Cenobamate also increased the threshold for generation of action potentials, and decreased the number of action potentials elicited by depolarizing current injection. Given that the INaP plays a pivotal role in the repetitive and/or burst generation of action potentials, the cenobamate-mediated preferential blockade of INaP might contribute to anti-epileptic activity.", "abstract_zh": "癫痫需要更有效的药物治疗，因为相当一部分患者（>30%）对现有抗癫痫药物耐药。西诺氨酯（YKP3089）是一种处于临床开发阶段的研究性抗癫痫药物。两项已完成的充分且对照良好的研究证实，西诺氨酯能显著减少癫痫患者的局灶性发作。本研究采用全细胞膜片钳技术，在急性分离的大鼠海马CA3神经元上表征了西诺氨酯对电压门控Na+通道的作用。西诺氨酯对短暂去极化阶跃脉冲诱发的瞬时Na+电流（INaT）峰值成分影响甚微，但强效抑制了INa的非失活性持续成分（INaP）。此外，西诺氨酯强效抑制了慢电压斜坡刺激引起的电流。西诺氨酯显著使稳态快失活曲线向超极化方向移动，表明西诺氨酯对失活态电压门控Na+通道具有更高的亲和力。西诺氨酯还加速了电压门控Na+通道失活的发展并延缓了失活后的恢复。在电流钳实验中，西诺氨酯以浓度依赖性方式使膜电位超极化，这些作用是通过抑制INaP介导的。西诺氨酯还提高了动作电位产生的阈值，并减少了去极化电流注射诱发的动作电位数量。鉴于INaP在动作电位重复和/或爆发性产生中起关键作用，西诺氨酯对INaP的优先阻断可能有助于其抗癫痫活性。", "title_full": "Effects of cenobamate (YKP3089), a newly developed anti-epileptic drug, on voltage-gated sodium channels in rat hippocampal CA3 neurons.", "pmid": "31063770"}]}, {"section": "产品基本信息", "question": "翼弗瑞®口服后多久达到最高血药浓度？多久达到稳态？", "answer": "翼弗瑞®口服后至少有88%被吸收，中位达峰时间 (Tmax) 范围为1～4小时，碾碎片剂的Tmax为0.5小时。每日一次用药大约2周后达到稳态血浆浓度。 西诺氨酯片说明书", "refs": []}, {"section": "产品基本信息", "question": "翼弗瑞®口服后分布特征如何？", "answer": "翼弗瑞®口服给药后，表观分布容积（Vd/F）约为40～50 L。血浆蛋白结合率为60%，与体外浓度无关。主要与人白蛋白结合。 西诺氨酯片说明书", "refs": []}, {"section": "产品基本信息", "question": "翼弗瑞®半衰期多久？通过什么方式消除？", "answer": "翼弗瑞®100mg/天～400mg/天的剂量范围内，表观终末半衰期为50～60小时，表观口服清除率约为0.45～0.63 L/小时。<br>翼弗瑞®可被广泛代谢，主要代谢途径为通过UGT2B7发生葡萄糖醛酸化，小部分通过UGT2B4，以及通过CYP2E1、CYP2A6、CYP2B6发生氧化，小部分通过CYP2C19和CYP3A4/5。<br>翼弗瑞®代谢后，原型药占总剂量的6.8%，主要经尿液排泄 (6.4%)。 西诺氨酯片说明书 CYP，细胞色素P450；UGT，尿苷二磷酸葡萄糖醛酸转移酶", "refs": []}, {"section": "产品基本信息", "question": "翼弗瑞®具有哪些药代动力学特征？", "answer": "翼弗瑞®具有线性药代动力学特征，峰浓度 (Cmax)以与剂量成比例的方式增加。在以单药或者作为添加疗法治疗局灶性癫痫时，翼弗瑞®的药代动力学特征相似。 西诺氨酯片说明书", "refs": []}, {"section": "产品基本信息", "question": "翼弗瑞®是否和酒精产生相互作用？", "answer": "健康受试者中，翼弗瑞®与乙醇合用后，在客观注意、精神运动表现 和记忆测试以及其他主观中枢神经系统测试中未观察到具有临床意义的差异。 西诺氨酯片说明书", "refs": []}, {"section": "产品基本信息", "question": "翼弗瑞®对响患者心脏功能存在哪些影响？", "answer": "在健康志愿者的安慰剂对照QT研究中，观察到翼弗瑞®相关的剂量依赖性QTcF间期缩短，但未观察到 QTc间期缩短至 300msec以下 (心率60~100次/分时，QT间期正常范围320-440msec)1。<br>一项2025年发表的体外研究显示，在最高治疗剂量下（400mg/d）翼弗瑞®不增加导致QRS间期延长或心律失常的风险。该研究进一步支持了翼弗瑞®在无心血管风险因素患者中使用的安全性2。", "refs": [{"text": "1. 西诺氨酯片说明书", "title": "西诺氨酯片说明书", "abstract": "", "url": null, "type": "package_insert"}, {"text": "2. Crumb WJ Jr, et al. Clin Transl Sci. 2025;18(10):e70378.", "title": "The Cardiac Sodium Channel Safety Profile of Cenobamate at Therapeutic Concentrations: In Vitro Analyses.", "abstract": "The US Food and Drug Administration (FDA) issued a Drug Safety Communication for the antiseizure drug lamotrigine (Lamictal), warning of the risk of QRS prolongation and cardiac arrhythmias. The FDA also requested that other antiseizure medications with a similar mechanism of action (e.g., block of", "url": "https://pubmed.ncbi.nlm.nih.gov/41058528/", "type": "literature", "doi": "10.1111/cts.70378", "abstract_full": "The US Food and Drug Administration (FDA) issued a Drug Safety Communication for the antiseizure drug lamotrigine (Lamictal), warning of the risk of QRS prolongation and cardiac arrhythmias. The FDA also requested that other antiseizure medications with a similar mechanism of action (e.g., block of neuronal sodium channels), including cenobamate, be evaluated for their risk as a cardiac sodium channel blocker. The purpose of this in vitro study was to determine the cardiac sodium channel blocking effects of cenobamate and its sodium channel classification. Follow-up experiments were also performed with cenobamate at its highest free therapeutic concentration (66 μM). Experiments were performed using the manual patch clamp technique at physiologic temperatures. Despite its classification as a Class Ib and Id antiarrhythmic, cenobamate was found to have little effect on the cardiac sodium channel when tested in vitro at therapeutic levels. These findings provide further clarity and support for the clinical safety of cenobamate in patients without cardiovascular risk factors.", "abstract_zh": "美国食品药品监督管理局（FDA）就抗癫痫发作药物拉莫三嗪（利必通）发布了药物安全通报，警告QRS波延长和心律失常的风险。FDA还要求对具有类似作用机制（如阻断神经元钠通道）的其他抗癫痫发作药物（包括西诺氨酯）进行评估，以确定其作为心脏钠通道阻滞剂的风险。本体外研究旨在确定西诺氨酯的心脏钠通道阻滞效应及其钠通道分类。还在西诺氨酯最高游离治疗浓度（66 μM）下进行了后续实验。实验采用手动膜片钳技术在生理温度下进行。尽管西诺氨酯被归类为Ib类和Id类抗心律失常药，但在治疗水平的体外测试中发现其对心脏钠通道影响甚微。这些发现进一步澄清并支持了西诺氨酯在无心血管风险因素患者中的临床安全性。", "title_full": "The Cardiac Sodium Channel Safety Profile of Cenobamate at Therapeutic Concentrations: In Vitro Analyses.", "pmid": "41058528"}]}, {"section": "产品基本信息", "question": "翼弗瑞®还在全球哪些国家和地区获批上市？", "answer": "翼弗瑞®在中国获批用于成人癫痫患者部分性发作 (根据ILAE 2017标准称为局灶性发作) 的治疗。<br>翼弗瑞®已获得FDA和EMA批准在美国和欧盟上市，其他获批国家包括瑞士、英国、以色列、加拿大、日本，以及中国香港、东南亚、澳洲、拉丁美洲、中东/北非超过40个国家/地区。 https://www.biospace.com/sk-biopharmaceuticals-announces-100-000-patients-globally-have-been-treated-with-cenobamate-through-sales-of-xcopri-and-ontozry-in-the-u-s-europe-israel-and-canada#:~:text=Cenobamate%20is%20also%20being%20developed%20in%20other,are%20pregnant%20or%20plan%20to%20become%20pregnant. ILAE，国际抗癫痫联盟；FDA，美国食品药品监督管理局；EMA，欧洲药品管理局", "refs": []}, {"section": "产品使用问题", "question": "翼弗瑞®建议在每天什么时间服用？", "answer": "说明书推荐翼弗瑞®每日一次服用1； 2022年发表的一篇意大利专家应用共识中推荐睡前服用翼弗瑞®，使药物吸收后嗜睡和眩晕的发生时间与患者睡眠时间一致，从而提升耐受性2。", "refs": [{"text": "1. 西诺氨酯片说明书", "title": "西诺氨酯片说明书", "abstract": "", "url": null, "type": "package_insert"}, {"text": "2. Villani F, et al. Expert Rev Neurother. 2022;22(11-12):935-940.", "title": "Use of cenobamate for the treatment of focal epilepsy: an Italian expert opinion paper.", "abstract": "Cenobamate is a new antiseizure medication (ASM) recently introduced in the USA for the treatment of adults with focal-onset seizures. In March 2021, the European Commission authorized its use for the adjunctive treatment of focal-onset seizures with or without secondary generalization (focal seizur", "url": "https://pubmed.ncbi.nlm.nih.gov/36662573/", "type": "literature", "doi": "10.1080/14737175.2023.2171291", "abstract_full": "INTRODUCTION: Cenobamate is a new antiseizure medication (ASM) recently introduced in the USA for the treatment of adults with focal-onset seizures. In March 2021, the European Commission authorized its use for the adjunctive treatment of focal-onset seizures with or without secondary generalization (focal seizures with or without progression to bilateral tonic-clonic seizures, according to current ILAE terminology) in adults with epilepsy not adequately controlled despite the treatment with at least two ASMs. AREAS COVERED: This review summarizes the mechanism of action, efficacy, and safety of Cenobamate. The authors provide their expert opinions on the use of this drug. EXPERT OPINION: The aim of this paper is to report on the Italian preliminary experience with the use of cenobamate, focusing on treatment goals, optimal dosing and titration schedules, strategies to minimize adverse effects, and identification of suitable candidates for treatment. There was agreement that slow titration may improve tolerability, and that clinically significant benefit can be achieved in many patients at relatively low doses. A favorable response to relatively low doses of cenobamate could be an early predictor of ultimate responsiveness. Overall, cenobamate is a welcome new treatment for adults with focal seizures resistant to conventional ASMs.", "abstract_zh": "引言：西诺氨酯是一种新型抗癫痫发作药物（ASM），近期在美国获批用于治疗成人局灶性发作。2021年3月，欧盟委员会批准其用于成人癫痫局灶性发作伴或不伴继发全面性发作（按当前ILAE术语，即局灶性发作伴或不伴进展为双侧强直-阵挛发作）的辅助治疗，适用于经至少两种ASM治疗后仍未能充分控制的成人癫痫患者。涵盖领域：本综述总结了西诺氨酯的作用机制、疗效和安全性。作者提供了使用该药物的专家意见。专家意见：本文旨在报告意大利使用西诺氨酯的初步经验，重点关注治疗目标、最佳剂量和滴定方案、最小化不良反应的策略以及合适治疗候选者的识别。专家一致认为，缓慢滴定可改善耐受性，且许多患者在相对较低剂量下即可获得有临床意义的获益。对相对低剂量西诺氨酯的良好反应可能是最终治疗反应性的早期预测因子。总体而言，西诺氨酯是治疗对常规ASM耐药的成人局灶性发作的受欢迎的新治疗选择。", "title_full": "Use of cenobamate for the treatment of focal epilepsy: an Italian expert opinion paper.", "pmid": "36662573"}]}, {"section": "产品使用问题", "question": "翼弗瑞®说明书推荐每日服用剂量是多少？", "answer": "对于成人局灶性癫痫患者，翼弗瑞®的推荐日维持剂量为200mg，每日最高剂量为400mg。 西诺氨酯片说明书.", "refs": []}, {"section": "产品使用问题", "question": "翼弗瑞®用药前需要进行哪些检查？", "answer": "如果治疗前3个月内未曾检查过ALT、AST和总胆红素，则需要进行相关检查，以确定肝功能基线值。 西诺氨酯片说明书. ALT，丙氨酸转氨酶；AST，天冬氨酸转氨酶", "refs": []}, {"section": "产品使用问题", "question": "翼弗瑞®在使用过程中有哪些注意事项？", "answer": "治疗期间需监测肝损伤体征和症状，如果出现肝功能障碍相关临床体征或症状（如不明原因的恶心、呕吐、右上腹腹痛、疲劳、厌食、黄疸、小便黄赤），应及时检测血清ALT、AST和总胆红素水平。对于出现肝损伤且无其他病因的患者，应中断或终止本品治疗。 西诺氨酯片说明书. ALT，丙氨酸转氨酶；AST，天冬氨酸转氨酶", "refs": []}, {"section": "产品使用问题", "question": "翼弗瑞®是否可以一日多次服用？", "answer": "翼弗瑞®说明书推荐的使用方案为每日一次服用，每日多次服用对药代动力学的变化尚不清楚，但建议每日总剂量不超过说明书推荐的最大剂量400mg/d1。<br>在一项回顾性观察性IV期研究中（n=51），有患者（n=11, 21.6%）将翼弗瑞®日剂量分为每日两次服用的情况出现2。", "refs": [{"text": "1. 西诺氨酯片说明书", "title": "西诺氨酯片说明书", "abstract": "", "url": null, "type": "package_insert"}, {"text": "2. Beltrán-Corbellini Á, et al. Seizure. 2023;111:71-77.", "title": "Cenobamate in patients with highly refractory focal epilepsy: A retrospective real-world study.", "abstract": "To determine the effectiveness and safety outcomes of cenobamate in a cohort of patients with highly refractory focal epilepsy in routine clinical practice. Observational, retrospective, phase 4 study on subjects receiving cenobamate in three Spanish centers. The primary endpoint was the retention r", "url": "https://pubmed.ncbi.nlm.nih.gov/37549616/", "type": "literature", "doi": "10.1016/j.seizure.2023.07.026", "abstract_full": "PURPOSE: To determine the effectiveness and safety outcomes of cenobamate in a cohort of patients with highly refractory focal epilepsy in routine clinical practice. METHODS: Observational, retrospective, phase 4 study on subjects receiving cenobamate in three Spanish centers. The primary endpoint was the retention rate at the last follow-up. The main secondary endpoints were the 50%-responder and seizure-free rates at three months and the last follow-up. Other secondary endpoints were Global Clinical Impressions-Improvement (CGI-I) scores and treatment-emergent adverse events (TEAEs). RESULTS: Fifty-one patients with highly refractory focal epilepsy with 24.7 years of disease evolution, ten previously tried ASM, and a 23.5% of previous epilepsy surgery were included. The retention rate at the last follow-up was 80.4%. The 50% responder rate in focal seizures at three months was 56.5% (median reduction per month 51%, 0-74.6; p < 0.0001) and in focal to bilateral tonic-clonic seizures was 63.6% (median reduction per month 89%, 0-100; p = 0.022). A total of 54.3% of subjects reported a reduction in the intensity of focal seizures, and 66% manifested clinically significant satisfaction. Cenobamate allowed a significant decrease in concomitant ASM, especially sodium channel blockers. TEAEs were reported in 43.1% of individuals, 85% of whom resolved or improved, with no new safety findings. CONCLUSION: In this analysis of patients with highly refractory focal epilepsy treated with cenobamate according to standard clinical practice, there was evidence of a high reduction in both seizure frequency and intensity, with a manageable safety profile.", "abstract_zh": "目的：确定在日常临床实践中高度难治性局灶性癫痫患者队列中西诺氨酯的有效性和安全性结局。方法：在三个西班牙中心进行的观察性、回顾性、IV期研究，纳入接受西诺氨酯治疗的患者。主要终点为末次随访时的留存率。主要次要终点为3个月和末次随访时的50%应答率和无发作率。其他次要终点为总体临床印象-改善（CGI-I）评分和治疗中出现的不良事件（TEAEs）。结果：纳入51例高度难治性局灶性癫痫患者，病程中位数24.7年，既往尝试过10种ASM，23.5%既往接受癫痫手术。末次随访时留存率为80.4%。3个月时局灶性发作的50%应答率为56.5%（每月中位数减少51%，范围0-74.6；p < 0.0001），局灶性进展为双侧强直-阵挛发作的50%应答率为63.6%（每月中位数减少89%，范围0-100；p = 0.022）。54.3%的患者报告局灶性发作强度减轻，66%表现出有临床意义的满意度。西诺氨酯使合并使用的ASM显著减少，尤其是钠通道阻滞剂。43.1%的个体报告TEAEs，其中85%缓解或改善，未发现新的安全性问题。结论：在这项按照标准临床实践接受西诺氨酯治疗的高度难治性局灶性癫痫患者分析中，证据显示发作频率和强度均大幅降低，安全性特征可控。", "title_full": "Cenobamate in patients with highly refractory focal epilepsy: A retrospective real-world study.", "pmid": "37549616"}]}, {"section": "产品使用问题", "question": "翼弗瑞®与哪些抗癫痫发作药物存在相互作用？如何处理？", "answer": "1. 翼弗瑞®会使苯妥英、苯巴比妥、氯巴占的血药浓度升高1，如果添加至这些药物：<br>建议监测苯妥英、苯巴比妥血药浓度，翼弗瑞®滴定至25mg/d时，如果苯妥英血药浓度＞15µg/mL、苯巴比妥血药浓度＞30µg/mL，则主动减少剂量2<br>翼弗瑞®滴定至50-100mg/d时，如果氯巴占≥20mg/天，主动减少至5-10mg/d2<br>2. 翼弗瑞®会使拉莫三嗪、卡马西平血药浓度降低，可能降低这些药物的有效性1 。但也需要考虑SCBs之间可能存在PD相互作用，上述PK相互作用或可抵消翼弗瑞®与卡马西平、拉莫三嗪之间的药效学叠加效应。一份2022年发表的美国专家共识建议，在翼弗瑞®滴定初期无需主动调整卡马西平和拉莫三嗪剂量3。 SCB，钠离子通道阻滞剂；PD，药效动力学；PK，药代动力学", "refs": [{"text": "1. 西诺氨酯片说明书", "title": "西诺氨酯片说明书", "abstract": "", "url": null, "type": "package_insert"}, {"text": "2. Carreño M, et al. Epilepsia Open. 2024;9(3):1051-1058", "title": "Spanish consensus on the management of concomitant antiseizure medications when using cenobamate in adults with drug-resistant focal seizures.", "abstract": "Cenobamate is an antiseizure medication (ASM) associated with high rates of seizure freedom and acceptable tolerability in patients with focal seizures. To achieve the optimal cenobamate dose for maximal potential effectiveness while avoiding or minimizing drug-related adverse events (AEs), the admi", "url": "https://pubmed.ncbi.nlm.nih.gov/38573131/", "type": "literature", "doi": "10.1002/epi4.12936", "abstract_full": "OBJECTIVE: Cenobamate is an antiseizure medication (ASM) associated with high rates of seizure freedom and acceptable tolerability in patients with focal seizures. To achieve the optimal cenobamate dose for maximal potential effectiveness while avoiding or minimizing drug-related adverse events (AEs), the administration of cenobamate with other ASMs must be managed through concomitant ASM load reduction. A panel of Spanish epilepsy experts aimed to provide a Spanish consensus on how to adjust the dose of concomitant ASMs in patients with drug-resistant epilepsy (DRE) in order to improve the effectiveness and tolerability of adjunctive cenobamate. METHODS: A three-stage modified Delphi consensus process was undertaken, including six Spanish epileptologists with extensive experience using cenobamate. Based on current literature and their own expert opinion, the expert panel reached a consensus on when and how to adjust the dosage of concomitant ASMs during cenobamate titration. RESULTS: The expert panel agreed that tailored titration and close follow-up are required to achieve the best efficacy and tolerability when initiating cenobamate in patients receiving concomitant ASMs. When concomitant clobazam, phenytoin, phenobarbital, and sodium channel blockers are taken at high dosages, or when the patient is receiving two or more sodium channel blockers, dosages should be proactively lowered during the cenobamate titration period. Other concomitant ASMs should be reduced only if the patient reports a moderate/severe AE at any stage of the titration period. SIGNIFICANCE: Cenobamate is an effective ASM with a dose-dependent effect. To maximize effectiveness while maintaining the best tolerability profile, co-medication management is needed. The recommendations included herein provide practical guidance for proactive and reactive management of co-medication in cenobamate-treated patients with DRE and a high drug load. PLAIN LANGUAGE SUMMARY: Patients with epilepsy may continue to have seizures even after treatment with several different antiseizure medications (ASMs). Cenobamate is an ASM that can reduce seizures in these patients. In this study, six Spanish experts in epilepsy discussed the best way to use cenobamate in drug-resistant epilepsy. They provide practical guidance on when and how the dose of other ASMs might be adjusted to reduce side effects and optimize the use of cenobamate.", "abstract_zh": "目的：西诺氨酯是一种与高无发作率和可接受耐受性相关的抗癫痫发作药物（ASM），用于局灶性发作患者。为实现西诺氨酯最佳剂量以获得最大潜在疗效，同时避免或最小化药物相关不良事件（AEs），必须通过减少合并ASM负荷来管理西诺氨酯与其他ASM的联合用药。一组西班牙癫痫专家旨在提供西班牙共识，就如何调整药物难治性癫痫（DRE）患者合并ASM的剂量提出建议，以改善辅助西诺氨酯的疗效和耐受性。方法：采用三阶段改良德尔菲共识过程，纳入六位具有丰富西诺氨酯使用经验的西班牙癫痫专家。基于现有文献和专家意见，专家组就西诺氨酯滴定期间何时及如何调整合并ASM剂量达成共识。结果：专家组一致认为，在合并ASM的患者中启动西诺氨酯时，需要个体化滴定和密切随访以实现最佳疗效和耐受性。当合并使用氯巴占、苯妥英、苯巴比妥和钠通道阻滞剂处于高剂量时，或患者正在接受两种或以上钠通道阻滞剂时，应在西诺氨酯滴定期间主动降低剂量。其他合并ASM仅在患者于滴定期间任何阶段报告中度/重度AE时才应减量。意义：西诺氨酯是一种具有剂量依赖性效应的有效ASM。为在保持最佳耐受性的同时最大化疗效，需要进行合并用药管理。本文所含推荐意见为药物难治性癫痫和高药物负荷患者中合并用药的主动和反应性管理提供了实用指导。通俗语言摘要：即使经过几种不同抗癫痫发作药物（ASM）治疗后，癫痫患者仍可能继续发作。西诺氨酯是一种可减少这些患者发作的ASM。在本研究中，六位西班牙癫痫专家讨论了在药物难治性癫痫中最佳使用西诺氨酯的方法。他们就何时及如何调整其他ASM剂量提供了实用指导，以减少副作用并优化西诺氨酯的使用。", "title_full": "Spanish consensus on the management of concomitant antiseizure medications when using cenobamate in adults with drug-resistant focal seizures.", "pmid": "38573131"}, {"text": "3. Smith MC, et al. Neurol Ther. 2022;11(4):1705-1720.", "title": "Dose Adjustment of Concomitant Antiseizure Medications During Cenobamate Treatment: Expert Opinion Consensus Recommendations.", "abstract": "Our objective was to provide expert consensus recommendations to improve treatment tolerability through dose adjustments of concomitant antiseizure medications (ASMs) during addition of cenobamate to existing ASM therapy in adult patients with uncontrolled focal seizures. A panel of seven epileptolo", "url": "https://pubmed.ncbi.nlm.nih.gov/36057761/", "type": "literature", "doi": "10.1007/s40120-022-00400-5", "abstract_full": "INTRODUCTION: Our objective was to provide expert consensus recommendations to improve treatment tolerability through dose adjustments of concomitant antiseizure medications (ASMs) during addition of cenobamate to existing ASM therapy in adult patients with uncontrolled focal seizures. METHODS: A panel of seven epileptologists experienced in the use of ASMs, including cenobamate, used a modified Delphi process to reach consensus. The panelists discussed tolerability issues with concomitant ASMs during cenobamate titration and practical strategies for dose adjustments that may prevent or mitigate adverse effects. The resulting recommendations consider concomitant ASM dose level and specify proactive (prior to report of an adverse effect) and reactive (in response to report of an adverse effect) dose adjustment suggestions based on concomitant ASM pharmacokinetic and pharmacodynamic interactions with cenobamate. Specific dose adjustment recommendations are provided. RESULTS: We recommend proactively lowering the dose of clobazam, phenytoin, and phenobarbital due to their known drug-drug interactions with cenobamate, and lacosamide due to a pharmacodynamic interaction with cenobamate, to prevent adverse effects during cenobamate titration. Reactive lowering of a concomitant ASM dose is sufficient for other ASMs at standard dosing owing to quick resolution of adverse effects. For carbamazepine and lamotrigine doses exceeding the upper end of standard dosing (e.g., carbamazepine, greater than 1200 mg/day; lamotrigine, greater than 500 mg/day), we encourage consideration of proactive dose reduction at cenobamate 200 mg/day to prevent potential adverse effects. All dose reductions for adverse effects can be repeated every 2 weeks as dictated by the adverse effects. At cenobamate 200 mg/day, we recommend that patients be evaluated for marked improvement of seizures and further dose reductions be considered to reduce potentially unnecessary polypharmacy. CONCLUSION: The primary goal of the recommended dose reductions of concomitant ASMs is to prevent or resolve adverse effects, thereby allowing cenobamate to reach the optimal dose to achieve the maximal potential of improving seizure control.", "abstract_zh": "引言：我们的目标是通过在现有ASM治疗中加入西诺氨酯时调整合并抗癫痫发作药物（ASM）的剂量，提供专家共识推荐以改善治疗耐受性，适用于局灶性发作未控制的成人患者。方法：由七位在ASM（包括西诺氨酯）使用方面经验丰富的癫痫专家采用改良德尔菲法达成共识。专家组讨论了西诺氨酯滴定期间合并ASM的耐受性问题以及可能预防或减轻不良反应的剂量调整实用策略。由此产生的推荐意见考虑了合并ASM的剂量水平，并基于合并ASM与西诺氨酯的药代动力学和药效学相互作用，提出了主动（在报告不良事件前）和反应性（在报告不良事件后）的剂量调整建议。提供了具体的剂量调整推荐。结果：我们建议主动降低氯巴占、苯妥英和苯巴比妥的剂量（因其与西诺氨酯有已知的药物-药物相互作用），以及拉考沙胺的剂量（因其与西诺氨酯有药效学相互作用），以预防西诺氨酯滴定期间的不良事件。对于标准剂量下的其他ASM，反应性降低合并ASM剂量即可，因为不良事件可快速缓解。对于超过标准剂量上限的卡马西平和拉莫三嗪剂量（如卡马西平大于1200 mg/天；拉莫三嗪大于500 mg/天），我们建议在西诺氨酯200 mg/天时考虑主动减量以预防潜在不良事件。所有因不良事件进行的减量可根据不良事件情况每2周重复一次。在西诺氨酯200 mg/天时，建议评估患者发作是否明显改善，并考虑进一步减量以减少潜在不必要的多药联合。结论：合并ASM减量的主要目标是预防或解决不良事件，从而使西诺氨酯能够达到最佳剂量以实现改善发作控制的最大潜力。", "title_full": "Dose Adjustment of Concomitant Antiseizure Medications During Cenobamate Treatment: Expert Opinion Consensus Recommendations.", "pmid": "36057761"}]}, {"section": "产品使用问题", "question": "翼弗瑞®与哪些非抗癫痫发作药物存在相互作用？如何处理？", "answer": "1. 翼弗瑞®会使CYP2B6底物、CYP3A4底物、口服避孕药的浓度下降。由于这些药物的有效性可能降低，需要视情况增加剂量1：<br>CYP2B6底物：常见药物包括 安非他酮，环磷酰胺，异环磷酰胺，依非韦伦2<br>CYP3A4底物：常见药物包括 对乙酰氨基酚，钙通道阻滞剂 (如 地尔硫卓、硝苯地平、维拉帕米)，环孢素，HIV蛋白酶抑制剂 (如 因地那韦、洛匹那韦、利托那韦)，咪达唑仑、他汀类 (如 阿托伐他汀、辛伐他汀)、三唑仑2<br>口服避孕药：建议女性患者在服用翼弗瑞®期间，使用非激素类避孕药物1<br>2. 翼弗瑞®会使CYP2C19底物的浓度上升，不良反应风险可能增加，视需要降低剂量1：<br>CYP2C19底物：常见药物包括氯吡格雷，兰索拉唑，奥美拉唑，泮托拉唑2<br>翼弗瑞®可缩短QT间期，因此在与其他缩短QT间期的药物合并使用时需谨慎1<br>导致QT间期缩短的药物：常见于抗心律失常药物，如奎尼丁，利多卡因，美西率，氟卡尼等3<br>对于患者合并使用的窄治疗指数药物及长期使用药物 (如 抗血栓形成药物、抗HIV药物)，建议监测这些药物的血药浓度以指导用药4 CYP，细胞色素P450", "refs": [{"text": "西诺氨酯片说明书", "title": "西诺氨酯片说明书", "abstract": "", "url": null, "type": "package_insert"}, {"text": "2. Song Y, et al. Clin Pharmacokinet. 2021;60(5):585-601", "title": "Drug-Metabolizing Cytochrome P450 Enzymes Have Multifarious Influences on Treatment Outcomes.", "abstract": "Drug metabolism is a critical process for the removal of unwanted substances from the body. In humans, approximately 80% of oxidative metabolism and almost 50% of the overall elimination of commonly used drugs can be attributed to one or more of various cytochrome P450 (CYP) enzymes from CYP familie", "url": "https://pubmed.ncbi.nlm.nih.gov/33723723/", "type": "literature", "doi": "10.1007/s40262-021-01001-5", "abstract_full": "Drug metabolism is a critical process for the removal of unwanted substances from the body. In humans, approximately 80% of oxidative metabolism and almost 50% of the overall elimination of commonly used drugs can be attributed to one or more of various cytochrome P450 (CYP) enzymes from CYP families 1-3. In addition to the basic metabolic effects for elimination, CYP enzymes in vivo are capable of affecting the treatment outcomes in many cases. Drug-metabolizing CYP enzymes are mainly expressed in the liver and intestine, the two principal drug oxidation and elimination organs, where they can significantly influence the drug action, safety, and bioavailability by mediating phase I metabolism and first-pass metabolism. Furthermore, CYP-mediated local drug metabolism in the sites of action may also have the potential to impact drug response, according to the literature in recent years. This article underlines the ability of CYP enzymes to influence treatment outcomes by discussing CYP-mediated diversified drug metabolism in primary metabolic sites (liver and intestine) and typical action sites (brain and tumors) according to their expression levels and metabolic activity. Moreover, intrinsic and extrinsic factors of personal differential CYP phenotypes that contribute to interindividual variation of treatment outcomes are also reviewed to introduce the multifarious pivotal role of CYP-mediated metabolism and clearance in drug therapy.", "abstract_zh": "药物代谢是清除体内不需要物质的关键过程。在人类中，约80%的氧化代谢和近50%的常用药物总体消除可归因于CYP1-3家族中一种或多种细胞色素P450（CYP）酶。除基本的消除代谢作用外，CYP酶在体内许多情况下还能影响治疗结局。药物代谢CYP酶主要在肝脏和肠道表达，这两个主要的药物氧化和消除器官中，CYP酶通过介导I相代谢和首过代谢显著影响药物作用、安全性和生物利用度。此外，根据近年文献，作用部位的CYP介导的局部药物代谢也可能影响药物反应。本文通过讨论CYP介导的主要代谢部位（肝脏和肠道）和典型作用部位（脑和肿瘤）中根据其表达水平和代谢活性的多样化药物代谢，强调了CYP酶影响治疗结局的能力。此外，还综述了导致治疗结局个体间差异的个人差异CYP表型的内在和外在因素，以介绍CYP介导的代谢和清除在药物治疗中的多方面关键作用。", "title_full": "Drug-Metabolizing Cytochrome P450 Enzymes Have Multifarious Influences on Treatment Outcomes.", "pmid": "33723723"}, {"text": "3. Crumb WJ Jr, et al. Clin Transl Sci. 2025;18(10):e70378", "title": "The Cardiac Sodium Channel Safety Profile of Cenobamate at Therapeutic Concentrations: In Vitro Analyses.", "abstract": "The US Food and Drug Administration (FDA) issued a Drug Safety Communication for the antiseizure drug lamotrigine (Lamictal), warning of the risk of QRS prolongation and cardiac arrhythmias. The FDA also requested that other antiseizure medications with a similar mechanism of action (e.g., block of", "url": "https://pubmed.ncbi.nlm.nih.gov/41058528/", "type": "literature", "doi": "10.1111/cts.70378", "abstract_full": "The US Food and Drug Administration (FDA) issued a Drug Safety Communication for the antiseizure drug lamotrigine (Lamictal), warning of the risk of QRS prolongation and cardiac arrhythmias. The FDA also requested that other antiseizure medications with a similar mechanism of action (e.g., block of neuronal sodium channels), including cenobamate, be evaluated for their risk as a cardiac sodium channel blocker. The purpose of this in vitro study was to determine the cardiac sodium channel blocking effects of cenobamate and its sodium channel classification. Follow-up experiments were also performed with cenobamate at its highest free therapeutic concentration (66 μM). Experiments were performed using the manual patch clamp technique at physiologic temperatures. Despite its classification as a Class Ib and Id antiarrhythmic, cenobamate was found to have little effect on the cardiac sodium channel when tested in vitro at therapeutic levels. These findings provide further clarity and support for the clinical safety of cenobamate in patients without cardiovascular risk factors.", "abstract_zh": "美国食品药品监督管理局（FDA）就抗癫痫发作药物拉莫三嗪（利必通）发布了药物安全通报，警告QRS波延长和心律失常的风险。FDA还要求对具有类似作用机制（如阻断神经元钠通道）的其他抗癫痫发作药物（包括西诺氨酯）进行评估，以确定其作为心脏钠通道阻滞剂的风险。本体外研究旨在确定西诺氨酯的心脏钠通道阻滞效应及其钠通道分类。还在西诺氨酯最高游离治疗浓度（66 μM）下进行了后续实验。实验采用手动膜片钳技术在生理温度下进行。尽管西诺氨酯被归类为Ib类和Id类抗心律失常药，但在治疗水平的体外测试中发现其对心脏钠通道影响甚微。这些发现进一步澄清并支持了西诺氨酯在无心血管风险因素患者中的临床安全性。", "title_full": "The Cardiac Sodium Channel Safety Profile of Cenobamate at Therapeutic Concentrations: In Vitro Analyses.", "pmid": "41058528"}, {"text": "4. Carreño M, et al. Epilepsia Open. 2024;9(3):1051-1058.", "title": "Spanish consensus on the management of concomitant antiseizure medications when using cenobamate in adults with drug-resistant focal seizures.", "abstract": "Cenobamate is an antiseizure medication (ASM) associated with high rates of seizure freedom and acceptable tolerability in patients with focal seizures. To achieve the optimal cenobamate dose for maximal potential effectiveness while avoiding or minimizing drug-related adverse events (AEs), the admi", "url": "https://pubmed.ncbi.nlm.nih.gov/38573131/", "type": "literature", "doi": "10.1002/epi4.12936", "abstract_full": "OBJECTIVE: Cenobamate is an antiseizure medication (ASM) associated with high rates of seizure freedom and acceptable tolerability in patients with focal seizures. To achieve the optimal cenobamate dose for maximal potential effectiveness while avoiding or minimizing drug-related adverse events (AEs), the administration of cenobamate with other ASMs must be managed through concomitant ASM load reduction. A panel of Spanish epilepsy experts aimed to provide a Spanish consensus on how to adjust the dose of concomitant ASMs in patients with drug-resistant epilepsy (DRE) in order to improve the effectiveness and tolerability of adjunctive cenobamate. METHODS: A three-stage modified Delphi consensus process was undertaken, including six Spanish epileptologists with extensive experience using cenobamate. Based on current literature and their own expert opinion, the expert panel reached a consensus on when and how to adjust the dosage of concomitant ASMs during cenobamate titration. RESULTS: The expert panel agreed that tailored titration and close follow-up are required to achieve the best efficacy and tolerability when initiating cenobamate in patients receiving concomitant ASMs. When concomitant clobazam, phenytoin, phenobarbital, and sodium channel blockers are taken at high dosages, or when the patient is receiving two or more sodium channel blockers, dosages should be proactively lowered during the cenobamate titration period. Other concomitant ASMs should be reduced only if the patient reports a moderate/severe AE at any stage of the titration period. SIGNIFICANCE: Cenobamate is an effective ASM with a dose-dependent effect. To maximize effectiveness while maintaining the best tolerability profile, co-medication management is needed. The recommendations included herein provide practical guidance for proactive and reactive management of co-medication in cenobamate-treated patients with DRE and a high drug load. PLAIN LANGUAGE SUMMARY: Patients with epilepsy may continue to have seizures even after treatment with several different antiseizure medications (ASMs). Cenobamate is an ASM that can reduce seizures in these patients. In this study, six Spanish experts in epilepsy discussed the best way to use cenobamate in drug-resistant epilepsy. They provide practical guidance on when and how the dose of other ASMs might be adjusted to reduce side effects and optimize the use of cenobamate.", "abstract_zh": "目的：西诺氨酯是一种与高无发作率和可接受耐受性相关的抗癫痫发作药物（ASM），用于局灶性发作患者。为实现西诺氨酯最佳剂量以获得最大潜在疗效，同时避免或最小化药物相关不良事件（AEs），必须通过减少合并ASM负荷来管理西诺氨酯与其他ASM的联合用药。一组西班牙癫痫专家旨在提供西班牙共识，就如何调整药物难治性癫痫（DRE）患者合并ASM的剂量提出建议，以改善辅助西诺氨酯的疗效和耐受性。方法：采用三阶段改良德尔菲共识过程，纳入六位具有丰富西诺氨酯使用经验的西班牙癫痫专家。基于现有文献和专家意见，专家组就西诺氨酯滴定期间何时及如何调整合并ASM剂量达成共识。结果：专家组一致认为，在合并ASM的患者中启动西诺氨酯时，需要个体化滴定和密切随访以实现最佳疗效和耐受性。当合并使用氯巴占、苯妥英、苯巴比妥和钠通道阻滞剂处于高剂量时，或患者正在接受两种或以上钠通道阻滞剂时，应在西诺氨酯滴定期间主动降低剂量。其他合并ASM仅在患者于滴定期间任何阶段报告中度/重度AE时才应减量。意义：西诺氨酯是一种具有剂量依赖性效应的有效ASM。为在保持最佳耐受性的同时最大化疗效，需要进行合并用药管理。本文所含推荐意见为药物难治性癫痫和高药物负荷患者中合并用药的主动和反应性管理提供了实用指导。通俗语言摘要：即使经过几种不同抗癫痫发作药物（ASM）治疗后，癫痫患者仍可能继续发作。西诺氨酯是一种可减少这些患者发作的ASM。在本研究中，六位西班牙癫痫专家讨论了在药物难治性癫痫中最佳使用西诺氨酯的方法。他们就何时及如何调整其他ASM剂量提供了实用指导，以减少副作用并优化西诺氨酯的使用。", "title_full": "Spanish consensus on the management of concomitant antiseizure medications when using cenobamate in adults with drug-resistant focal seizures.", "pmid": "38573131"}]}, {"section": "产品使用问题", "question": "哪些患者禁止使用翼弗瑞® ？", "answer": "对西诺氨酯或西诺氨酯片中任何非活性成分过敏的患者禁用。<br>家族性短QT间期综合征患者禁用。 西诺氨酯片说明书.", "refs": []}, {"section": "产品使用问题", "question": "既往使用钠通道机制药物控制不佳的患者，能否添加使用翼弗瑞®？", "answer": "可以使用，既往使用SCBs控制不佳的患者添加翼弗瑞®，发作频率降幅最高可达100%，无发作率最高达到58.1%。<br>C035研究是翼弗瑞®在中日韩三国开展的多中心随机对照研究，纳入经1-3种ASMs治疗仍控制不佳的局灶性癫痫患者，探索翼弗瑞®添加治疗的疗效和安全性。在C035研究的中国亚组分析中，85.3%的患者联用了SCBs，14.7%联用非SCBs。联用SCBs的患者，翼弗瑞® 200mg/d和400mg/d剂量组，中位发作频率降幅分别达到-88.0%和-100%，无发作率分别达到37.0%和58.1%。 SCB，钠离子通道阻滞剂；ASMs，抗癫痫发作药物", "refs": [{"text": "Yu P, et al. Adv Ther. Published online December 22, 2025.", "title": "Efficacy and Safety of Adjunctive Cenobamate in Chinese Participants with Focal Seizure.", "abstract": "The treatment landscape for focal seizures in China is distinct from those in other regions, with oxcarbazepine and sodium valproate being more commonly used than newer antiseizure medications (ASMs). Cenobamate, a novel ASM, has demonstrated significant efficacy in reducing seizure frequency. Howev", "url": "https://pubmed.ncbi.nlm.nih.gov/41428177/", "type": "literature", "doi": "10.1007/s12325-025-03432-z", "abstract_full": "INTRODUCTION: The treatment landscape for focal seizures in China is distinct from those in other regions, with oxcarbazepine and sodium valproate being more commonly used than newer antiseizure medications (ASMs). Cenobamate, a novel ASM, has demonstrated significant efficacy in reducing seizure frequency. However, its efficacy and safety have not been assessed within the Chinese population. METHODS: The current study analyzed the 24-week double-blind period data of Chinese participants from a randomized, double-blind, placebo-controlled clinical trial (NCT04557085). Efficacy was assessed by determining seizure frequency reduction and responder rates across the cenobamate dose groups (100, 200, and 400 mg) and concomitant ASM groups. Safety was assessed by treatment-emergent adverse events (TEAEs) and treatment-related adverse events (TRAEs) during the double-blind treatment period. RESULTS: This post hoc analysis included 227 participants with a median age of 32 (interquartile range 24-40) years with focal seizures across 24 sites in China. Cenobamate demonstrated a greater median percentage reduction in seizure frequency (100 mg, 39.5%, 200 mg, 88.0%, 400 mg, 100.0%) compared to placebo (24.6%). The responder rate of ≥ 50% was higher in the cenobamate groups (100 mg, 35.4%, 200 mg, 76.0%, 400 mg, 89.4%) compared to the placebo group (22.0%). A greater seizure reduction and responder rates were observed when cenobamate was administered alongside sodium channel blockers (SCBs) and non-SCBs, demonstrating better efficacy compared to placebo. On the basis of the number of baseline ASMs, cenobamate demonstrated seizure reduction and higher responder rates across all ASM groups as compared with placebo. Cenobamate demonstrated an acceptable safety profile across all dosage groups, with most AEs being mild to moderate. Common TEAEs reported included dizziness and somnolence. CONCLUSION: Cenobamate demonstrated a very favorable efficacy and safety profile in Chinese participants with focal seizures. The combination of cenobamate with both SCB and non-SCB treatments was effective in reducing seizure frequency and improved responder rates compared to placebo.", "abstract_
