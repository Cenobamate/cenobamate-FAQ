 events included somnolence, dizziness, and behavioral changes.", "abstract_zh": "西诺氨酯是一种具有双重机制的抗癫痫药物，通过钠通道阻断和GABA-A受体调节发挥作用，在成人局灶性癫痫中已证实具有优越疗效，但在儿童人群和发育性癫痫性脑病（DEE）中研究尚不充分。本综述系统综合了27项研究中西诺氨酯在儿童癫痫和DEE中应用的现有证据。8项研究共纳入624例儿童患者（16个月-18岁），应答率50-84%，无发作率3-31%，留存率81-100%。低龄儿童（≤6岁）需要更高的基于体重的剂量（约5 mg/kg/day，而青少年约2.7 mg/kg/day）。常见不良反应包括嗜睡、头晕和行为改变。", "url": "https://pubmed.ncbi.nlm.nih.gov/41106086/", "type": "literature"}]}, {"section": "特殊人群使用", "question": "翼弗瑞®是否能用于孕妇及哺乳期妇女？", "answer": "妊娠期和哺乳期妇女使用翼弗瑞®的风险缺乏充分数据支持。 西诺氨酯片说明书.", "refs": []}, {"section": "特殊人群使用", "question": "在肝功能不全患者中如何使用翼弗瑞®？", "answer": "轻度至中度肝功能不全 (Child-Pugh分级A至B)：翼弗瑞®最大推荐剂量 200mg/d<br>重度肝功能不全 (Child-Pugh分级C)：不推荐使用翼弗瑞® 西诺氨酯片说明书.", "refs": []}, {"section": "特殊人群使用", "question": "在肾功能不全患者中如何使用翼弗瑞®？", "answer": "轻度、中度和重度肾功能不全(CLcr<90mL/min)：谨慎使用并考虑降低翼弗瑞®剂量<br>接受透析的终末期肾脏病患者：不推荐使用翼弗瑞® 西诺氨酯片说明书. CLcr，肌酐清除率", "refs": []}, {"section": "特殊人群使用", "question": "手术后仍控制不佳患者能否使用翼弗瑞®？", "answer": "30%手术后仍控制不佳的患者使用翼弗瑞®可实现≥12个月无发作：<br>在一项开放标签III期安全性研究 (C021)中，有85例经手术治疗仍控制不佳的患者。手术方式包括迷走神经刺激术/反应性神经刺激术，颞叶切除术，颞叶外切除术，肿瘤切除术等。添加翼弗瑞®后≥12个月无发作率达到30.6%。无发作率表现与未接受过手术患者无统计学差异（ 39.4%, p=0.207）。", "refs": [{"text": "Abou-Khalil B, et al. Epilepsy Res. 2022;184:106952.", "title": "Efficacy of cenobamate for uncontrolled focal seizures in patients with previous epilepsy-related surgery: Post hoc analysis of a phase 3, multicenter, open-label study.", "abstract": "This post hoc analysis of 10 US study sites from a long-term open-label phase 3 study of adjunctive cenobamate evaluated the efficacy of cenobamate in patients with prior epilepsy-related surgery. Patients with uncontrolled focal seizures despite taking stable doses of 1-3 concomitant antiseizure me", "url": "https://pubmed.ncbi.nlm.nih.gov/35671632/", "type": "literature", "doi": "10.1016/j.eplepsyres.2022.106952", "abstract_full": "OBJECTIVE: This post hoc analysis of 10 US study sites from a long-term open-label phase 3 study of adjunctive cenobamate evaluated the efficacy of cenobamate in patients with prior epilepsy-related surgery. METHODS: Patients with uncontrolled focal seizures despite taking stable doses of 1-3 concomitant antiseizure medications (ASMs) received increasing doses of cenobamate (12.5, 25, 50, 100, 150, 200 mg/day) at 2-week intervals over 12 weeks (target dose, 200 mg/day). Further increases up to 400 mg/day using biweekly 50-mg/day increments were allowed during the maintenance phase. Dose adjustments of cenobamate and concomitant ASMs were allowed. Data were assessed until the last clinic visit on or after September 1, 2019. RESULTS: Of the 240 eligible patients, 85 had prior epilepsy-related surgery and 155 were nonsurgical patients. Baseline focal seizure frequency per 28 days was numerically higher among prior surgery (mean=25.9/median=4.1/range=0.3-562.3) versus nonsurgical (mean=13.8/median=2.4/range=0.2-534.2) patients. Among all patients, 100 % seizure reduction ≥ 12 months at any consecutive month interval occurred in 30.6 % (26/85) prior surgery and 39.4 % (61/155; p > 0.05) nonsurgical patients (cenobamate treatment median duration=32.9 months). Among the 177 patients still receiving cenobamate at the data cutoff, 29.2 % (19/65) of prior surgery and 36.6 % (41/112; p > 0.05) of nonsurgical patients had 100 % seizure reduction ≥ 12 months at the data cutoff. Cenobamate was well tolerated. CONCLUSIONS: This post hoc analysis supports the efficacy of cenobamate in patients with refractory focal seizures despite prior surgery. These findings suggest cenobamate may be considered early in the treatment regimen, including, in some patients, before surgery is considered.", "abstract_zh": "目的：本事后分析来自一项长期开放标签III期辅助西诺氨酯研究的10个美国研究中心，评估了西诺氨酯在既往接受癫痫相关手术患者中的疗效。方法：在稳定剂量1-3种合并抗癫痫发作药物（ASM）下仍有未控制局灶性发作的患者，在12周内以2周间隔接受递增剂量的西诺氨酯（12.5、25、50、100、150、200 mg/天）（目标剂量200 mg/天）。维持期允许以每两周50 mg/天的增量进一步增加至400 mg/天。允许调整西诺氨酯和合并ASM的剂量。数据评估至2019年9月1日或之后的末次门诊访视。结果：在240例符合条件患者中，85例既往接受癫痫相关手术，155例为非手术患者。既往手术组基线每28天局灶性发作频率在数值上高于非手术组（均值=25.9/中位数=4.1/范围=0.3-562.3 vs 均值=13.8/中位数=2.4/范围=0.2-534.2）。在所有患者中，任意连续月份区间内100%发作减少≥12个月的发生率：既往手术组30.6%（26/85），非手术组39.4%（61/155；p > 0.05）（西诺氨酯治疗中位持续时间=32.9个月）。在数据截止时仍接受西诺氨酯的177例患者中，既往手术组29.2%（19/65）和非手术组36.6%（41/112；p > 0.05）在数据截止时达到100%发作减少≥12个月。西诺氨酯耐受性良好。结论：本事后分析支持西诺氨酯在既往手术后仍存在难治性局灶性发作患者中的疗效。这些发现提示，西诺氨酯可考虑在治疗方案早期使用，包括在某些患者中在考虑手术之前使用。", "title_full": "Efficacy of cenobamate for uncontrolled focal seizures in patients with previous epilepsy-related surgery: Post hoc analysis of a phase 3, multicenter, open-label study.", "pmid": "35671632"}]}, {"section": "真实世界使用", "question": "真实世界中cenobamate的总体疗效如何？", "answer": "多项大型真实世界研究证实了cenobamate在临床实践中的显著疗效：<br><br>1. FREEDON研究（Villanueva et al., Epilepsia 2026）：纳入西班牙多中心486例局灶性癫痫患者（既往使用2-6种ASM），12个月时治疗留存率达92%，中位剂量200 mg/天。既往使用2-3种ASM（早期治疗线）的患者1年无发作率为32.5%-33.3%，显著高于使用4-6种ASM（晚期治疗线）的患者（11.4%-24.2%）。<br><br>2. Loushy等（Epilepsia 2025）：纳入182例cenobamate治疗患者（170例局灶性癫痫），12个月留存率82.4%。在高基线发作频率患者中，局灶性意识受损发作（FIAS）≥50%发作减少率为47%，局灶性进展为双侧强直阵挛发作（FBTCS）为58%；低基线频率患者中分别为53%和68%。较低基线发作频率、较少既往失败药物和合并使用氯巴占与100%发作减少相关。<br><br>真实世界数据与注册临床试验结果一致，证实cenobamate在更广泛的患者人群中具有稳定的疗效，且在治疗早期使用效果更佳。", "refs": [{"text": "1. Villanueva V, et al. Epilepsia. 2026.", "title": "Freedon study: Real-life outcomes of cenobamate in different lines of treatment.", "abstract": "OBJECTIVES: Cenobamate is an antiseizure medication (ASM) with proven effectiveness in individuals with highly refractory epilepsy. This study investigated the effectiveness and tolerability of cenoba", "abstract_full": "OBJECTIVES: Cenobamate is an antiseizure medication (ASM) with proven effectiveness in individuals with highly refractory epilepsy. This study investigated the effectiveness and tolerability of cenobamate in different treatment lines and a less refractory setting. METHODS: This was a multicenter, retrospective, observational study. Adults with focal epilepsy, 2-6 prior ASMs, and >=12 months between cenobamate initiation and database closure were included. Data from patients' charts were collected and included in the Drug-Resistant Epilepsy Registry of the Spanish Epilepsy Society using Research Electronic Data Capture. Primary effectiveness endpoints included changes in seizure frequency at 3, 6, and 12 months after cenobamate initiation according to different treatment lines. Primary safety endpoints included the percentage of patients with adverse events (AEs). RESULTS: In total, 486 patients were included (mean age 42.8 years). The mean number of prior ASMs was 4.4 (2-6); the mean number of concomitant ASMs at cenobamate initiation was 2.5 (1-5). At 12 months, treatment retention was 92% and median dose was 200 mg. One-year seizure-freedom rates were 32.5%, 33.3%, 21.4%, 24.2%, and 11.4% in those treated with 2-6 prior ASMs, respectively. The proportions of patients achieving >=50%, >=75%, >=90%, and 100% reductions in seizure frequency at 12 months were significantly higher in patients with 2-3 (earlier treatment lines) vs 4-6 prior ASMs (later treatment lines; p <= .004). Improvements in seizure severity were reported in 71.9% of patients during follow-up (82.5% and 62.1% in those with 2 and 6 prior ASMs, respectively). At 12 months, 56.4% of patients had reported AEs, with somnolence the most frequent, and 4.9% had AEs requiring cenobamate discontinuation. SIGNIFICANCE: Cenobamate was effective and well tolerated in patients who had tried 2-6 prior ASMs in a real-world setting. High effectiveness was confirmed at 1 year, with better outcomes in earlier users.", "abstract_zh": "目的：Cenobamate是一种在高度难治性癫痫患者中已证实有效的抗癫痫发作药物（ASM）。本研究调查了cenobamate在不同治疗线及较低难治性环境中的有效性和耐受性。方法：这是一项多中心、回顾性、观察性研究。纳入既往使用2-6种ASM、局灶性癫痫成人患者，且cenobamate起始治疗与数据库关闭之间>=12个月。使用Research Electronic Data Capture从患者病历中收集数据，并纳入西班牙癫痫学会药物难治性癫痫登记。主要有效性终点包括cenobamate起始后3、6和12个月时根据不同治疗线的发作频率变化。主要安全性终点包括发生不良事件（AE）的患者百分比。结果：共纳入486例患者（平均年龄42.8岁）。既往ASM平均数量为4.4（2-6）；cenobamate起始时合并ASM平均数量为2.5（1-5）。12个月时，治疗留存率为92%，中位剂量为200 mg。既往使用2-6种ASM的患者一年无发作率分别为32.5%、33.3%、21.4%、24.2%和11.4%。12个月时达到>=50%、>=75%、>=90%和100%发作减少的患者比例在既往使用2-3种ASM（早期治疗线）的患者中显著高于使用4-6种ASM（晚期治疗线）的患者（p <= .004）。随访期间71.9%的患者报告发作严重程度改善（既往使用2种和6种ASM的患者分别为82.5%和62.1%）。12个月时，56.4%的患者报告了AE，最常见为嗜睡，4.9%的患者因AE需要停用cenobamate。意义：在真实世界环境中，cenobamate对既往使用过2-6种ASM的患者有效且耐受性良好。1年时确认了高度有效性，早期使用者的结局更好。", "url": "https://pubmed.ncbi.nlm.nih.gov/41603140/", "type": "pubmed", "doi": "10.1002/epi.70106"}, {"text": "2. Loushy I, et al. Epilepsia. 2025.", "title": "Real-world use of cenobamate in adults: Efficacy and predictors of treatment response.", "abstract": "OBJECTIVE: This study assesses the efficacy, safety, and tolerability of cenobamate using long-term real-world data, incorporating both seizure reduction and seizure-freedom periods, and examines base", "abstract_full": "OBJECTIVE: This study assesses the efficacy, safety, and tolerability of cenobamate using long-term real-world data, incorporating both seizure reduction and seizure-freedom periods, and examines baseline clinical variables to determine predictors of response. METHODS: We retrospectively analyzed all patients prescribed cenobamate from May 2020 to July 2021. The primary outcome was 12-month seizure frequency reduction for each seizure type, stratified by baseline seizure frequency (higher vs lower frequency: >=2 seizures vs <2 seizures in the preceding 3 months). Logistic regression identified seizure response predictors. We assessed longest seizure-free periods, considering seizure type and baseline frequency, further differentiating the higher-frequency group into weekly and monthly subgroups. We examined retention, safety, and tolerability. RESULTS: Of 182 patients taking cenobamate, 170 had focal epilepsy. Among those 170, the 12-month retention rate was 82.4%, decreasing to 75% at last follow-up. In patients with higher-frequency baseline seizures, >=50% seizure reduction rates were 47% (95% confidence interval [CI] = 38%-57%) for focal impaired awareness seizures (FIAS) and 58% (95% CI = 43%-71%) for focal to bilateral tonic-clonic seizures (FBTCS). In patients with lower-frequency seizures, rates were 53% for FIAS (95% CI = 31%-74%) and 68% (95% CI = 49%-82%) for FBTCS. Factors linked to 100% seizure reduction were lower baseline seizure frequency, fewer failed medications, and concomitant clobazam use. Most patients achieving seizure freedom did so at 200 mg/day, although higher doses also showed efficacy, particularly for FBTCS. Among patients with seizures affecting awareness, 7%-43% had >=12 months of freedom from such seizures. Among patients with FBTCS, 17%-56% had >=12 months of freedom from FBTCS. Patients with higher-frequency baseline seizures had lower rates of seizure freedom. Adverse effects were reported by 52%, with drowsiness being most common (32%). One patient developed depression necessitating hospitalization. SIGNIFICANCE: Cenobamate is an efficacious drug. Baseline clinical features of seizure type, lower frequency, fewer failed medications, and clobazam use are associated with treatment response and can inform decisions of trialing cenobamate before considering epilepsy surgery.", "abstract_zh": "目的：本研究利用长期真实世界数据评估cenobamate的疗效、安全性和耐受性，结合发作减少和无发作期，并检查基线临床变量以确定应答的预测因素。方法：我们回顾性分析了2020年5月至2021年7月所有处方cenobamate的患者。主要终点为每种发作类型的12个月发作频率减少，按基线发作频率分层（较高vs较低频率：前3个月>=2次发作vs <2次发作）。使用Logistic回归识别发作应答预测因素。我们评估了最长无发作期，考虑发作类型和基线频率，进一步将高频率组分为每周和每月亚组。我们检查了留存率、安全性和耐受性。结果：在182例服用cenobamate的患者中，170例为局灶性癫痫。在这170例中，12个月留存率为82.4%，末次随访时降至75%。在基线高频率发作的患者中，>=50%发作减少率对于局灶性意识受损发作（FIAS）为47%（95%置信区间[CI] = 38%-57%），对于局灶性进展为双侧强直阵挛发作（FBTCS）为58%（95% CI = 43%-71%）。在低频率发作患者中，FIAS为53%（95% CI = 31%-74%），FBTCS为68%（95% CI = 49%-82%）。与100%发作减少相关的因素为较低的基线发作频率、较少的既往失败药物和合并使用氯巴占。大多数达到无发作的患者在200 mg/天时实现，但较高剂量也显示疗效，特别是对于FBTCS。在有意识受损发作的患者中，7%-43%达到>=12个月无此类发作。在有FBTCS的患者中，17%-56%达到>=12个月无FBTCS。基线高频率发作患者的无发作率较低。52%的患者报告了不良反应，最常见为嗜睡（32%）。1例患者出现需要住院的抑郁症。意义：Cenobamate是一种有效的药物。发作类型、较低频率、较少失败药物和氯巴占使用等基线临床特征与治疗应答相关，可为在考虑癫痫手术前试用cenobamate的决策提供信息。", "url": "https://pubmed.ncbi.nlm.nih.gov/39932255/", "type": "pubmed", "doi": "10.1111/epi.18297"}]}, {"section": "真实世界使用", "question": "真实世界中cenobamate的留存率如何？", "answer": "留存率是衡量药物长期疗效和耐受性的综合指标。真实世界数据显示cenobamate具有较高的长期留存率：<br><br>1. FREEDON研究（Villanueva et al., Epilepsia 2026）：纳入486例患者，12个月时治疗留存率高达92%，仅4.9%因不良反应停药，反映了良好的长期耐受性。<br><br>2. Loushy等（Epilepsia 2025）：纳入170例局灶性癫痫患者，12个月留存率为82.4%，末次随访时降至75%。52%患者报告不良反应，最常见为嗜睡（32%）。<br><br>两项研究均显示cenobamate具有较高的留存率，停药主要原因为不良反应。与其他新型ASM相比，cenobamate的留存率处于较高水平，反映了其良好的长期耐受性和持续疗效。", "refs": [{"text": "1. Villanueva V, et al. Epilepsia. 2026.", "title": "Freedon study: Real-life outcomes of cenobamate in different lines of treatment.", "abstract": "OBJECTIVES: Cenobamate is an antiseizure medication (ASM) with proven effectiveness in individuals with highly refractory epilepsy. This study investigated the effectiveness and tolerability of cenoba", "abstract_full": "OBJECTIVES: Cenobamate is an antiseizure medication (ASM) with proven effectiveness in individuals with highly refractory epilepsy. This study investigated the effectiveness and tolerability of cenobamate in different treatment lines and a less refractory setting. METHODS: This was a multicenter, retrospective, observational study. Adults with focal epilepsy, 2-6 prior ASMs, and >=12 months between cenobamate initiation and database closure were included. Data from patients' charts were collected and included in the Drug-Resistant Epilepsy Registry of the Spanish Epilepsy Society using Research Electronic Data Capture. Primary effectiveness endpoints included changes in seizure frequency at 3, 6, and 12 months after cenobamate initiation according to different treatment lines. Primary safety endpoints included the percentage of patients with adverse events (AEs). RESULTS: In total, 486 patients were included (mean age 42.8 years). The mean number of prior ASMs was 4.4 (2-6); the mean number of concomitant ASMs at cenobamate initiation was 2.5 (1-5). At 12 months, treatment retention was 92% and median dose was 200 mg. One-year seizure-freedom rates were 32.5%, 33.3%, 21.4%, 24.2%, and 11.4% in those treated with 2-6 prior ASMs, respectively. The proportions of patients achieving >=50%, >=75%, >=90%, and 100% reductions in seizure frequency at 12 months were significantly higher in patients with 2-3 (earlier treatment lines) vs 4-6 prior ASMs (later treatment lines; p <= .004). Improvements in seizure severity were reported in 71.9% of patients during follow-up (82.5% and 62.1% in those with 2 and 6 prior ASMs, respectively). At 12 months, 56.4% of patients had reported AEs, with somnolence the most frequent, and 4.9% had AEs requiring cenobamate discontinuation. SIGNIFICANCE: Cenobamate was effective and well tolerated in patients who had tried 2-6 prior ASMs in a real-world setting. High effectiveness was confirmed at 1 year, with better outcomes in earlier users.", "abstract_zh": "目的：Cenobamate是一种在高度难治性癫痫患者中已证实有效的抗癫痫发作药物（ASM）。本研究调查了cenobamate在不同治疗线及较低难治性环境中的有效性和耐受性。方法：这是一项多中心、回顾性、观察性研究。纳入既往使用2-6种ASM、局灶性癫痫成人患者，且cenobamate起始治疗与数据库关闭之间>=12个月。使用Research Electronic Data Capture从患者病历中收集数据，并纳入西班牙癫痫学会药物难治性癫痫登记。主要有效性终点包括cenobamate起始后3、6和12个月时根据不同治疗线的发作频率变化。主要安全性终点包括发生不良事件（AE）的患者百分比。结果：共纳入486例患者（平均年龄42.8岁）。既往ASM平均数量为4.4（2-6）；cenobamate起始时合并ASM平均数量为2.5（1-5）。12个月时，治疗留存率为92%，中位剂量为200 mg。既往使用2-6种ASM的患者一年无发作率分别为32.5%、33.3%、21.4%、24.2%和11.4%。12个月时达到>=50%、>=75%、>=90%和100%发作减少的患者比例在既往使用2-3种ASM（早期治疗线）的患者中显著高于使用4-6种ASM（晚期治疗线）的患者（p <= .004）。随访期间71.9%的患者报告发作严重程度改善（既往使用2种和6种ASM的患者分别为82.5%和62.1%）。12个月时，56.4%的患者报告了AE，最常见为嗜睡，4.9%的患者因AE需要停用cenobamate。意义：在真实世界环境中，cenobamate对既往使用过2-6种ASM的患者有效且耐受性良好。1年时确认了高度有效性，早期使用者的结局更好。", "url": "https://pubmed.ncbi.nlm.nih.gov/41603140/", "type": "pubmed", "doi": "10.1002/epi.70106"}, {"text": "2. Loushy I, et al. Epilepsia. 2025.", "title": "Real-world use of cenobamate in adults: Efficacy and predictors of treatment response.", "abstract": "OBJECTIVE: This study assesses the efficacy, safety, and tolerability of cenobamate using long-term real-world data, incorporating both seizure reduction and seizure-freedom periods, and examines base", "abstract_full": "OBJECTIVE: This study assesses the efficacy, safety, and tolerability of cenobamate using long-term real-world data, incorporating both seizure reduction and seizure-freedom periods, and examines baseline clinical variables to determine predictors of response. METHODS: We retrospectively analyzed all patients prescribed cenobamate from May 2020 to July 2021. The primary outcome was 12-month seizure frequency reduction for each seizure type, stratified by baseline seizure frequency (higher vs lower frequency: >=2 seizures vs <2 seizures in the preceding 3 months). Logistic regression identified seizure response predictors. We assessed longest seizure-free periods, considering seizure type and baseline frequency, further differentiating the higher-frequency group into weekly and monthly subgroups. We examined retention, safety, and tolerability. RESULTS: Of 182 patients taking cenobamate, 170 had focal epilepsy. Among those 170, the 12-month retention rate was 82.4%, decreasing to 75% at last follow-up. In patients with higher-frequency baseline seizures, >=50% seizure reduction rates were 47% (95% confidence interval [CI] = 38%-57%) for focal impaired awareness seizures (FIAS) and 58% (95% CI = 43%-71%) for focal to bilateral tonic-clonic seizures (FBTCS). In patients with lower-frequency seizures, rates were 53% for FIAS (95% CI = 31%-74%) and 68% (95% CI = 49%-82%) for FBTCS. Factors linked to 100% seizure reduction were lower baseline seizure frequency, fewer failed medications, and concomitant clobazam use. Most patients achieving seizure freedom did so at 200 mg/day, although higher doses also showed efficacy, particularly for FBTCS. Among patients with seizures affecting awareness, 7%-43% had >=12 months of freedom from such seizures. Among patients with FBTCS, 17%-56% had >=12 months of freedom from FBTCS. Patients with higher-frequency baseline seizures had lower rates of seizure freedom. Adverse effects were reported by 52%, with drowsiness being most common (32%). One patient developed depression necessitating hospitalization. SIGNIFICANCE: Cenobamate is an efficacious drug. Baseline clinical features of seizure type, lower frequency, fewer failed medications, and clobazam use are associated with treatment response and can inform decisions of trialing cenobamate before considering epilepsy surgery.", "abstract_zh": "目的：本研究利用长期真实世界数据评估cenobamate的疗效、安全性和耐受性，结合发作减少和无发作期，并检查基线临床变量以确定应答的预测因素。方法：我们回顾性分析了2020年5月至2021年7月所有处方cenobamate的患者。主要终点为每种发作类型的12个月发作频率减少，按基线发作频率分层（较高vs较低频率：前3个月>=2次发作vs <2次发作）。使用Logistic回归识别发作应答预测因素。我们评估了最长无发作期，考虑发作类型和基线频率，进一步将高频率组分为每周和每月亚组。我们检查了留存率、安全性和耐受性。结果：在182例服用cenobamate的患者中，170例为局灶性癫痫。在这170例中，12个月留存率为82.4%，末次随访时降至75%。在基线高频率发作的患者中，>=50%发作减少率对于局灶性意识受损发作（FIAS）为47%（95%置信区间[CI] = 38%-57%），对于局灶性进展为双侧强直阵挛发作（FBTCS）为58%（95% CI = 43%-71%）。在低频率发作患者中，FIAS为53%（95% CI = 31%-74%），FBTCS为68%（95% CI = 49%-82%）。与100%发作减少相关的因素为较低的基线发作频率、较少的既往失败药物和合并使用氯巴占。大多数达到无发作的患者在200 mg/天时实现，但较高剂量也显示疗效，特别是对于FBTCS。在有意识受损发作的患者中，7%-43%达到>=12个月无此类发作。在有FBTCS的患者中，17%-56%达到>=12个月无FBTCS。基线高频率发作患者的无发作率较低。52%的患者报告了不良反应，最常见为嗜睡（32%）。1例患者出现需要住院的抑郁症。意义：Cenobamate是一种有效的药物。发作类型、较低频率、较少失败药物和氯巴占使用等基线临床特征与治疗应答相关，可为在考虑癫痫手术前试用cenobamate的决策提供信息。", "url": "https://pubmed.ncbi.nlm.nih.gov/39932255/", "type": "pubmed", "doi": "10.1111/epi.18297"}]}, {"section": "真实世界使用", "question": "真实世界中cenobamate对多药耐药患者的疗效如何？", "answer": "cenobamate的真实世界研究纳入了大量既往多种ASM治疗失败的难治性癫痫患者：<br><br>FREEDON研究（Villanueva et al., Epilepsia 2026）纳入既往使用2-6种ASM的患者，平均既往ASM数量为4.4种。1年无发作率随既往ASM数量增加而递减：既往2种ASM者为32.5%，3种为33.3%，4种为21.4%，5种为24.2%，6种为11.4%。既往使用2-3种ASM（早期治疗线）的患者在≥50%、≥75%、≥90%和100%发作减少方面均显著优于使用4-6种ASM（晚期治疗线）的患者（p ≤ 0.004）。随访期间71.9%的患者报告发作严重程度改善。<br><br>这一数据尤为重要，因为传统观点认为既往失败ASM越多，新药有效率越低。cenobamate在高度难治性患者中仍显示出疗效，提示其独特的双重作用机制（钠通道+GABA）可能克服了部分耐药机制。同时也提示在治疗早期使用cenobamate可能获得更好的结局。", "refs": [{"text": "1. Villanueva V, et al. Epilepsia. 2026.", "title": "Freedon study: Real-life outcomes of cenobamate in different lines of treatment.", "abstract": "OBJECTIVES: Cenobamate is an antiseizure medication (ASM) with proven effectiveness in individuals with highly refractory epilepsy. This study investigated the effectiveness and tolerability of cenoba", "abstract_full": "OBJECTIVES: Cenobamate is an antiseizure medication (ASM) with proven effectiveness in individuals with highly refractory epilepsy. This study investigated the effectiveness and tolerability of cenobamate in different treatment lines and a less refractory setting. METHODS: This was a multicenter, retrospective, observational study. Adults with focal epilepsy, 2-6 prior ASMs, and >=12 months between cenobamate initiation and database closure were included. Data from patients' charts were collected and included in the Drug-Resistant Epilepsy Registry of the Spanish Epilepsy Society using Research Electronic Data Capture. Primary effectiveness endpoints included changes in seizure frequency at 3, 6, and 12 months after cenobamate initiation according to different treatment lines. Primary safety endpoints included the percentage of patients with adverse events (AEs). RESULTS: In total, 486 patients were included (mean age 42.8 years). The mean number of prior ASMs was 4.4 (2-6); the mean number of concomitant ASMs at cenobamate initiation was 2.5 (1-5). At 12 months, treatment retention was 92% and median dose was 200 mg. One-year seizure-freedom rates were 32.5%, 33.3%, 21.4%, 24.2%, and 11.4% in those treated with 2-6 prior ASMs, respectively. The proportions of patients achieving >=50%, >=75%, >=90%, and 100% reductions in seizure frequency at 12 months were significantly higher in patients with 2-3 (earlier treatment lines) vs 4-6 prior ASMs (later treatment lines; p <= .004). Improvements in seizure severity were reported in 71.9% of patients during follow-up (82.5% and 62.1% in those with 2 and 6 prior ASMs, respectively). At 12 months, 56.4% of patients had reported AEs, with somnolence the most frequent, and 4.9% had AEs requiring cenobamate discontinuation. SIGNIFICANCE: Cenobamate was effective and well tolerated in patients who had tried 2-6 prior ASMs in a real-world setting. High effectiveness was confirmed at 1 year, with better outcomes in earlier users.", "abstract_zh": "目的：Cenobamate是一种在高度难治性癫痫患者中已证实有效的抗癫痫发作药物（ASM）。本研究调查了cenobamate在不同治疗线及较低难治性环境中的有效性和耐受性。方法：这是一项多中心、回顾性、观察性研究。纳入既往使用2-6种ASM、局灶性癫痫成人患者，且cenobamate起始治疗与数据库关闭之间>=12个月。使用Research Electronic Data Capture从患者病历中收集数据，并纳入西班牙癫痫学会药物难治性癫痫登记。主要有效性终点包括cenobamate起始后3、6和12个月时根据不同治疗线的发作频率变化。主要安全性终点包括发生不良事件（AE）的患者百分比。结果：共纳入486例患者（平均年龄42.8岁）。既往ASM平均数量为4.4（2-6）；cenobamate起始时合并ASM平均数量为2.5（1-5）。12个月时，治疗留存率为92%，中位剂量为200 mg。既往使用2-6种ASM的患者一年无发作率分别为32.5%、33.3%、21.4%、24.2%和11.4%。12个月时达到>=50%、>=75%、>=90%和100%发作减少的患者比例在既往使用2-3种ASM（早期治疗线）的患者中显著高于使用4-6种ASM（晚期治疗线）的患者（p <= .004）。随访期间71.9%的患者报告发作严重程度改善（既往使用2种和6种ASM的患者分别为82.5%和62.1%）。12个月时，56.4%的患者报告了AE，最常见为嗜睡，4.9%的患者因AE需要停用cenobamate。意义：在真实世界环境中，cenobamate对既往使用过2-6种ASM的患者有效且耐受性良好。1年时确认了高度有效性，早期使用者的结局更好。", "url": "https://pubmed.ncbi.nlm.nih.gov/41603140/", "type": "pubmed", "doi": "10.1002/epi.70106"}]}, {"section": "真实世界使用", "question": "真实世界中cenobamate的安全性如何？", "answer": "真实世界安全性数据与注册临床试验基本一致：<br><br>Brigo等（Cochrane Database Syst Rev 2024）对两项RCT（659例参与者）的系统综述显示，辅助cenobamate与安慰剂相比，不良事件发生风险比为1.14（77% vs 67%，95% CI 1.02-1.27），即cenobamate使用可能与不良事件风险轻度增加相关（中等质量证据）。<br><br>FREEDON研究（Villanueva et al., Epilepsia 2026）真实世界数据显示，12个月时56.4%的患者报告了不良事件，最常见为嗜睡，仅4.9%因不良事件需要停用cenobamate。<br><br>Loushy等（Epilepsia 2025）报道52%患者出现不良反应，最常见为嗜睡（32%），1例患者出现需要住院的抑郁症。<br><br>需关注的特殊安全性问题：<br>- DRESS综合征：通过缓慢滴定方案（每2周加量）可显著降低风险<br>- QTc缩短：临床意义尚不明确，建议有心脏病史患者监测心电图<br>- 肝功能：建议定期监测，尤其联用肝酶诱导剂时<br><br>大多数不良反应为轻至中度，可通过减量或调整联用ASM剂量改善。", "refs": [{"text": "1. Brigo F, et al. Cochrane Database Syst Rev. 2024.", "title": "Cenobamate add-on therapy for drug-resistant focal epilepsy.", "abstract": "BACKGROUND: Although most people with epilepsy achieve complete seizure cessation, approximately one-third of those with the condition continue experiencing seizures despite the use of antiseizure med", "abstract_full": "BACKGROUND: Although most people with epilepsy achieve complete seizure cessation, approximately one-third of those with the condition continue experiencing seizures despite the use of antiseizure medications (ASMs) given as monotherapy or polytherapy. In this review, we summarised the evidence from randomised controlled trials (RCTs) about cenobamate as an add-on treatment for focal epilepsy uncontrolled by one or more concomitant ASMs. OBJECTIVES: To assess the efficacy and tolerability of add-on oral cenobamate for the treatment of drug-resistant focal-onset seizures, defined as seizures persisting despite treatment with one or more ASMs. SEARCH METHODS: We searched the Cochrane Register of Studies (CRS Web) and MEDLINE Ovid (September 2022). In addition, we contacted the manufacturer of cenobamate and experts in the field to enquire after any ongoing or unpublished studies. SELECTION CRITERIA: RCTs comparing add-on cenobamate to placebo or another ASM in people with focal epilepsy uncontrolled by one or more concomitant ASMs. DATA COLLECTION AND ANALYSIS: Two review authors independently selected trials for inclusion, extracted data, performed risk of bias assessment, and assessed the certainty of the evidence using the GRADE approach. Our primary outcomes were at least a 50% reduction in total seizure frequency, seizure freedom, and the occurrence of adverse events. We used an intention-to-treat approach for our primary analyses. For each outcome we estimated summary risk ratios (RRs) with their 95% confidence intervals (CIs). We summarised the estimates of effects and certainty of the evidence for each outcome in a summary of findings table. MAIN RESULTS: We included two studies (659 adult participants, 442 allocated to cenobamate and 217 to placebo). The overall RR for at least a 50% reduction in seizure frequency for add-on cenobamate at any dose compared to placebo was 2.17 (52% versus 24%, 95% CI 1.66 to 2.84; 2 studies, 605 participants; moderate-certainty evidence). The RR for seizure freedom for add-on cenobamate at any dose compared to placebo was 4.45 (16% versus 5%, 95% CI 2.25 to 8.78; 2 studies, 605 participants; moderate-certainty evidence). The RR for the occurrence of adverse events for add-on cenobamate at any dose compared to placebo was 1.14 (77% versus 67%, 95% CI 1.02 to 1.27; 2 studies, 659 participants; moderate-certainty evidence). We judged the two included RCTs as at low or unclear risk of bias. Both studies were sponsored by the drug company that produces cenobamate. AUTHORS' CONCLUSIONS: Add-on cenobamate is probably better than placebo in reducing the frequency of seizures by at least 50% and in achieving seizure freedom in adults with focal epilepsy uncontrolled by one or more concomitant ASMs (moderate level of certainty). Its use is probably associated with an increased risk of adverse events (moderate level of certainty). Further prospective, controlled trials are required to evaluate the efficacy and tolerability of add-on cenobamate compared to other ASMs. The efficacy and tolerability of cenobamate as adjunctive treatment for focal epilepsy in children should be further investigated. Finally, the long-term efficacy and tolerability of add-on cenobamate treatment in people with other epilepsy types (e.g. generalised epilepsy) or specific epilepsy syndromes, as well as its use as monotherapy, require additional study.", "abstract_zh": "背景：虽然大多数癫痫患者能实现完全停止发作，但约三分之一的患者尽管使用了单药或多药抗癫痫发作药物（ASM）仍继续发作。在本综述中，我们总结了来自随机对照试验（RCT）的关于cenobamate作为辅助治疗用于一种或多种合并ASM未控制的局灶性癫痫的证据。目的：评估辅助口服cenobamate治疗药物难治性局灶性发作的疗效和耐受性，药物难治性定义为尽管使用一种或多种ASM治疗仍持续发作。检索方法：我们检索了Cochrane研究注册库（CRS Web）和MEDLINE Ovid（2022年9月）。此外，我们联系了cenobamate的生产商和该领域专家，询问任何正在进行或未发表的研究。纳入标准：在一种或多种合并ASM未控制的局灶性癫痫患者中比较辅助cenobamate与安慰剂或其他ASM的RCT。数据收集与分析：两名综述作者独立选择纳入试验、提取数据、进行偏倚风险评估，并使用GRADE方法评估证据质量。我们的主要终点为总发作频率至少减少50%、无发作和不良事件发生。我们在主要分析中采用意向性治疗方法。对于每个终点，我们估计了汇总风险比（RR）及其95%置信区间（CI）。我们在结果摘要表中总结了每个终点的效应估计和证据质量。主要结果：我们纳入了两项研究（659名成人参与者，442名分配至cenobamate，217名分配至安慰剂）。辅助cenobamate（任何剂量）与安慰剂相比，发作频率至少减少50%的总体RR为2.17（52% vs 24%，95% CI 1.66至2.84；2项研究，605名参与者；中等质量证据）。辅助cenobamate（任何剂量）与安慰剂相比，无发作的RR为4.45（16% vs 5%，95% CI 2.25至8.78；2项研究，605名参与者；中等质量证据）。辅助cenobamate（任何剂量）与安慰剂相比，不良事件发生的RR为1.14（77% vs 67%，95% CI 1.02至1.27；2项研究，659名参与者；中等质量证据）。我们判定两项纳入的RCT偏倚风险为低或不明确。两项研究均由生产cenobamate的制药公司赞助。作者结论：辅助cenobamate在减少发作频率至少50%和实现无发作方面可能优于安慰剂，用于一种或多种合并ASM未控制的成人局灶性癫痫（中等质量证据）。其使用可能与不良事件风险增加相关（中等质量证据）。需要进一步的前瞻性对照试验来评估辅助cenobamate与其他ASM相比的疗效和耐受性。cenobamate作为儿童局灶性癫痫辅助治疗的疗效和耐受性需要进一步研究。最后，辅助cenobamate治疗在其他癫痫类型（如全面性癫痫）或特定癫痫综合征患者中的长期疗效和耐受性，以及其作为单药治疗的使用，需要额外研究。", "url": "https://pubmed.ncbi.nlm.nih.gov/39087564/", "type": "pubmed", "doi": "10.1002/14651858.CD014941.pub2"}, {"text": "2. Villanueva V, et al. Epilepsia. 2026.", "title": "Freedon study: Real-life outcomes of cenobamate in different lines of treatment.", "abstract": "OBJECTIVES: Cenobamate is an antiseizure medication (ASM) with proven effectiveness in individuals with highly refractory epilepsy. This study investigated the effectiveness and tolerability of cenoba", "abstract_full": "OBJECTIVES: Cenobamate is an antiseizure medication (ASM) with proven effectiveness in individuals with highly refractory epilepsy. This study investigated the effectiveness and tolerability of cenobamate in different treatment lines and a less refractory setting. METHODS: This was a multicenter, retrospective, observational study. Adults with focal epilepsy, 2-6 prior ASMs, and >=12 months between cenobamate initiation and database closure were included. Data from patients' charts were collected and included in the Drug-Resistant Epilepsy Registry of the Spanish Epilepsy Society using Research Electronic Data Capture. Primary effectiveness endpoints included changes in seizure frequency at 3, 6, and 12 months after cenobamate initiation according to different treatment lines. Primary safety endpoints included the percentage of patients with adverse events (AEs). RESULTS: In total, 486 patients were included (mean age 42.8 years). The mean number of prior ASMs was 4.4 (2-6); the mean number of concomitant ASMs at cenobamate initiation was 2.5 (1-5). At 12 months, treatment retention was 92% and median dose was 200 mg. One-year seizure-freedom rates were 32.5%, 33.3%, 21.4%, 24.2%, and 11.4% in those treated with 2-6 prior ASMs, respectively. The proportions of patients achieving >=50%, >=75%, >=90%, and 100% reductions in seizure frequency at 12 months were significantly higher in patients with 2-3 (earlier treatment lines) vs 4-6 prior ASMs (later treatment lines; p <= .004). Improvements in seizure severity were reported in 71.9% of patients during follow-up (82.5% and 62.1% in those with 2 and 6 prior ASMs, respectively). At 12 months, 56.4% of patients had reported AEs, with somnolence the most frequent, and 4.9% had AEs requiring cenobamate discontinuation. SIGNIFICANCE: Cenobamate was effective and well tolerated in patients who had tried 2-6 prior ASMs in a real-world setting. High effectiveness was confirmed at 1 year, with better outcomes in earlier users.", "abstract_zh": "目的：Cenobamate是一种在高度难治性癫痫患者中已证实有效的抗癫痫发作药物（ASM）。本研究调查了cenobamate在不同治疗线及较低难治性环境中的有效性和耐受性。方法：这是一项多中心、回顾性、观察性研究。纳入既往使用2-6种ASM、局灶性癫痫成人患者，且cenobamate起始治疗与数据库关闭之间>=12个月。使用Research Electronic Data Capture从患者病历中收集数据，并纳入西班牙癫痫学会药物难治性癫痫登记。主要有效性终点包括cenobamate起始后3、6和12个月时根据不同治疗线的发作频率变化。主要安全性终点包括发生不良事件（AE）的患者百分比。结果：共纳入486例患者（平均年龄42.8岁）。既往ASM平均数量为4.4（2-6）；cenobamate起始时合并ASM平均数量为2.5（1-5）。12个月时，治疗留存率为92%，中位剂量为200 mg。既往使用2-6种ASM的患者一年无发作率分别为32.5%、33.3%、21.4%、24.2%和11.4%。12个月时达到>=50%、>=75%、>=90%和100%发作减少的患者比例在既往使用2-3种ASM（早期治疗线）的患者中显著高于使用4-6种ASM（晚期治疗线）的患者（p <= .004）。随访期间71.9%的患者报告发作严重程度改善（既往使用2种和6种ASM的患者分别为82.5%和62.1%）。12个月时，56.4%的患者报告了AE，最常见为嗜睡，4.9%的患者因AE需要停用cenobamate。意义：在真实世界环境中，cenobamate对既往使用过2-6种ASM的患者有效且耐受性良好。1年时确认了高度有效性，早期使用者的结局更好。", "url": "https://pubmed.ncbi.nlm.nih.gov/41603140/", "type": "pubmed", "doi": "10.1002/epi.70106"}]}, {"section": "真实世界使用", "question": "真实世界中cenobamate与其他ASM联用时有哪些注意事项？", "answer": "真实世界研究中，cenobamate通常作为添加治疗与其他ASM联用，以下是关键的药物相互作用注意事项：<br><br>Pietrafusa等（Front Pharmacol 2023）在两个意大利癫痫中心的真实世界研究中分析了cenobamate的药物相互作用：<br><br>需要减量的联用药物：<br>- 苯妥英：cenobamate可使苯妥英血药浓度升高，建议减量并监测<br>- 氯巴占：cenobamate可升高其活性代谢物N-去甲基氯巴占血浆浓度（r = 0.74, p < 0.0001），可能增加镇静作用<br>- 卡马西平：cenobamate剂量与卡马西平血药浓度C/D比呈负相关（r = -0.31, p = 0.02），提示cenobamate可降低卡马西平血药浓度<br><br>药代动力学特征：<br>- cenobamate剂量与血浆浓度呈显著线性相关（r = 0.86, p < 0.0001）<br>- 服用肝酶诱导剂的患者cenobamate血浆浓度/剂量比（C/D比）显著低于未服用者（0.10 vs 0.13 (μg/mL)/(mg/day)，p = 0.04），提示诱导剂可降低cenobamate血药浓度<br><br>O'Dwyer等（Drugs Aging 2024）的老年亚组分析也显示，老年患者在开始cenobamate时可能需要进一步减少合并ASM剂量，以避免嗜睡、头晕和跌倒等不良反应。<br><br>上述研究证实cenobamate既是药物相互作用的「受害者」也是「施加者」，联用时需密切监测血药浓度并调整剂量。", "refs": [{"text": "1. Pietrafusa N, et al. Front Pharmacol. 2023.", "title": "Cenobamate as add-on therapy for drug resistant epilepsies: effectiveness, drug to drug interactions and neuropsychological impact. What have we learned from real word evidence?", "abstract": "Background: Cenobamate (CNB) is an anti-seizure medication (ASM) approved in 2021 in Europe for adjunctive treatment of focal-onset seizures in adults who were not adequately controlled with at least ", "abstract_full": "Background: Cenobamate (CNB) is an anti-seizure medication (ASM) approved in 2021 in Europe for adjunctive treatment of focal-onset seizures in adults who were not adequately controlled with at least two previous ASMs. Methods: seizure outcome, treatment-emergent adverse events, neuropsychological profile, and blood levels of CNB and concomitant ASM were analyzed in a real world setting in two different Italian epilepsy centers in the context of CNB early access program. All patients performed a general cognitive evaluation, while 32 patients underwent the administration of a battery of neuropsychological tests at baseline and 6 months after CNB treatment. We performed CNB quantification in plasma in 31 patients at different doses in the range of 100-400 mg/day (65 measures). Results: we enrolled 54 patients with a median age of 27.9 years. The mean follow-up was 10.7 months. Most (91%) completed the efficacy analysis. At last follow-up visit, a 69.5% median seizure reduction was registered. Thirty-two patients (59.2%) had a >=50% reduction of seizures that was >=75% in 20 (42.0%) cases, whilst 10 (20.2%) patients were seizure-free. The most common adverse events were somnolence (53.1%), dizziness (28.1%) and diplopia (12.5%). The correlation between CNB dose and plasma concentration, revealed a significant linear correlation (r = 0.86, p < 0.0001), and there was a significant difference in mean plasma concentration/dose administered ratio (C/D ratio) between patients taking or not at least one inducer (0.10 +/- 0.04 [(ug/mL)/(mg/day)]; n = 47 vs. 0.13 +/- 0.05 [(ug/mL)/(mg/day)]; n = 18, p = 0.04). CNB dose was inversely correlated (r = -0.31, p = 0.02) to the C/D ratio of Carbamazepine blood levels. and positively correlated (r = 0.74, p < 0.0001) with an increased plasma concentration of the active Clobazam metabolite N-desmethylclobazam. General Anxiety Disorder-7 showed a significant improvement of score from baseline evaluation of 6.82 to follow-up 6 months evaluation of 4.53 (p = 0.03). Conclusion: In this real-world study, we registered a clinically meaningful reduction in seizure frequency after CNB administration in most patients along with a good tolerability profile. CNB treatment is correlate to a reduction in symptom severity of anxiety score. Plasma levels measurements confirm that CNB acts both as \"victim\" and as \"perpetrator\" of drug-drug interactions.", "abstract_zh": "背景：Cenobamate（CNB）是一种抗癫痫发作药物（ASM），于2021年在欧洲获批用于既往至少两种ASM控制不充分的成人局灶性发作的辅助治疗。方法：在CNB早期准入项目背景下，在两个不同的意大利癫痫中心的真实世界环境中分析了发作结局、治疗中出现的不良事件、神经心理特征以及CNB和合并ASM的血药浓度。所有患者进行了总体认知评估，32例患者在基线和CNB治疗6个月后接受了神经心理测试量表评估。我们在31例患者中进行了不同剂量范围100-400 mg/天的CNB血浆定量（65次测量）。结果：我们纳入了54例患者，中位年龄27.9岁。平均随访时间为10.7个月。大多数（91%）完成了疗效分析。在末次随访时，记录到中位69.5%的发作减少。32例患者（59.2%）发作减少>=50%，其中20例（42.0%）减少>=75%，10例（20.2%）无发作。最常见的不良事件为嗜睡（53.1%）、头晕（28.1%）和复视（12.5%）。CNB剂量与血浆浓度之间的相关性显示显著的线性相关（r = 0.86，p < 0.0001），服用和未服用至少一种诱导剂的患者之间平均血浆浓度/给药剂量比（C/D比）存在显著差异（0.10 +/- 0.04 [(ug/mL)/(mg/day)]；n = 47 vs 0.13 +/- 0.05 [(ug/mL)/(mg/day)]；n = 18，p = 0.04）。CNB剂量与卡马西平血药浓度的C/D比呈负相关（r = -0.31，p = 0.02），与氯巴占活性代谢物N-去甲基氯巴占的血浆浓度升高呈正相关（r = 0.74，p < 0.0001）。广泛性焦虑障碍量表-7（GAD-7）显示评分从基线的6.82显著改善至6个月随访时的4.53（p = 0.03）。结论：在这项真实世界研究中，我们记录到大多数患者在CNB给药后发作频率有临床意义的减少，同时具有良好的耐受性。CNB治疗与焦虑症状严重程度评分的降低相关。血药浓度测量证实CNB既是药物相互作用的「受害者」也是「施加者」。", "url": "https://pubmed.ncbi.nlm.nih.gov/38186643/", "type": "pubmed", "doi": "10.3389/fphar.2023.1239152"}, {"text": "2. O'Dwyer R, et al. Drugs Aging. 2024.", "title": "Safety and Efficacy of Cenobamate for the Treatment of Focal Seizures in Older Patients: Post Hoc Analysis of a Phase III, Multicenter, Open-Label Study.", "abstract": "BACKGROUND: Cenobamate is an antiseizure medication (ASM) approved in the US and Europe for the treatment of uncontrolled focal seizures. OBJECTIVE: This post hoc analysis of a phase III, open-label s", "abstract_full": "BACKGROUND: Cenobamate is an antiseizure medication (ASM) approved in the US and Europe for the treatment of uncontrolled focal seizures. OBJECTIVE: This post hoc analysis of a phase III, open-label safety study assessed the safety and efficacy of adjunctive cenobamate in older adults versus the overall study population. METHODS: Adults aged 18-70 years with uncontrolled focal seizures taking stable doses of one to three ASMs were enrolled in the phase III, open-label safety study; adults aged 65-70 years from that study were included in our safety analysis. Discontinuations due to adverse events and treatment-emergent adverse events (TEAEs) were assessed throughout the study in all patients who received one or more doses of cenobamate (safety study population). Efficacy was assessed post hoc in patients who had adequate seizure data available (post hoc efficacy population); we assessed patients aged 65-70 years from that population. Overall, 100% responder rates were assessed in the post hoc efficacy maintenance-phase population in 3-month intervals. Concomitant ASM drug load changes were also measured. For each ASM, drug load was defined as the ratio of actual drug dose/day to the World Health Organization defined daily dose (DDD). RESULTS: Of 1340 patients (mean age 39.7 years) in the safety study population, 42 were >=65 years of age (mean age 67.0 years, 52.4% female). Median duration of exposure was 36.1 and 36.9 months for overall patients and older patients, respectively, and mean epilepsy duration was 22.9 and 38.5 years, respectively. At 1, 2, and 3 years, 80%, 72%, and 68% of patients overall, and 76%, 71%, and 69% of older patients, respectively, remained on cenobamate. Common TEAEs (>=20%) were somnolence and dizziness in overall patients, and somnolence, dizziness, fall, fatigue, balance disorder, and upper respiratory tract infection in older patients. Falls in older patients occurred after a mean 452.1 days of adjunctive cenobamate treatment (mean dose 262.5 mg/day; mean concomitant ASM drug load 2.46). Of 240 patients in the post hoc efficacy population, 18 were >=65 years of age. Mean seizure frequency at baseline was 18.1 seizures/28 days for the efficacy population and 3.1 seizures/28 days for older patients. Rates of 100% seizure reduction within 3-month intervals during the maintenance phase increased over time for the overall population (n=214) and older adults (n=15), reaching 51.9% and 78.6%, respectively, by 24 months. Mean percentage change in concomitant ASM drug load, not including cenobamate, was reduced in the overall efficacy population (31.8%) and older patients (36.3%) after 24 months of treatment. CONCLUSIONS: Results from this post hoc analysis showed notable rates of efficacy in older patients taking adjunctive cenobamate. Rates of several individual TEAEs occurred more frequently in older patients. Further reductions in concomitant ASMs may be needed in older patients when starting cenobamate to avoid adverse effects such as somnolence, dizziness, and falls. CLINICAL TRIALS REGISTRATION: ClinicalTrials.gov NCT02535091.", "abstract_zh": "背景：Cenobamate是一种抗癫痫发作药物（ASM），已在美国和欧洲获批用于治疗未控制的局灶性发作。目的：这项III期开放标签安全性研究的事后分析评估了辅助cenobamate在老年人与总体研究人群中的安全性和疗效。方法：年龄18-70岁、服用稳定剂量1-3种ASM且未控制局灶性发作的成人被纳入III期开放标签安全性研究；该研究中65-70岁的成人被纳入我们的安全性分析。在整个研究期间，对所有接受一剂或多剂cenobamate的患者（安全性研究人群）评估因不良事件导致的停药和治疗中出现的不良事件（TEAE）。在有充足发作数据的患者中事后评估疗效（事后疗效人群）；我们评估了该人群中65-70岁的患者。在事后疗效维持期人群中以3个月间隔评估总体100%应答率。同时测量合并ASM药物负荷变化。每种ASM的药物负荷定义为实际药物剂量/天与世界卫生组织规定日剂量（DDD）的比值。结果：在安全性研究人群的1340例患者（平均年龄39.7岁）中，42例>=65岁（平均年龄67.0岁，52.4%女性）。总体患者和老年患者的中位暴露时间分别为36.1和36.9个月，平均癫痫病程分别为22.9和38.5年。在第1、2和3年，总体患者中分别有80%、72%和68%继续使用cenobamate，老年患者中分别为76%、71%和69%。总体患者中常见TEAE（>=20%）为嗜睡和头晕，老年患者中为嗜睡、头晕、跌倒、疲劳、平衡障碍和上呼吸道感染。老年患者的跌倒发生在辅助cenobamate治疗平均452.1天后（平均剂量262.5 mg/天；平均合并ASM药物负荷2.46）。在事后疗效人群的240例患者中，18例>=65岁。疗效人群的基线平均发作频率为18.1次/28天，老年患者为3.1次/28天。维持期内3个月间隔的100%发作减少率随时间增加，总体人群（n=214）和老年人（n=15）在24个月时分别达到51.9%和78.6%。治疗24个月后，不包括cenobamate在内的合并ASM药物负荷平均百分比变化在总体疗效人群（31.8%）和老年患者（36.3%）中均有降低。结论：这项事后分析结果显示，服用辅助cenobamate的老年患者具有显著的疗效。老年患者中几种个别TEAE的发生率更高。老年患者在开始使用cenobamate时可能需要进一步减少合并ASM，以避免嗜睡、头晕和跌倒等不良反应。临床试验注册：ClinicalTrials.gov NCT02535091。", "url": "https://pubmed.ncbi.nlm.nih.gov/38446341/", "type": "pubmed", "doi": "10.1007/s40266-024-01102-3"}]}, {"section": "真实世界使用", "question": "真实世界中cenobamate的疗效与安全性对比其他同类药物有何差异？", "answer": "一项发表于JAMA Neurology（2026年）的大型真实世界汇总分析，纳入意大利4项多中心回顾性研究共1,949例成人难治性局灶性癫痫患者，对cenobamate与brivaracetam、lacosamide、perampanel进行了头对头比较。<br><br><b>疗效（主要终点：6个月时发作减少≥50%）</b><br>经广义线性混合模型调整后，cenobamate的疗效显著优于其他三种ASM：<br>以cenobamate为参照，其他药物达到≥50%应答的OR分别为：<br>brivaracetam 0.18（95% CI 0.12–0.28，P&lt;0.001）<br>perampanel 0.26（95% CI 0.16–0.42，P&lt;0.001）<br>lacosamide 0.29（95% CI 0.17–0.49，P&lt;0.001）<br><br><b>无发作率与12个月留存率</b><br>cenobamate的无发作率和12个月治疗留存率均显著高于对照药物。lacosamide在12个月留存率上与cenobamate相当，但疗效仍低于cenobamate。<br><br><b>安全性</b><br>cenobamate的不良反应发生率（57.8%）高于其他三种ASM，最常见为头晕、嗜睡、疲劳。lacosamide的不良反应发生率最低。<br><br><b>结论</b><br>在难治性局灶性癫痫的真实世界治疗中，cenobamate的疗效优于brivaracetam、lacosamide和perampanel，但不良反应更为常见，临床决策时需综合权衡疗效与耐受性。", "refs": [{"text": "1. Cerulli Irelli E, et al. JAMA Neurol. 2026;83(4):320-328.", "title": "Comparative Effectiveness of Brivaracetam, Cenobamate, Lacosamide, and Perampanel in Focal Epilepsy.", "abstract_full": "Importance: Cenobamate, brivaracetam, lacosamide, and perampanel are newer-generation antiseizure medications (ASMs) approved for adjunctive treatment of focal seizures. Real-world comparative effectiveness data are limited. Objective: To compare the real-world effectiveness and tolerability of cenobamate vs brivaracetam, lacosamide, and perampanel as adjunctive therapy in adults with drug-resistant focal epilepsy. Design: Multicenter pooled analysis of 4 Italian retrospective medical record-review studies (January 2017 to January 2024). Adults aged 16+ with drug-resistant focal epilepsy (ILAE definition). Main Outcomes: Primary outcome was >=50% reduction in seizure frequency at 6 months. Secondary outcomes: seizure freedom, 12-month retention, adverse effects. Results: 1,949 adults included (cenobamate n=388, brivaracetam n=541, lacosamide n=583, perampanel n=437). After adjustment using generalized linear mixed models, cenobamate demonstrated significantly higher effectiveness. ORs for >=50% response at 6 months vs cenobamate: brivaracetam 0.18 (95% CI 0.12-0.28; P<.001), perampanel 0.26 (95% CI 0.16-0.42; P<.001), lacosamide 0.29 (95% CI 0.17-0.49; P<.001). Cenobamate showed greater odds of seizure freedom and 12-month retention. Adverse effects more frequent with cenobamate (57.8%); lacosamide had lowest adverse effect rate. Conclusions: Superior effectiveness of cenobamate over brivaracetam, lacosamide, and perampanel in drug-resistant focal epilepsy, though adverse effects were more common.", "abstract_zh": "重要性：cenobamate、brivaracetam、lacosamide和perampanel是获批用于局灶性发作辅助治疗的新一代抗癫痫药物，但真实世界头对头比较数据有限。\n\n目的：比较cenobamate与brivaracetam、lacosamide、perampanel在成人难治性局灶性癫痫中的真实世界疗效和耐受性。\n\n设计与方法：汇总分析意大利4项多中心回顾性研究（2017年1月至2024年1月），纳入≥16岁、符合ILAE定义的难治性局灶性癫痫成人患者。主要终点为6个月时发作频率减少≥50%；次要终点包括无发作率、12个月留存率和不良反应。\n\n结果：共纳入1,949例患者（cenobamate 388例，brivaracetam 541例，lacosamide 583例，perampanel 437例）。经广义线性混合模型调整后，cenobamate疗效显著优于其他三种ASM。以cenobamate为参照，6个月时达到≥50%应答的OR分别为：brivaracetam 0.18（95% CI 0.12–0.28，P<0.001）、perampanel 0.26（95% CI 0.16–0.42，P<0.001）、lacosamide 0.29（95% CI 0.17–0.49，P<0.001）。cenobamate的无发作率和12个月治疗留存率也显著更高。不良反应发生率：cenobamate为57.8%，高于其他ASM；lacosamide的不良反应发生率最低。\n\n结论：在大型真实世界研究中，cenobamate在难治性局灶性癫痫成人患者中的疗效优于brivaracetam、lacosamide和perampanel，但不良反应更为常见，临床决策时需综合权衡。", "url": "https://pubmed.ncbi.nlm.nih.gov/41661607/", "type": "pubmed"}]}, {"section": "其他适应症研究", "question": "cenobamate在全面性癫痫患者中开展了哪些临床研究？", "answer": "cenobamate已在全面性癫痫领域开展了多项临床研究：<br><br><b>1. PGTCS III期随机双盲研究（YKP3089C025，NCT03678753）</b><br>随机双盲安慰剂对照III期研究，评估cenobamate辅助治疗特发性全面性癫痫（IGE）患者原发性全面强直阵挛发作（PGTCS）的疗效与安全性。受试者1:1随机分配至cenobamate组（最高200mg/d，经10周缓慢滴定）或安慰剂组。研究状态：已完成。<br><br><b>2. OLE长期延伸研究（YKP3089C033，NCT03961568）</b><br>针对完成C025研究受试者的开放标签长期安全性延伸研究，评估cenobamate辅助治疗PGTCS的长期安全性，纳入成人及青少年患者。", "refs": [{"text": "1. NCT03678753 - ClinicalTrials.gov（YKP3089C025，PGTCS III期）", "title": "Randomized, Double-Blind Study to Evaluate Efficacy and Safety of Cenobamate Adjunctive Therapy in PGTC Seizures", "abstract_full": "This randomized, double-blind, placebo-controlled Phase 3 trial evaluates safety, efficacy, and pharmacokinetics of cenobamate adjunctive therapy vs placebo in subjects with primary generalized tonic-clonic (PGTC) seizures in idiopathic generalized epilepsy (IGE). Subjects randomized 1:1 to cenobamate (max 200mg/d, 10-week titration: 12.5→25→50→100→150→200mg every 2 weeks) or placebo. Status: Completed. Phase 3. Sponsor: SK Life Science.", "abstract_zh": "随机双盲安慰剂对照III期研究，评估cenobamate辅助治疗特发性全面性癫痫（IGE）患者原发性全面强直阵挛发作（PGTCS）的疗效、安全性和药代动力学。受试者1:1随机分配至cenobamate组（最高200mg/d，经10周缓慢滴定：12.5→25→50→100→150→200mg，每2周递增）或安慰剂组。研究状态：已完成。III期。申办方：SK Life Science。", "url": "https://clinicaltrials.gov/study/NCT03678753", "type": "clinical_trial"}, {"text": "2. NCT03961568 - ClinicalTrials.gov（YKP3089C033，PGTCS OLE延伸研究）", "title": "A Multicenter Open-Label Extension Study to Evaluate the Long-Term Safety of Cenobamate Adjunctive Therapy in Subjects With Primary Generalized Tonic-Clonic Seizures", "abstract_full": "Open-label extension study evaluating long-term safety of cenobamate adjunctive therapy in subjects with primary generalized tonic-clonic seizures (PGTCS) in idiopathic generalized epilepsy who completed the YKP3089C025 double-blind study. Includes adult and adolescent patients. Sponsor: SK Life Science.", "abstract_zh": "针对完成YKP3089C025双盲研究受试者的开放标签长期延伸研究，评估cenobamate辅助治疗原发性全面强直阵挛发作（PGTCS）的长期安全性。纳入成人及青少年患者。申办方：SK Life Science。", "url": "https://clinicaltrials.gov/study/NCT03961568", "type": "clinical_trial"}]}, {"section": "其他适应症研究", "question": "cenobamate在儿童癫痫患者中开展了哪些临床研究？", "answer": "cenobamate在儿童癫痫领域开展了以下临床研究：<br><br><b>儿科II/III期安全性与疗效研究（NCT05067634）</b><br>评估cenobamate在2-17岁局灶性（部分性）癫痫患儿中的安全性、耐受性和疗效。提供片剂和口服混悬液两种剂型，剂量包括12.5mg、25mg、50mg、100mg。研究持续约12个月。状态：Active, not recruiting（已完成招募，随访中）。II/III期。申办方：SK Life Science。<br><br>此外，多项欧洲多中心回顾性真实世界研究已报告cenobamate在儿童难治性癫痫中的off-label使用数据（详见特殊人群相关FAQ）。", "refs": [{"text": "1. NCT05067634 - ClinicalTrials.gov（儿科II/III期安全性与疗效研究）", "title": "Safety and Efficacy Study of Cenobamate in Pediatric Subjects With Focal Seizures", "abstract_full": "Primary objective: To evaluate the safety and tolerability of cenobamate in pediatric subjects 2-17 years of age with partial-onset (focal) seizures. Secondary objectives: To evaluate the efficacy of cenobamate tablets and suspension in pediatric subjects with partial onset (focal) seizures; to evaluate pharmacokinetics. Dosage forms: tablets and oral suspension (12.5mg, 25mg, 50mg, 100mg). Study duration: up to 12 months. Status: Active, not recruiting. Phase 2/3. Sponsor: SK Life Science. Last updated: 2026-04-03.", "abstract_zh": "主要目标：评估cenobamate在2-17岁局灶性（部分性）癫痫患儿中的安全性和耐受性。次要目标：评估片剂和口服混悬液的疗效及药代动力学。剂型：片剂和口服混悬液（12.5mg、25mg、50mg、100mg）。研究持续约12个月。状态：Active, not recruiting（已完成招募，随访中）。II/III期。申办方：SK Life Science。最后更新：2026年4月。", "url": "https://clinicaltrials.gov/study/NCT05067634", "type": "clinical_trial"}]}, {"section": "其他适应症研究", "question": "cenobamate在成人单药治疗中开展了哪些临床研究？", "answer": "cenobamate在美国已获批单药治疗局灶性癫痫，但单药治疗的前瞻性临床数据相对有限，目前正在开展专项研究：<br><br><b>IV期开放标签单药研究（NCT06453213）</b><br>评估cenobamate 100mg/d和200mg/d单药治疗新诊断或复发局灶性癫痫成人患者的疗效。纳入18-74岁、符合2017年ILAE局灶性癫痫诊断标准的患者（新诊断或既往治疗后复发）。研究开始：2024年8月；预计完成：2027年7月。状态：Recruiting（招募中）。IV期。申办方：SK Life Science。", "refs": [{"text": "1. NCT06453213 - ClinicalTrials.gov（成人单药IV期研究）", "title": "Open-label Study of Cenobamate Monotherapy in Adult Subjects With Newly Diagnosed or Recurrent Partial-Onset Epilepsy", "abstract_full": "Cenobamate (YKP3089) is approved in the US, Europe and several other countries for treatment of partial-onset (focal) seizures in adults. In the US it is approved for use as monotherapy, however, there is little clinical data assessing its use as monotherapy in adults with POS. This Phase 4 study explores the effectiveness of doses of 100mg/day and 200mg/day as monotherapy in adult subjects with newly diagnosed or recurrent POS/focal onset epilepsy. Eligibility: 18-74 years, diagnosis of POS per 2017 ILAE Classification. Study start: August 2024. Estimated completion: July 2027. Status: Recruiting. Phase 4. Sponsor: SK Life Science.", "abstract_zh": "cenobamate在美国已获批单药治疗局灶性癫痫，但单药治疗的前瞻性临床数据有限。本IV期研究探索cenobamate 100mg/d和200mg/d单药治疗新诊断或复发局灶性癫痫成人患者的疗效。纳入标准：18-74岁，符合2017年ILAE局灶性癫痫诊断标准的新诊断或既往治疗后复发患者。研究开始：2024年8月；预计完成：2027年7月。状态：招募中。IV期。申办方：SK Life Science。", "url": "https://clinicaltrials.gov/study/NCT06453213", "type": "clinical_trial"}]}, {"section": "联用方案查询", "question": "cenobamate与常见抗癫痫药物联用时如何调整剂量？", "answer": "<p>cenobamate的DDI核心机制有两条：</p><p>① <strong>抑制CYP2C19（升高联用药物浓度）</strong>：cenobamate是CYP2C19的强抑制剂，会升高经CYP2C19代谢的药物血药浓度，主要影响氯巴占（clobazam）、苯妥英（phenytoin）、苯巴比妥（phenobarbital）。</p><p>② <strong>诱导CYP3A4（降低联用药物浓度）</strong>：cenobamate是CYP3A4的诱导剂，会降低经CYP3A4代谢的药物浓度，主要影响卡马西平（carbamazepine）、拉莫三嗪（lamotrigine）。</p><p>基于此，加用cenobamate时，部分联用药物需要主动减量（预防性调整），部分药物在出现不良反应后再减量（反应性调整）。</p><div class=\"ddi-timing-notice\"><div class=\"ddi-timing-notice-title\">⚠️ 关于调整时机与多种钠通道阻滞剂联用：两项共识存在差异</div><div class=\"ddi-timing-notice-body\"><p><strong>调整时机差异：</strong>Krauss共识建议大多数药物在cenobamate达150-200mg/day时才开始调整联用药物；西班牙共识建议大部分药物在cenobamate 25-50mg/day就开始预防性调整，部分药物（如氯巴占≥20mg/day）在cenobamate 50-100mg/day即开始——西班牙共识的调整时机更早。</p><p><strong>多种钠通道阻滞剂（SCB）联用：</strong>Krauss共识按单个药物剂量是否超过高剂量门槛来判断是否预防性减量；西班牙共识建议只要患者同时使用≥2种钠通道阻滞剂（不论剂量），就应预防性减停至少一种——西班牙共识更激进。</p><div class=\"ddi-timing-notice-source\">来源：Krauss GL et al. Neurol Ther. 2022（美国7位专家Delphi共识）；Carreño M et al. Epilepsia Open. 2024（6位西班牙专家共识）</div></div></div><div class=\"ddi-tool\"><div class=\"ddi-select-row\"><label>选择正在使用的药物：</label><select id=\"ddiSelect\" onchange=\"showDDI()\"><option value=\"\">-- 请选择 --</option><option value=\"clobazam\">氯巴占 (Clobazam)</option><option value=\"phenytoin\">苯妥英 (Phenytoin)</option><option value=\"phenobarbital\">苯巴比妥 (Phenobarbital)</option><option value=\"lacosamide\">拉科酰胺 (Lacosamide)</option><option value=\"carbamazepine\">卡马西平 (Carbamazepine)</option><option value=\"lamotrigine\">拉莫三嗪 (Lamotrigine)</option><option value=\"oxcarbazepine\">奥卡西平 (Oxcarbazepine)</option><option value=\"levetiracetam\">左乙拉西坦 (Levetiracetam)</option><option value=\"valproate\">丙戊酸 (Valproate)</option><option value=\"topiramate\">托吡酯 (Topiramate)</option><option value=\"cannabidiol\">大麻二酚 (Cannabidiol/Epidiolex)</option><option value=\"zonisamide\">唑尼沙胺 (Zonisamide)</option><option value=\"perampanel\">吡仑帕奈 (Perampanel)</option><option value=\"brivaracetam\">布立西坦 (Brivaracetam)</option></select></div><div id=\"ddiResult\" style=\"display:none;\"></div></div>", "refs": [{"text": "Krauss GL, et al. Neurol Ther. 2022;11(6):2335-2350. PMID: 36201148", "title": "Drug-Drug Interations With Cenobamate: Expert Consensus", "url": "https://pubmed.ncbi.nlm.nih.gov/36201148/", "type": "literature", "doi": "10.1007/s40120-022-00363-2", "pmid": "36201148"}, {"text": "Carreño M, et al. Epilepsia Open. 2024;9(3):1046-1059. PMID: 38613812", "title": "Spanish consensus on the management of concomitant antiseizure medications when using cenobamate in adults with drug-resistant focal seizures", "url": "https://pubmed.ncbi.nlm.nih.gov/38613812/", "type": "literature", "doi": "10.1002/epi4.12936", "pmid": "38613812"}]}];

const TABS = ['全部', '产品基本信息', '产品使用问题', '疗效/安全性相关问题', '特殊人群使用', '真实世界使用', '其他适应症研究', '联用方案查询'];
let currentTab = '全部';
let searchTerm = '';

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function highlight(text, term) {
  if (!term) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const regex = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(regex, '<mark>$1</mark>');
}

function renderTabs() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '';
  TABS.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab === currentTab ? ' active' : '');
    el.textContent = tab;
    el.onclick = () => {
      currentTab = tab;
      renderTabs();
      renderContent();
    };
    container.appendChild(el);
  });
}

function renderRefItem(ref, index) {
  const isLiterature = ref.type === 'literature' && ref.abstract_full;
  const isStatic = ref.type === 'package_insert' || !ref.abstract_full;
  
  let html = '<div class="ref-item ' + (isStatic ? 'ref-static' : 'ref-expandable') + '" ';
  if (!isStatic) {
    html += 'onclick="toggleRef(this, event)" ';
  }
  html += '>';
  
  html += '<div class="ref-text">' + escapeHtml(ref.text) + '</div>';
  
  if (!isStatic && ref.abstract_full) {
    html += '<div class="ref-detail">';
    html += '<div class="ref-title">' + escapeHtml(ref.title_full || ref.title || '') + '</div>';
    html += '<div class="ref-abstract-zh">' + escapeHtml(ref.abstract_zh || '') + '</div>';
    html += '<span class="ref-toggle-en" onclick="event.stopPropagation(); toggleEnAbstract(this)">查看英文原文 ▾</span>';
    html += '<div class="ref-abstract-en">' + escapeHtml(ref.abstract_full) + '</div>';
    if (ref.url) {
      html += '<a class="ref-link-btn" href="' + escapeHtml(ref.url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">前往PubMed ↗</a>';
    }
    html += '</div>';
  }
  
  html += '</div>';
  return html;
}

function toggleRef(el, event) {
  event.stopPropagation();
  el.classList.toggle('open');
}

function toggleEnAbstract(el) {
  const enDiv = el.nextElementSibling;
  if (enDiv.classList.contains('show')) {
    enDiv.classList.remove('show');
    el.textContent = '查看英文原文 ▾';
  } else {
    enDiv.classList.add('show');
    el.textContent = '收起英文原文 ▴';
  }
}

function renderContent() {
  const main = document.getElementById('mainContent');
  let filtered = FAQ_DATA;
  
  if (currentTab !== '全部') {
    filtered = filtered.filter(item => item.section === currentTab);
  }
  
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filtered = filtered.filter(item => {
      const qMatch = item.question.toLowerCase().includes(term);
      const aMatch = item.answer.toLowerCase().includes(term);
      const refMatch = (item.refs || []).some(r => 
        (r.text || '').toLowerCase().includes(term) ||
        (r.abstract_zh || '').toLowerCase().includes(term)
      );
      return qMatch || aMatch || refMatch;
    });
  }
  
  if (filtered.length === 0) {
    main.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>未找到相关问题</p><small>试试其他关键词</small></div>';
    return;
  }
  
  let html = '<div class="result-info">共 <span>' + filtered.length + '</span> 个问题</div>';
  
  let currentSection = '';
  filtered.forEach((item, idx) => {
    if (item.section !== currentSection) {
      currentSection = item.section;
      if (currentTab === '全部') {
        html += '<div class="section-header">' + escapeHtml(currentSection) + '</div>';
      }
    }
    
    const cardId = 'faq-' + idx;
    html += '<div class="faq-card" id="' + cardId + '">';
    html += '<div class="faq-question" onclick="toggleFaq(\'' + cardId + '\')">';
    html += '<div class="q-icon">Q</div>';
    html += '<div class="q-text">' + highlight(item.question, searchTerm) + '</div>';
    html += '<div class="q-arrow">▾</div>';
    html += '</div>';
    
    html += '<div class="faq-answer">';
    html += '<div class="answer-text">' + item.answer + '</div>';
    
    if (item.refs && item.refs.length > 0) {
      html += '<div class="answer-refs">';
      html += '<div class="refs-label">参考文献</div>';
      item.refs.forEach(ref => {
        html += renderRefItem(ref, idx);
      });
      html += '</div>';
    }
    
    html += '</div>';
    html += '</div>';
  });
  
  main.innerHTML = html;
}

function toggleFaq(id) {
  const card = document.getElementById(id);
  if (card) card.classList.toggle('open');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchTerm = '';
  document.getElementById('clearBtn').classList.remove('show');
  renderContent();
}

document.getElementById('searchInput').addEventListener('input', function(e) {
  searchTerm = e.target.value.trim();
  const clearBtn = document.getElementById('clearBtn');
  if (searchTerm) {
    clearBtn.classList.add('show');
  } else {
    clearBtn.classList.remove('show');
  }
  renderContent();
});

renderTabs();
renderContent();

同时使用≥2种钠通道阻滞剂时，无论剂量如何，至少应预防性减停其中一种。\n\n结论：主动且早期管理联用ASM（尤其是与cenobamate存在已知药代动力学或药效学相互作用的药物）对于优化耐受性、使cenobamate达到有效剂量至关重要。"}]}, "carbamazepine": {"name": "卡马西平 (Carbamazepine)", "mechanism": "cenobamate诱导CYP3A4，卡马西平经CYP3A4代谢，血药浓度降低约23%；通常不影响疗效，因为cenobamate本身在发挥作用", "strategy": "反应性调整（标准剂量≤1200mg/d时，出现不良反应再减量；超过1200mg/d时在cenobamate达200mg时预防性减量）", "strategyType": "reactive", "advice": "标准剂量患者通常不需要主动调整；若出现头晕、嗜睡等不良反应，每次减量100-200mg；高剂量（>1200mg/d）患者在cenobamate达200mg时考虑预防性减量", "source": "Krauss GL et al. Neurol Ther. 2022;11(6):2335-2350. PMID: 36201148", "consensus": {"hasDiff": true, "rows": [{"label": "调整策略", "krauss": "标准剂量（≤1200mg/d）反应性调整；高剂量（>1200mg/d）预防性调整", "spanish": "标准剂量反应性调整；高剂量（≥800mg/d）预防性调整"}, {"label": "高剂量门槛", "krauss": ">1200mg/day", "spanish": "≥800mg/day"}, {"label": "开始时机", "krauss": "高剂量时cenobamate达200mg/day开始预防性减量", "spanish": "高剂量时cenobamate达≥150mg/day开始预防性减量"}]}, "refs": [{"text": "Smith MC, Klein P, Krauss GL, et al. Dose Adjustment of Concomitant Antiseizure Medications During Cenobamate Treatment: Expert Opinion Consensus Recommendations. Neurol Ther. 2022;11(4):1705-1720.", "url": "https://pubmed.ncbi.nlm.nih.gov/36201148/", "abstract_zh": "目的：为在成人难治性局灶性发作患者中，cenobamate加用于现有ASM方案时，通过调整联用ASM剂量来改善耐受性，提供专家共识建议。\n\n方法：由7位具有丰富cenobamate使用经验的癫痫专家组成专家组，采用改良Delphi法达成共识，讨论cenobamate滴定期间联用ASM的耐受性问题及预防或减轻不良反应的剂量调整策略。\n\n结果：推荐在cenobamate滴定期间，预防性降低氯巴占（基于已知DDI）、苯妥英（基于已知DDI）、苯巴比妥（基于已知DDI）和拉科酰胺（基于药效学相互作用）的剂量，以预防不良反应。对于标准剂量的其他ASM，出现不良反应后再反应性减量即可。对于超过标准剂量上限的卡马西平（>1200 mg/天）和拉莫三嗪（>500 mg/天），建议在cenobamate达200 mg/天时考虑预防性减量。\n\n结论：推荐减量联用ASM的首要目标是预防或消除不良反应，从而使cenobamate能够达到最佳剂量，最大程度发挥改善发作控制的潜力。"}, {"text": "Carreño M, Gil-Nagel A, Serratosa JM, et al. Spanish consensus on the management of concomitant antiseizure medications when using cenobamate in adults with drug-resistant focal seizures. Epilepsia Open. 2024;9(3):1046-1059.", "url": "https://pubmed.ncbi.nlm.nih.gov/38573131/", "abstract_zh": "目的：基于西班牙癫痫专家的临床经验，为成人难治性局灶性发作患者启用cenobamate时联用ASM的管理提供共识建议。\n\n方法：6位具有cenobamate使用经验的西班牙癫痫专家参与共识制定，通过讨论临床经验、药代动力学和药效学相互作用及现有文献形成建议。\n\n结果：专家组建议预防性减量氯巴占（从cenobamate 12.5-100 mg/天开始）、苯妥英（从cenobamate 25-50 mg/天开始）和苯巴比妥（从cenobamate 50-100 mg/天开始）。对于拉科酰胺，当同时使用≥2种钠通道阻滞剂或剂量>300 mg/天时，建议预防性减量。对于卡马西平≥800 mg/天和拉莫三嗪>300 mg/天，建议在cenobamate达200 mg/天时预防性减量。专家组强调，cenobamate慢速滴定并不能改善耐受性；关键策略是主动管理联用ASM。当同时使用≥2种钠通道阻滞剂时，无论剂量如何，至少应预防性减停其中一种。\n\n结论：主动且早期管理联用ASM（尤其是与cenobamate存在已知药代动力学或药效学相互作用的药物）对于优化耐受性、使cenobamate达到有效剂量至关重要。"}]}, "lamotrigine": {"name": "拉莫三嗪 (Lamotrigine)", "mechanism": "cenobamate通过未明确机制降低拉莫三嗪浓度21-52%；高剂量拉莫三嗪时可能需要更高剂量cenobamate才能达到疗效", "strategy": "反应性调整（标准剂量≤500mg/d时，出现不良反应再减量；超过500mg/d时在cenobamate达200mg时预防性减量）", "strategyType": "reactive", "advice": "标准剂量患者通常不需要主动调整；若出现不良反应，每次减量25-50mg；注意：联用拉莫三嗪时可能需要cenobamate剂量达200-400mg才能充分发挥疗效", "source": "Krauss GL et al. Neurol Ther. 2022;11(6):2335-2350. PMID: 36201148", "consensus": {"hasDiff": true, "rows": [{"label": "调整策略", "krauss": "标准剂量（≤500mg/d）反应性调整；高剂量（>500mg/d）预防性调整", "spanish": "标准剂量反应性调整；高剂量（>300mg/d）预防性调整"}, {"label": "高剂量门槛", "krauss": ">500mg/day", "spanish": ">300mg/day"}, {"label": "开始时机", "krauss": "高剂量时cenobamate达200mg/day开始预防性减量", "spanish": "高剂量时cenobamate达≥150mg/day开始预防性减量"}]}, "refs": [{"text": "Smith MC, Klein P, Krauss GL, et al. Dose Adjustment of Concomitant Antiseizure Medications During Cenobamate Treatment: Expert Opinion Consensus Recommendations. Neurol Ther. 2022;11(4):1705-1720.", "url": "https://pubmed.ncbi.nlm.nih.gov/36201148/", "abstract_zh": "目的：为在成人难治性局灶性发作患者中，cenobamate加用于现有ASM方案时，通过调整联用ASM剂量来改善耐受性，提供专家共识建议。\n\n方法：由7位具有丰富cenobamate使用经验的癫痫专家组成专家组，采用改良Delphi法达成共识，讨论cenobamate滴定期间联用ASM的耐受性问题及预防或减轻不良反应的剂量调整策略。\n\n结果：推荐在cenobamate滴定期间，预防性降低氯巴占（基于已知DDI）、苯妥英（基于已知DDI）、苯巴比妥（基于已知DDI）和拉科酰胺（基于药效学相互作用）的剂量，以预防不良反应。对于标准剂量的其他ASM，出现不良反应后再反应性减量即可。对于超过标准剂量上限的卡马西平（>1200 mg/天）和拉莫三嗪（>500 mg/天），建议在cenobamate达200 mg/天时考虑预防性减量。\n\n结论：推荐减量联用ASM的首要目标是预防或消除不良反应，从而使cenobamate能够达到最佳剂量，最大程度发挥改善发作控制的潜力。"}, {"text": "Carreño M, Gil-Nagel A, Serratosa JM, et al. Spanish consensus on the ma function showDDI() {
  var select = document.getElementById('ddiSelect');
  var result = document.getElementById('ddiResult');
  if (!select || !result) return;
  var key = select.value;
  if (!key) {
    result.style.display = 'none';
    result.innerHTML = '';
    return;
  }
  var d = DDI_DATA[key];
  if (!d) {
    result.style.display = 'none';
    return;
  }
  var isProactive = d.strategyType === 'proactive';
  var borderColor = isProactive ? '#f59e0b' : '#3b82f6';
  var bgColor = isProactive ? '#fffbeb' : '#eff6ff';
  var badgeBg = isProactive ? '#fef3c7' : '#dbeafe';
  var html = '';
  html += '<div class="ddi-card" style="border-left:4px solid ' + borderColor + ';background:' + bgColor + ';">';
  html += '<div class="ddi-card-title">' + escapeHtml(d.name) + '</div>';
  html += '<div class="ddi-field"><span class="ddi-label">DDI机制：</span><span class="ddi-content">' + escapeHtml(d.mechanism) + '</span></div>';
  html += '<div class="ddi-field"><span class="ddi-label">调整策略：</span><span class="ddi-strategy" style="color:' + borderColor + ';background:' + badgeBg + ';">' + escapeHtml(d.strategy) + '</span></div>';
  html += '<div class="ddi-field"><span class="ddi-label">具体建议：</span><span class="ddi-content">' + escapeHtml(d.advice) + '</span></div>';
  // 渲染参考文献（带摘要折叠和PubMed链接）
  if (d.refs && d.refs.length > 0) {
    html += '<div class="ddi-field"><span class="ddi-label">参考文献：</span></div>';
    html += '<div class="ddi-refs">';
    for (var ri = 0; ri < d.refs.length; ri++) {
      var ref = d.refs[ri];
      var refId = 'ddi-ref-' + key + '-' + ri;
      html += '<div class="ref-item">';
      html += '<div class="ref-text">' + escapeHtml(ref.text) + '</div>';
      if (ref.abstract_zh) {
        html += '<button class="ref-toggle" data-ref-id="' + refId + '">查看中文摘要 ▼</button>';
        html += '<div class="ref-abstract" id="' + refId + '" style="display:none;">' + escapeHtml(ref.abstract_zh) + '</div>';
      }
      if (ref.url) {
        html += '<a class="ref-link" href="' + ref.url + '" target="_blank">前往PubMed →</a>';
      }
      html += '</div>';
    }
    html += '</div>';
  } else {
    html += '<div class="ddi-field"><span class="ddi-label">参考来源：</span><span class="ddi-content">' + escapeHtml(d.source) + '</span></div>';
  }
  if (d.consensus) {
    if (d.consensus.hasDiff) {
      html += '<div class="ddi-consensus">';
      html += '<div class="ddi-consensus-title">📋 两项专家共识观点对比</div>';
      html += '<table class="ddi-consensus-table">';
      html += '<thead><tr><th style="width:90px;"></th><th class="krauss-col">Krauss共识（美国）</th><th class="spanish-col">西班牙共识</th></tr></thead>';
      html += '<tbody>';
      for (var i = 0; i < d.consensus.rows.length; i++) {
        var row = d.consensus.rows[i];
        html += '<tr>';
        html += '<td class="label-col">' + escapeHtml(row.label) + '</td>';
        html += '<td>' + escapeHtml(row.krauss) + '</td>';
        html += '<td>' + escapeHtml(row.spanish) + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      html += '<div class="ddi-consensus-note">以上为专家共识建议，具体用药决策请结合患者个体情况。两项共识均来自有丰富cenobamate使用经验的癫痫专家团队。</div>';
      html += '</div>';
    } else {
      html += '<div class="ddi-consensus-agree">📋 两项共识建议一致</div>';
    }
  }
  html += '<div class="ddi-disclaimer">以上建议来自专家指南/共识原文，具体决策建议请结合患者个体情况。</div>';
  html += '</div>';
  result.innerHTML = html;
  result.style.display = 'block';
  // 事件委托：为所有参考文献折叠按钮绑定点击事件
  result.querySelectorAll('.ref-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var refId = this.getAttribute('data-ref-id');
      var el = document.getElementById(refId);
      if (!el) return;
      if (el.style.display === 'none') {
        el.style.display = 'block';
        this.textContent = '收起摘要 ▲';
      } else {
        el.style.display = 'none';
        this.textContent = '查看中文摘要 ▼';
      }
    });
  });
}

</script>
